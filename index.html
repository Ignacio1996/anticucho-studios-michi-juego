}
// online duel: host + 1-3 guests, same slot/keysrc wiring the Horda host uses
function startPvpOnline(){
  pvpOnline=true; pvpPending=false;
  pvpResetWorld();
  const P1={up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD',punch:'Space',gear:'KeyF'};
  const REMOTE={up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',punch:'Comma',gear:'Period'};
  const total=Math.min(4, 1+NET.conns.length);
  players=[];
  const order=shuffledChars();
  for(let i=0;i<total;i++) players.push(makePlayer(order[i%order.length], 0,0, i===0?P1:REMOTE));
  for(let g=0; g<NET.conns.length && g+1<total; g++){ NET.conns[g].slot=g+1; players[g+1].keysrc=NET.conns[g].keys; players[g+1].netRemote=NET.conns[g]; NET.conns[g].grace=0.4; }
  mode=2;
  pvp.wins=players.map(()=>0); pvp.roundN=1; pvp.paused=false; pvp.bgc=null;
  state=STATE.PVP;
  startPvpRound();
}
function startPvpRound(){
  const g=[];
  for(let r=0;r<PVP_ROWS;r++){ const row=[]; for(let c=0;c<PVP_COLS;c++){
    row.push((c%2===1 && r%2===1) ? 1 : (Math.random()<0.74 ? 2 : 0));
  } g.push(row); }
  // random spawns: anywhere on the grid (never a pillar), kept far apart; each spawn gets a
  // cleared cross-pocket (2 tiles per open direction) so round 1 isn't a guaranteed self-kill
  const spots=pvpPickSpawns(Math.max(2,players.length));
  for(const s of spots){
    g[s[1]][s[0]]=0;
    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      for(let k=1;k<=2;k++){
        const cc=s[0]+d[0]*k, rr=s[1]+d[1]*k;
        if(cc<0||rr<0||cc>=PVP_COLS||rr>=PVP_ROWS) break;
        if(g[rr][cc]===1) break;          // pillar: this direction is a dead end, leave the rest
        if(g[rr][cc]===2) g[rr][cc]=0;
      }
    }
  }
  pvp.grid=g; pvp.bombs.length=0; pvp.flames.length=0; pvp.items.length=0;
  pvp.sudden=0; pvp.suddenOn=false; pvp.dropT=0; pvp.spiral=pvpBuildSpiral(); pvp.spiralI=0; pvp.winner=-1; pvp.warnCell=null;
  particles.length=0;
  players.forEach((p,i)=>{
    const sp=spots[i%spots.length];
    p.x=pvpC2X(sp[0]); p.y=pvpR2Y(sp[1]);
    p.alive=!p.departed; p.fell=false; p.deathAnim=null; p.hp=p.maxhp; p.pending=false;
    p.dir=(sp[1]<PVP_ROWS/2)?'s':'n'; p.moving=false; p.animTime=0; p.punchAnim=0; p.hitFlash=0; p.shieldFlash=0;
    p.shields=0; p.special='none'; p.oroCharge=0; p.gear='none'; p.gearCount=0;
    p.pvpRange=1; p.pvpMaxB=1; p.pvpSpd=1; p.pvpKick=false; p.pvpPierce=false; p.pvpRemote=false;
    p.pvpCnt={piedra:0,tierra:0,cuarzo:0,rio:0,morganita:0,safiro:0};
    p.wasPunch=true; p.wasGear=true;   // require a fresh key press once the round starts
  });
  pvp.sub='count'; pvp.count=3.0; pvp.t=0;
}
// pick n non-pillar tiles as far apart as possible: try a large min-distance first,
// relax it until a placement fits (corners as the never-fails fallback)
function pvpPickSpawns(n){
  const cand=[];
  for(let r=0;r<PVP_ROWS;r++)for(let c=0;c<PVP_COLS;c++){ if(!(c%2===1&&r%2===1)) cand.push([c,r]); }
  for(let D=7;D>=3;D-=0.5){
    for(let attempt=0;attempt<30;attempt++){
      const pool=cand.slice();
      for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
      const picks=[];
      for(const t of pool){
        let ok=true;
        for(const q of picks){ if(Math.hypot(t[0]-q[0],t[1]-q[1])<D){ ok=false; break; } }
        if(ok){ picks.push(t); if(picks.length===n) break; }
      }
      if(picks.length===n) return picks;
    }
  }
  return [[0,0],[PVP_COLS-1,PVP_ROWS-1],[PVP_COLS-1,0],[0,PVP_ROWS-1]].slice(0,n);
}
function pvpBuildSpiral(){
  const order=[]; let t=0,b=PVP_ROWS-1,l=0,r=PVP_COLS-1;
  while(t<=b && l<=r){
    for(let c=l;c<=r;c++) order.push([c,t]);
    for(let rr=t+1;rr<=b;rr++) order.push([r,rr]);
    if(b>t) for(let c=r-1;c>=l;c--) order.push([c,b]);
    if(r>l) for(let rr=b-1;rr>t;rr--) order.push([l,rr]);
    t++;b--;l++;r--;
  }
  return order;
}

function updatePvp(dt){
  if(pvp.paused) return;
  pvp.t+=dt;
  for(const p of players){
    if(!p.alive && p.deathAnim!=null && p.deathAnim<4.5) p.deathAnim=Math.min(4.5,p.deathAnim+dt);   // hold the final death pose (no co-op cross)
    if(p.punchAnim>0) p.punchAnim-=dt;
    if(p.hitFlash>0) p.hitFlash-=dt;
  }
  if(pvp.sub==='count'){
    pvp.count-=dt;
    if(pvp.count<=0){ pvp.sub='play'; }   // silent start — WOW is Michi's voice, not a referee whistle
    return;
  }
  if(pvp.sub==='matchend') return;
  if(pvp.sub==='play'){ for(const p of players) pvpControl(p,dt); }
  else if(pvp.winner>=0 && players[pvp.winner].alive){ pvpControl(players[pvp.winner],dt); }   // the winner can strut during the banner
  pvpUpdateBombs(dt);
  for(let i=pvp.flames.length-1;i>=0;i--){ const f=pvp.flames[i]; f.t+=dt; if(f.t>=PVP_FLAME) pvp.flames.splice(i,1); }
  pvpUpdateItems(dt);
  if(pvp.sub==='play'){
    pvpSuddenDeath(dt);
    pvpCheckDeaths();
    const alive=players.filter(p=>p.alive);
    if(alive.length<=1){
      pvp.sub='roundend'; pvp.t=0;
      pvp.winner=alive.length?players.indexOf(alive[0]):-1;
      if(pvp.winner>=0){
        const wp=players[pvp.winner];
        pvp.wins[pvp.winner]++; pvp.banner='¡'+wp.name+' GANA LA RONDA!'; pvp.bannerC=wp.color;
        playCharSelect(wp.kind); netQSnd('sel', wp.kind);   // the winner celebrates in their own voice
      }
      else { pvp.banner='¡EMPATE!'; pvp.bannerC='#ffe9b0'; }
    }
  } else if(pvp.sub==='roundend' && pvp.t>2.8){
    if(pvp.winner>=0 && pvp.wins[pvp.winner]>=PVP_WINS) pvp.sub='matchend';
    else { pvp.roundN++; startPvpRound(); }
  }
}

function pvpControl(p,dt){
  if(!p.alive || p.departed) return;
  const c=p.controls, ks=p.keysrc||keys;
  const rem=p.netRemote;
  if(rem && rem.grace>0) rem.grace-=dt;
  if(rem && rem.pose && !(rem.grace>0)){
    // online guest: client-authoritative movement — adopt the pose it simulated, wall/bomb-resolve it
    const ps=rem.pose;
    p.moving=!!ps.mv;
    if(ps.mv){ p.facing.x=ps.fx; p.facing.y=ps.fy; p.dir=ps.dir; p.animTime+=dt; }
    p.x=ps.x; p.y=ps.y; pvpResolve(p);
    // kick probe: pose streaming skips pvpMoveAxis, so detect "pushing against a bomb" directly
    if(p.pvpKick && p.moving){
      const px2=p.x+p.facing.x*(p.radius+8), py2=p.y+p.facing.y*(p.radius+8);
      const cl=pvpCellOf(px2,py2);
      const b=(cl.c>=0&&cl.r>=0&&cl.c<PVP_COLS&&cl.r<PVP_ROWS)?pvpBombAt(cl.c,cl.r):null;
      if(b && !b.slide && !b.walkers.has(p)){
        const d=Math.abs(p.facing.x)>Math.abs(p.facing.y)?[p.facing.x<0?-1:1,0]:[0,p.facing.y<0?-1:1];
        pvpKick(b,d);
      }
    }
  } else {
    let mx=0,my=0;
    if(ks[c.up])my-=1; if(ks[c.down])my+=1; if(ks[c.left])mx-=1; if(ks[c.right])mx+=1;
    p.moving=!!(mx||my);
    if(p.moving){
      p.animTime+=dt;
      const l=Math.hypot(mx,my), nx=mx/l, ny=my/l;
      p.facing.x=nx; p.facing.y=ny;
      p.dir=Math.abs(nx)>Math.abs(ny)?(nx<0?'w':'e'):(ny<0?'n':'s');
      const sp=PVP_BASE_SPD*p.pvpSpd;
      if(mx) pvpMoveAxis(p,'x',nx*sp*dt, my===0?sp*dt:0, mx);
      if(my) pvpMoveAxis(p,'y',ny*sp*dt, mx===0?sp*dt:0, my);
    }
  }
  const kd=!!ks[c.punch];
  if(kd&&!p.wasPunch) pvpPlaceBomb(p);
  p.wasPunch=kd;
  const gk=!!(c.gear&&ks[c.gear]);
  if(gk&&!p.wasGear) pvpDetonate(p);
  p.wasGear=gk;
}
// move along one axis, collide against solid tiles, then help the player around corners:
// when the shoulder clips the tile of an adjacent lane, slide toward the open lane's center.
function pvpMoveAxis(p,axis,delta,assist,dirSign){
  if(!delta) return;
  if(axis==='x') p.x+=delta; else p.y+=delta;
  const r=p.radius;
  let blocked=null;
  const c0=Math.floor((p.x-r-PVP_OX)/PVP_TILE), c1=Math.floor((p.x+r-PVP_OX)/PVP_TILE);
  const r0=Math.floor((p.y-r-PVP_OY)/PVP_TILE), r1=Math.floor((p.y+r-PVP_OY)/PVP_TILE);
  for(let rr=r0;rr<=r1;rr++)for(let cc=c0;cc<=c1;cc++){
    if(!pvpSolid(cc,rr,p)) continue;
    const rect=pvpTileRect(cc,rr);
    if(!circleRectCollide(p.x,p.y,r,rect)) continue;
    if(axis==='x') p.x = dirSign>0 ? rect.x-r : rect.x+rect.w+r;
    else p.y = dirSign>0 ? rect.y-r : rect.y+rect.h+r;
    blocked={c:cc,r:rr};
  }
  if(!blocked) return;
  const b=pvpBombAt(blocked.c,blocked.r);
  if(b && p.pvpKick && !b.walkers.has(p)){ pvpKick(b, axis==='x'?[dirSign,0]:[0,dirSign]); return; }
  if(assist>0){
    if(axis==='x'){
      const lr=clamp(Math.round((p.y-PVP_OY-PVP_TILE/2)/PVP_TILE),0,PVP_ROWS-1);
      if(lr!==blocked.r && !pvpSolid(blocked.c,lr,p)){ p.y+=clamp(pvpR2Y(lr)-p.y,-assist,assist); pvpResolve(p); }
    } else {
      const lc=clamp(Math.round((p.x-PVP_OX-PVP_TILE/2)/PVP_TILE),0,PVP_COLS-1);
      if(lc!==blocked.c && !pvpSolid(lc,blocked.r,p)){ p.x+=clamp(pvpC2X(lc)-p.x,-assist,assist); pvpResolve(p); }
    }
  }
}
function pvpResolve(p){
  const r=p.radius;
  const c0=Math.floor((p.x-r-PVP_OX)/PVP_TILE), c1=Math.floor((p.x+r-PVP_OX)/PVP_TILE);
  const r0=Math.floor((p.y-r-PVP_OY)/PVP_TILE), r1=Math.floor((p.y+r-PVP_OY)/PVP_TILE);
  for(let rr=r0;rr<=r1;rr++)for(let cc=c0;cc<=c1;cc++){
    if(!pvpSolid(cc,rr,p)) continue;
    const o=pvpTileRect(cc,rr);
    const nx=clamp(p.x,o.x,o.x+o.w), ny=clamp(p.y,o.y,o.y+o.h);
    const d=dist(p.x,p.y,nx,ny);
    if(d<r){ if(d===0){ p.x+=r; continue; } p.x=nx+(p.x-nx)/d*r; p.y=ny+(p.y-ny)/d*r; }
  }
  p.x=clamp(p.x,PVP_OX+r,PVP_OX+PVP_COLS*PVP_TILE-r);
  p.y=clamp(p.y,PVP_OY+r,PVP_OY+PVP_ROWS*PVP_TILE-r);
}

function pvpPlaceBomb(p){
  const {c,r}=pvpCellOf(p.x,p.y);
  if(c<0||r<0||c>=PVP_COLS||r>=PVP_ROWS) return;
  if(pvp.grid[r][c]!==0 || pvpBombAt(c,r)) return;
  let own=0; for(const b of pvp.bombs) if(b.owner===p) own++;
  if(own>=p.pvpMaxB) return;
  const walkers=new Set();
  for(const pl of players){ if(pl.alive && circleRectCollide(pl.x,pl.y,pl.radius+2,pvpTileRect(c,r))) walkers.add(pl); }
  pvp.bombs.push({id:_entId++, c,r, x:pvpC2X(c), y:pvpR2Y(r), owner:p,
    fuse:p.pvpRemote?-1:PVP_FUSE, range:p.pvpRange, pierce:p.pvpPierce, remote:p.pvpRemote,
    slide:null, walkers, gone:false});
  p.punchAnim=Math.min(CHARS[p.kind].pd,0.18);
  playPunchSound(p);   // each character keeps their own voice (Freddy PLIN, Michi WOW, …)
}
function pvpDetonate(p){
  if(!p.pvpRemote) return;
  for(const b of pvp.bombs){ if(b.owner===p && b.remote && !b.gone){ pvpDetonateBomb(b); return; } }   // oldest first — chains do the rest
}
function pvpKick(b,d){
  const nc=b.c+d[0], nr=b.r+d[1];
  if(pvpSlideBlocked(nc,nr)) return;
  b.slide={dx:d[0],dy:d[1],tc:nc,tr:nr};   // silent — a slide SFX here reads as audio lag
}
function pvpSlideBlocked(c,r){
  if(c<0||r<0||c>=PVP_COLS||r>=PVP_ROWS) return true;
  if(pvp.grid[r][c]!==0) return true;
  if(pvpBombAt(c,r)) return true;                       // bombs never pass through each other
  const rect=pvpTileRect(c,r);
  for(const p of players){ if(p.alive && circleRectCollide(p.x,p.y,p.radius+2,rect)) return true; }
  return false;
}
function pvpUpdateBombs(dt){
  const boom=[];
  for(const b of pvp.bombs){
    if(b.walkers.size){ const rect=pvpTileRect(b.c,b.r); for(const w of Array.from(b.walkers)){ if(!w.alive || !circleRectCollide(w.x,w.y,w.radius+2,rect)) b.walkers.delete(w); } }
    if(b.slide){
      b.x+=b.slide.dx*PVP_KICK_SPD*dt; b.y+=b.slide.dy*PVP_KICK_SPD*dt;
      // a player stepping into the path stops the bomb one tile short
      let hitP=false;
      for(const p of players){ if(p.alive && !b.walkers.has(p) && dist(p.x,p.y,b.x,b.y)<p.radius+18){ hitP=true; break; } }
      if(hitP){ b.x=pvpC2X(b.c); b.y=pvpR2Y(b.r); b.slide=null; }
      else {
        const tx=pvpC2X(b.slide.tc), ty=pvpR2Y(b.slide.tr);
        if((b.slide.dx && (b.x-tx)*b.slide.dx>=0) || (b.slide.dy && (b.y-ty)*b.slide.dy>=0)){
          b.c=b.slide.tc; b.r=b.slide.tr; b.x=tx; b.y=ty;
          const nc=b.c+b.slide.dx, nr=b.r+b.slide.dy;
          if(pvpSlideBlocked(nc,nr)) b.slide=null;      // touched something → snap to the grid and stay
          else { b.slide.tc=nc; b.slide.tr=nr; }
        }
      }
    }
    if(b.fuse>0){ b.fuse-=dt; if(b.fuse<=0) boom.push(b); }
  }
  for(const b of boom){ if(!b.gone) pvpDetonateBomb(b); }
}
function pvpAddFlame(c,r){
  for(const f of pvp.flames){ if(f.c===c&&f.r===r){ f.t=0; return; } }
  pvp.flames.push({c,r,t:0});
}
function pvpDetonateBomb(b0){
  const q=[b0];
  while(q.length){
    const b=q.shift(); if(b.gone) continue; b.gone=true;
    const bi=pvp.bombs.indexOf(b); if(bi>=0) pvp.bombs.splice(bi,1);
    pvpAddFlame(b.c,b.r);
    spark(b.x,b.y,'#ff9a2a',16,230);
    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      for(let s=1;s<=b.range;s++){
        const cc=b.c+d[0]*s, rr=b.r+d[1]*s;
        if(cc<0||rr<0||cc>=PVP_COLS||rr>=PVP_ROWS) break;
        const g=pvp.grid[rr][cc];
        if(g===1||g===3) break;                          // unbreakable stone: the blast never passes
        if(g===2){                                       // crate: destroyed, and it absorbs the flame (unless Morganita pierces)
          pvp.grid[rr][cc]=0; pvpAddFlame(cc,rr);
          spark(pvpC2X(cc),pvpR2Y(rr),'#c98d4e',10,130);
          if(Math.random()<PVP_DROP_CHANCE) pvpSpawnItem(cc,rr);
          if(b.pierce) continue; else break;
        }
        pvpAddFlame(cc,rr);
        const ob=pvpBombAt(cc,rr);
        if(ob && !ob.gone){ q.push(ob); break; }         // chain reaction
        const it=pvpItemAt(cc,rr);
        if(it){ const ii=pvp.items.indexOf(it); if(ii>=0) pvp.items.splice(ii,1); spark(it.x,it.y,'#ffd24a',8,110); break; }   // items burn and stop the flame
      }
    }
    cameraShake=Math.max(cameraShake,8);
    playPvpBoom(); netQSnd('pboom');
  }
}
function pvpSpawnItem(c,r){
  let tot=0; for(const e of PVP_ITEM_W) tot+=e[1];
  let x=Math.random()*tot, type=PVP_ITEM_W[0][0];
  for(const e of PVP_ITEM_W){ x-=e[1]; if(x<=0){ type=e[0]; break; } }
  pvp.items.push({id:_entId++, c,r, x:pvpC2X(c), y:pvpR2Y(r), type, bob:Math.random()*TAU});
}
function pvpUpdateItems(dt){
  for(let i=pvp.items.length-1;i>=0;i--){
    const it=pvp.items[i]; it.bob+=dt*6;
    let taker=null;
    for(const p of players){ if(p.alive && dist(p.x,p.y,it.x,it.y)<p.radius+14){ taker=p; break; } }
    if(!taker) continue;
    pvp.items.splice(i,1);
    const p=taker; p.pvpCnt[it.type]++;
    if(it.type==='piedra') p.pvpRange=Math.min(PVP_RANGE_CAP,p.pvpRange+1);
    else if(it.type==='tierra') p.pvpSpd=Math.min(PVP_SPD_CAP,p.pvpSpd*PVP_SPD_STEP);
    else if(it.type==='cuarzo') p.pvpMaxB++;
    else if(it.type==='rio') p.pvpKick=true;
    else if(it.type==='morganita') p.pvpPierce=true;
    else if(it.type==='safiro') p.pvpRemote=true;
    floatText(p.x,p.y-30,PVP_ITEM_FX[it.type],APU_DEF[it.type].color);
    playPickup();
  }
}
function pvpCheckDeaths(){
  for(const p of players){
    if(!p.alive) continue;
    for(const f of pvp.flames){
      if(f.t>=PVP_FLAME_KILL) continue;   // past the blast window it's just smoke — walk through freely
      const rect=pvpTileRect(f.c,f.r);
      if(circleRectCollide(p.x,p.y,Math.max(4,p.radius-6),{x:rect.x+8,y:rect.y+8,w:rect.w-16,h:rect.h-16})){ pvpKill(p); break; }
    }
  }
}
function pvpKill(p){
  if(!p.alive) return;
  p.alive=false; p.fell=false; p.deathAnim=0;
  playCharDeath(p.kind);
  spark(p.x,p.y,'#ff9a2a',26,210);
  floatText(p.x,p.y-36,'¡KO!','#ff6a5a');
  cameraShake=11;
  for(const b of pvp.bombs){ if(b.owner===p && b.fuse<0) b.fuse=0.4+Math.random()*0.25; }   // a fallen detonator's bombs go off on their own
}
function pvpSuddenDeath(dt){
  pvp.sudden+=dt;
  if(pvp.sudden<PVP_SUDDEN) return;
  if(!pvp.suddenOn){ pvp.suddenOn=true; pvp.dropT=1.2; cameraShake=9; floatText(W/2,PVP_OY+40,'¡DERRUMBE!','#ff5a3a'); }
  pvp.dropT-=dt;
  if(pvp.dropT>0) return;
  pvp.dropT=0.42;
  while(pvp.spiralI<pvp.spiral.length){
    const [c,r]=pvp.spiral[pvp.spiralI++];
    if(pvp.grid[r][c]===1||pvp.grid[r][c]===3) continue;
    pvp.grid[r][c]=3;
    const b=pvpBombAt(c,r); if(b){ const bi=pvp.bombs.indexOf(b); if(bi>=0) pvp.bombs.splice(bi,1); }
    const it=pvpItemAt(c,r); if(it){ const ii=pvp.items.indexOf(it); if(ii>=0) pvp.items.splice(ii,1); }
    const rect=pvpTileRect(c,r);
    for(const p of players){ if(p.alive && circleRectCollide(p.x,p.y,Math.max(4,p.radius-4),{x:rect.x+6,y:rect.y+6,w:rect.w-12,h:rect.h-12})) pvpKill(p); }
    for(const p of players){ if(p.alive) pvpResolve(p); }   // clipped players get squeezed out instead of stuck
    spark(pvpC2X(c),pvpR2Y(r),'#8d8478',12,150);
    cameraShake=Math.max(cameraShake,5);
    break;
  }
}
function pvpPeekDrop(){
  if(NET.role==='guest') return pvp.warnCell;   // guests replicate the warn cell — they have no spiral
  for(let i=pvp.spiralI;i<pvp.spiral.length;i++){ const [c,r]=pvp.spiral[i]; const g=pvp.grid[r][c]; if(g!==1&&g!==3) return pvp.spiral[i]; }
  return null;
}

function handlePvpKey(code){
  if(NET.role==='guest') return;   // online guests: the host drives menus (same as Horda)
  if(pvp.sub==='matchend'){
    if(code==='Enter'||code==='Space'){
      if(pvpOnline) startPvpOnline();   // re-deal characters & slots — late joiners enter here too
      else { pvp.wins=players.map(()=>0); pvp.roundN=1; startPvpRound(); }
    }
    else if(code==='KeyC' && !pvpOnline){ enterPvpSelect(); }
    else if(code==='Escape'){ pvpExit(true); }
    return;
  }
  // Escape itself is handled by togglePause() (shared with the guests' {pt:1} request)
  if(!pvp.paused) return;
  if(NET.role==='guest') return;   // the pause menu lives on the host; guests only get the Esc toggle
  if(pvp.pauseView==='settings'){
    if(code==='ArrowUp'||code==='ArrowDown'||code==='KeyW'||code==='KeyS') setSel=(setSel+1)%2;
    else if(code==='ArrowLeft'||code==='KeyA') adjustVol(setSel,-0.1);
    else if(code==='ArrowRight'||code==='KeyD') adjustVol(setSel,0.1);
    else if(code==='Enter') pvp.pauseView='main';
    return;
  }
  if(code==='ArrowLeft'||code==='KeyA') pvp.pauseSel=(pvp.pauseSel+2)%3;      // the three options sit side by side
  if(code==='ArrowRight'||code==='KeyD') pvp.pauseSel=(pvp.pauseSel+1)%3;
  if(code==='Enter'||code==='Space'){ if(pvp.pauseSel===0) pvpResume(); else if(pvp.pauseSel===1){ pvp.pauseView='settings'; setSel=0; } else pvpExit(true); }
}
function pvpResume(){
  pvp.paused=false;
  for(const p of players){ p.wasPunch=true; p.wasGear=true; }   // the key that closed the menu must not drop a bomb
}
function pvpExit(toMenu){
  pvp.sub='off'; pvp.paused=false;
  try{ if(pvpMusic) pvpMusic.pause(); }catch(e){}
  if(toMenu) gotoMainMenu(); else playMenuMusic();
}

function rrectOn(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function pvpEnsureBG(){

  const gx=PVP_OX, gy=PVP_OY, gw=PVP_COLS*PVP_TILE, gh=PVP_ROWS*PVP_TILE, RIM=34;
  // cliff underside: the arena floats — jagged rock hangs below the slab
  g.fillStyle='#3c3128';

  const bx0=gx-RIM+6, bx1=gx+gw+RIM-6, by=gy+gh+RIM-8;
  g.moveTo(bx0,by); g.lineTo(bx1,by);
  const segs=14;
  for(let i=segs;i>=0;i--){
    const x=bx0+(bx1-bx0)*i/segs;
    g.lineTo(x, by+24+pvpN(i*3+1)*34+Math.sin(i*1.7)*8);
  }
  g.closePath(); g.fill();
  g.strokeStyle='rgba(20,14,10,0.35)'; g.lineWidth=2;
  for(let i=0;i<3;i++){ g.beginPath(); g.moveTo(bx0+10,by+8+i*10); g.lineTo(bx1-10,by+6+i*10); g.stroke(); }
  for(let i=0;i<5;i++){  // little floating rock shards drifting under the island
    const rx=bx0+40+pvpN(i+40)*(bx1-bx0-80), ry=by+58+pvpN(i+90)*24, rr=4+pvpN(i+140)*7;
    g.fillStyle='#4a3b2e'; g.beginPath(); g.moveTo(rx-rr,ry); g.lineTo(rx,ry-rr); g.lineTo(rx+rr,ry); g.lineTo(rx,ry+rr); g.closePath(); g.fill();
  }
  // stone rim
  g.fillStyle='#8f8168'; rrectOn(g,gx-RIM,gy-RIM,gw+RIM*2,gh+RIM*2,16); g.fill();
  g.strokeStyle='#5f5442'; g.lineWidth=3; rrectOn(g,gx-RIM,gy-RIM,gw+RIM*2,gh+RIM*2,16); g.stroke();
  g.strokeStyle='rgba(70,58,44,0.5)'; g.lineWidth=2;
  for(let i=0;i<=PVP_COLS;i++){ const x=gx+i*PVP_TILE; g.beginPath(); g.moveTo(x,gy-RIM+4); g.lineTo(x,gy-4); g.stroke(); g.beginPath(); g.moveTo(x,gy+gh+4); g.lineTo(x,gy+gh+RIM-4); g.stroke(); }
  for(let i=0;i<=PVP_ROWS;i++){ const y=gy+i*PVP_TILE; g.beginPath(); g.moveTo(gx-RIM+4,y); g.lineTo(gx-4,y); g.stroke(); g.beginPath(); g.moveTo(gx+gw+4,y); g.lineTo(gx+gw+RIM-4,y); g.stroke(); }
  for(let i=0;i<40;i++){  // moss tufts on the rim
    g.fillStyle='rgba(106,138,74,'+(0.25+pvpN(i)*0.3).toFixed(2)+')';
    const t=pvpN(i+13); let mx,my;
    if(t<0.25){ mx=gx-RIM+pvpN(i+3)*(gw+2*RIM); my=gy-RIM+pvpN(i+5)*RIM; }
    else if(t<0.5){ mx=gx-RIM+pvpN(i+3)*(gw+2*RIM); my=gy+gh+pvpN(i+5)*RIM; }
    else if(t<0.75){ mx=gx-RIM+pvpN(i+5)*RIM; my=gy-RIM+pvpN(i+3)*(gh+2*RIM); }
    else { mx=gx+gw+pvpN(i+5)*RIM; my=gy-RIM+pvpN(i+3)*(gh+2*RIM); }
    g.beginPath(); g.ellipse(mx,my,3+pvpN(i+17)*5,2+pvpN(i+19)*3,pvpN(i+7)*4,0,TAU); g.fill();
  }
  // mossy stone floor, subtle checker so the grid reads at a glance
  for(let r=0;r<PVP_ROWS;r++)for(let cc=0;cc<PVP_COLS;cc++){
    const x=gx+cc*PVP_TILE, y=gy+r*PVP_TILE;
    g.fillStyle=((cc+r)%2===0)?'#66735a':'#5e6a52';
    g.fillRect(x,y,PVP_TILE,PVP_TILE);
    g.strokeStyle='rgba(0,0,0,0.10)'; g.lineWidth=1; g.strokeRect(x+0.5,y+0.5,PVP_TILE-1,PVP_TILE-1);
    const n=pvpN(cc*31+r*57);
    if(n>0.82){ g.fillStyle='rgba(0,0,0,0.08)'; g.fillRect(x+8+n*10,y+9,11,6); }
    if(n<0.08){ g.fillStyle='rgba(120,150,84,0.25)'; g.beginPath(); g.ellipse(x+14+n*120,y+PVP_TILE-10,6,3,0,0,TAU); g.fill(); }
  }
  g.strokeStyle='rgba(0,0,0,0.28)'; g.lineWidth=6; g.strokeRect(gx+3,gy+3,gw-6,gh-6);
  // unbreakable carved pillars (fixed layout: every odd,odd tile)
  for(let r=0;r<PVP_ROWS;r++)for(let cc=0;cc<PVP_COLS;cc++){ if(cc%2===1&&r%2===1) drawPvpPillarOn(g,cc,r); }

function drawPvpPillarOn(g,c,r){

function drawPvpBomb(b){

function drawPvpFlame(f){

    ctx.fillStyle='#ffb44a'; rrect(rect.x+9,rect.y+9,rect.w-18,rect.h-18,7); ctx.fill();
    ctx.fillStyle='#fff0a8'; rrect(rect.x+16,rect.y+16,rect.w-32,rect.h-32,6); ctx.fill();

function togglePause(){
  // Online: the host owns the pause. Entering STATE.PAUSE freezes the authoritative simulation, and
  // netBroadcast keeps streaming snapshots (state:'pause' included) so every guest freezes + sees the
  // overlay too. Guests request a toggle by sending {pt:1} to the host (see initNet).
  if(state===STATE.PVP){   // PVP pause (host Esc AND guest {pt:1} land here; replicated via pvp snapshots)
    if(pvp.sub==='count'||pvp.sub==='play'||pvp.sub==='roundend'){
      if(pvp.paused) pvpResume(); else { pvp.paused=true; pvp.pauseSel=0; pvp.pauseView='main'; }
    }
    return;
  }
  if(state===STATE.PLAY||state===STATE.BREAK||state===STATE.INTRO){ prevState=state; state=STATE.PAUSE; pauseView='main'; pauseSel=0; }
  else if(state===STATE.PAUSE){ state=prevState; }
}

// ================= ONLINE NET SYNC (host snapshots ↔ guest replication + prediction) =================
// Replaces the old "stream the host's canvas as video" model. The host now serializes its
// authoritative world ~18×/s and sends it over the PeerJS data channel; each guest renders that
// world locally with real sprites (no video ramp-up), interpolates non-owned entities ~100ms in the
// past for smoothness, and predicts its OWN player from local input so its movement is zero-latency.
const SNAP_DT = 1/18;        // host broadcast period (seconds)
const NET_INTERP = 100;      // ms of interpolation delay applied to non-owned entities
let netSeq = 0, netAccum = 0;
// static/dynamic split: an enemy's constant fields (skin/variants/type/…) are sent only for its
// first ~1s of life and re-broadcast every ~2s (self-heal drops / late joiners); the small mutable
// set streams every snapshot. Halves steady-state per-enemy payload.
const NET_YOUNG = 18, NET_KEYFRAME = 36;
const netFirstSeen = new Map();   // enemy id -> seq first serialized (host-side)
const NET_ESTATIC = ['type','skin','kind','radius','footR','maxhp','tint','color','eye','pts','ttype',
  'gvar','lvar','gpvar','charge','leafer','archer','supay','llama','boss','giant','barRow','punchMax','dmg','speed'];
const NET_ESTATIC_SET = new Set(NET_ESTATIC);

// ---- online cue replication: gameplay SFX + floating texts ----
// The host queues each cue as a tiny {t,n,a} / {t:'ft',…} event that rides the next few snapshots;
// guests replay them through their LOCAL audio elements / particle list. No audio is ever streamed.
// Events are resent for ~4 snapshots (the data channel is unreliable) and deduped by id on the guest.
let netEvtId=0; const netEvtQ=[];
function netQEvt(ev){ if(NET.role==='host' && NET.conns.length){ ev.i=++netEvtId; ev.q=netSeq; netEvtQ.push(ev); } }
function netQSnd(n,a){ netQEvt(a===undefined?{t:'s',n}:{t:'s',n,a}); }
{ // wrap the shared-gameplay sound triggers + floatText so every host-side call also queues a net event
  const _ft=floatText;
  floatText=function(x,y,txt,color){ netQEvt({t:'ft',x,y,txt,c:color}); _ft(x,y,txt,color); };
  const wrapSnd=(n,fn)=>function(a){ netQSnd(n,a); return fn(a); };
  playHitThud=wrapSnd('hit',playHitThud);       playPickup=wrapSnd('pk',playPickup);
  playCoin=wrapSnd('coin',playCoin);            playOroPower=wrapSnd('oro',playOroPower);
  playZapSound=wrapSnd('zap',playZapSound);     playBeamSound=wrapSnd('beam',playBeamSound);
  playCameraClick=wrapSnd('cam',playCameraClick); playMagic=wrapSnd('magic',playMagic);
  playHee=wrapSnd('hee',playHee);               playHeeGiant=wrapSnd('heeg',playHeeGiant);
  playBrujaAttack=wrapSnd('bruja',playBrujaAttack); playCharDeath=wrapSnd('die',playCharDeath);
  const _pps=playPunchSound;   // punch voices key off the puncher's character
  playPunchSound=function(p){ netQSnd('punch',p.kind); return _pps(p); };
}

const NET_SND={
  hit:()=>playHitThud(), pk:()=>playPickup(), coin:()=>playCoin(), oro:()=>playOroPower(),
  zap:()=>playZapSound(), beam:()=>playBeamSound(), cam:()=>playCameraClick(), magic:()=>playMagic(),
  hee:()=>playHee(), heeg:()=>playHeeGiant(), bruja:g=>playBrujaAttack(g),

let gLastEvt=0, gEvtSynced=false;
function netPlayEvts(d){
  // first snapshot after joining: don't replay the resend backlog, just set the dedupe watermark
  if(!gEvtSynced){ gEvtSynced=true; for(const ev of d.evts||[]) if(ev.i>gLastEvt) gLastEvt=ev.i; return; }
  if(!d.evts) return;
  for(const ev of d.evts){

  for(const sa of cur.apuchis){
    let o=gApuMap[sa.id]; if(!o){ o={bob:Math.random()*6.28, spawn:0, r:18}; gApuMap[sa.id]=o; }
    o.type=sa.type; o.x=sa.x; o.y=sa.y; o.bob+=dt*7; if(o.spawn<1) o.spawn=Math.min(1,o.spawn+dt*3);
    seenA[sa.id]=1; apuchis.push(o);
  }
  for(const id in gApuMap){ if(!seenA[id]) delete gApuMap[id]; }
  hearts.length=0; for(const h of cur.hearts) hearts.push({x:h.x, y:h.y, bob:time*4, spin:time*3, life:16});
  if(cur.amuleto){ if(!amuleto) amuleto={bob:0, spin:0}; amuleto.x=cur.amuleto.x; amuleto.y=cur.amuleto.y; amuleto.item=cur.amuleto.item; amuleto.bob+=dt*4; amuleto.spin+=dt*2; }
  else amuleto=null;
  fx_effects.length=0; for(const f of cur.fx) fx_effects.push(f);

  // projectiles / pickups: resync from the authoritative snapshot, then dead-reckon locally between
  // snapshots so fast-moving shots stay smooth at 60fps (they travel in straight lines).
  if(gProjSeq!==cur.seq){
    gProjSeq=cur.seq;
    leaves.length=0;   for(const l of cur.leaves||[])  leaves.push({...l});
    rays.length=0;     for(const r of cur.rays||[])    rays.push({...r});
    iceBeams.length=0; for(const b2 of cur.ice||[])    iceBeams.push({...b2});
    nuggets.length=0;  for(const g of cur.nuggets||[]) nuggets.push({...g});
    wallets.length=0;  for(const w of cur.wallets||[]) wallets.push({...w});
    turretArrows.length=0; for(const r2 of cur.tarrows||[]) turretArrows.push({...r2});
  }
  // boss-drop gadgets: bombs / turrets / drop crates replicate wholesale each snapshot
  bombs.length=0;     for(const b3 of cur.bombs||[])   bombs.push({...b3});
  turrets.length=0;   for(const t2 of cur.turrets||[]) turrets.push({...t2});
  bossDrops.length=0; for(const d2 of cur.drops||[])   bossDrops.push({...d2});
  // Inca walls also live inside `obstacles` (own-player prediction collides with them), so the
  // obstacle list is rebuilt from the pristine map layout whenever the replicated wall set changes
  { let sig=''; for(const w2 of cur.incaW||[]) sig+=w2.id+':'+w2.hp+',';
    if(sig!==gWallSig){
      gWallSig=sig;
      incaWalls.length=0;
      for(const w2 of cur.incaW||[]) incaWalls.push({x:w2.x, y:w2.y, w:GRID, h:GRID, t:'incaWall', hp:w2.hp, maxhp:WALL_HP, id:w2.id});
      const base=(currentMap==='stonebridge')?OBST_STONEBRIDGE:(currentMap==='templo')?OBST_TEMPLO:(currentMap==='machu')?OBST_MACHU:OBST_AMAZONAS;
      obstacles=base.concat(incaWalls);
    } }
  for(const l of leaves){  l.x+=(l.vx||0)*dt; l.y+=(l.vy||0)*dt; }
  for(const r of rays){    r.x+=(r.vx||0)*dt; r.y+=(r.vy||0)*dt; }
  for(const r2 of turretArrows){ r2.x+=(r2.vx||0)*dt; r2.y+=(r2.vy||0)*dt; }
  for(const g of nuggets){ g.x+=(g.vx||0)*dt; g.y+=(g.vy||0)*dt; g.bob=(g.bob||0)+dt*8; }
  for(const b2 of iceBeams){ b2.life-=dt; }               // fade the beam smoothly; resync restores it
  for(const w of wallets){ w.bob=(w.bob||0)+dt*4; w.spin=(w.spin||0)+dt*1.5; }

  // local audio cues driven off snapshot deltas
  if(gPrevRound===-999) gPrevRound=cur.round;
  try{ if(cur.state===STATE.PLAY && cur.round!==gPrevRound) playRoundStart(cur.round); }catch(e){}
  try{ netGuestMusic(cur.state); }catch(e){}
  gPrevRound=cur.round;
}

try{ initAudio(); }catch(e){}
requestAnimationFrame(frame);

// ================= ONLINE MULTIPLAYER (state-replicated + client prediction, over PeerJS) =================
// Host: runs the authoritative simulation, broadcasts ~18 world-snapshots/s to every guest, and feeds
//       each guest's keypresses into its own player (slots 1-3) via that connection's keys object.
// Guest: renders the replicated world locally with real sprites, interpolates non-owned entities, and
//        predicts its OWN player from local input for zero-latency movement. (See netApply* above.)
(function initNet(){
  const $ = id => document.getElementById(id);
  const statusEl=$('netstatus'), linkBox=$('netlink'), copyBtn=$('netcopy'), panel=$('netui'),
        vid=$('remotevideo'), wrap=$('wrap'), banner=$('netbanner');
  const setStatus = t => { if(statusEl) statusEl.textContent = t; };
  const setBanner = t => { if(banner){ banner.style.display='block'; banner.textContent=t; } };
  if(typeof Peer === 'undefined'){ setStatus('No se pudo cargar PeerJS (¿sin internet?).'); return; }

  const joinId = new URLSearchParams(location.search).get('r');

  // translate a guest's normalized input into the canonical control codes fed into its host-side player
  function applyRemote(guest, d){
    const keysObj = guest.keys;
    keysObj['ArrowUp']    = !!d.u;
    keysObj['ArrowDown']  = !!d.dn;
    keysObj['ArrowLeft']  = !!d.l;
    keysObj['ArrowRight'] = !!d.r;
    keysObj['Comma']      = !!d.p;
    keysObj['Period']     = !!d.g;
    // client-authoritative movement: adopt the pose the guest simulated locally (its own player runs
    // with zero input latency). Attacks/damage stay host-authoritative via the keys above.
    if(typeof d.x==='number' && typeof d.y==='number'){
      // NOTE: fx/fy legitimately hit 0 when aiming along an axis — `d.fy||1` would turn a
      // horizontal aim into a diagonal one (that bent Morganita beams 45° for guests).
      guest.pose = { x:d.x, y:d.y,
        fx:(typeof d.fx==='number'?d.fx:0), fy:(typeof d.fy==='number'?d.fy:1),
        dir:d.dr||'s', mv:!!d.mv };
    }
  }

  if(joinId){
    // ----------------------------- GUEST -----------------------------
    NET.role = 'guest';
    // the guest renders its own world (real sprites) and plays its own audio, so DON'T mute/hide it.
    if(panel) panel.style.display='none';
    if(vid)   vid.style.display='none';   // no more incoming video track
    if(wrap)  wrap.style.display='';       // show the local canvas — this is what the guest actually plays on
    setBanner('Conectando con el anfitrión…');

    // capture our keys: feed them to local prediction (NET.guestKeys) AND ship them to the host, but
    // STOP them reaching the local menu/game state machine (which the guest never drives directly).
    const gk = {};
    NET.guestKeys = gk;
    let lastSig = '';
    function inputPacket(){
      const pk = {
        u:  !!(gk['KeyW']||gk['ArrowUp']),    dn: !!(gk['KeyS']||gk['ArrowDown']),
        l:  !!(gk['KeyA']||gk['ArrowLeft']),  r:  !!(gk['KeyD']||gk['ArrowRight']),
        p:  !!(gk['Space']||gk['Comma']),     g:  !!(gk['KeyF']||gk['Period'])
      };
      // stream our locally-simulated pose so the host adopts it verbatim (client-authoritative movement,
      // zero input round-trip). Only once prediction has a real position to report.
      if(gPred.init){ pk.x=gPred.x; pk.y=gPred.y; pk.fx=gPred.fx; pk.fy=gPred.fy; pk.dr=gPred.dir; pk.mv=gPred.moving?1:0; }
      return pk;
    }
    // send the instant input changes (force=true for the periodic heartbeat resend);
    // the channel is unreliable, so the heartbeat corrects any dropped/lost key change.
    function sendInput(force){
      if(!(NET.conn && NET.conn.open)) return;
      const p = inputPacket(), sig = (p.u?1:0)+''+(p.dn?1:0)+(p.l?1:0)+(p.r?1:0)+(p.p?1:0)+(p.g?1:0);
      if(!force && sig===lastSig) return;   // nothing changed → don't spam (also swallows key-repeat)
      lastSig = sig;
      try{ NET.conn.send(p); }catch(e){}
    }
    const swallow = e => {
      const down = e.type==='keydown';
      try{ initAudio(); }catch(_e){}                                // first key is the user gesture that unlocks local audio
      // Escape isn't part of the input packet: it asks the host to toggle the shared pause (edge-triggered)
      if(e.code==='Escape' && down && !gk[e.code] && NET.conn && NET.conn.open){ try{ NET.conn.send({pt:1}); }catch(_e){} }
      if(gk[e.code]!==down){ gk[e.code]=down; sendInput(false); }   // fire the moment a key toggles
      e.preventDefault();
      e.stopImmediatePropagation();
    };
    addEventListener('keydown', swallow, true);
    addEventListener('keyup',   swallow, true);

    const peer = new Peer(); NET.peer = peer;
    peer.on('open', () => {
      const conn = peer.connect(joinId, { reliable:false }); NET.conn = conn;
      conn.on('data',  d => { try{ netOnSnapshot(d); if(banner) banner.style.display='none'; }catch(_e){} });
      conn.on('open',  () => { setBanner('Conectado - esperando al anfitrión…'); lastSig=''; sendInput(true); });
      conn.on('close', () => { NET.guestReady=false; setBanner('Anfitrión desconectado.'); });
    });
    peer.on('error', e => setBanner('Error de conexión: ' + e.type));

    // stream our pose + input ~30×/s so the host tracks our client-authoritative position smoothly and
    // any dropped packet (unreliable channel) self-corrects on the next tick. Instant key-toggle sends
    // (above) still fire immediately so punches/attacks stay crisp.
    setInterval(() => sendInput(true), 33);

  } else {
    // ----------------------------- HOST ------------------------------
    NET.role = 'host';
    const inGame = () => state===STATE.PLAY||state===STATE.BREAK||state===STATE.INTRO||state===STATE.PAUSE||state===STATE.DYING;
    const peer = new Peer(); NET.peer = peer;
    peer.on('open', id => {
      NET.link = location.origin + location.pathname + '?r=' + id;
      if(linkBox) linkBox.value = NET.link;
      setStatus('Comparte el enlace con hasta 3 amigos. Cuando estén conectados, empieza la partida.');
    });
    peer.on('connection', conn => {
      // lowest free slot 1-3, so a leaver's spot can be re-taken by a new (or returning) guest
      const used=new Set(NET.conns.map(g=>g.slot));
      let slot=1; while(used.has(slot)) slot++;
      if(slot>3){ try{ conn.close(); }catch(e){} return; }   // 4-player max (host + 3)
      const guest = { conn, keys:{}, slot };
      NET.conns.push(guest);
      setStatus('¡'+NET.conns.length+' jugador(es) conectado(s)! Empieza (o reinicia) la partida. (J'+(slot+1)+' listo)');
      conn.on('data', d => { if(d && d.pt){ togglePause(); return; } applyRemote(guest, d); });   // guest→host input / pose / pause-toggle packets
      conn.on('close', () => {
        const ci=NET.conns.indexOf(guest); if(ci>=0) NET.conns.splice(ci,1);
        // mark their player departed: no more input, down until they reconnect, and
        // startRound/spawnBreakItems stop counting them from the next round on
        const p=players[guest.slot];
        if(p && p.netRemote===guest){
          p.departed=true; p.netRemote=null; p.keysrc={};
          if(p.alive){ p.alive=false; p.hp=0; p.deathAnim=0; spark(p.x,p.y,p.color,20,180); }
        }
        setStatus('J'+(guest.slot+1)+' se desconectó.');
      });
      // (snapshots are broadcast from the main loop via netBroadcast — nothing to set up per-connection)
      // if a game is already running, slot this guest in live
      if(inGame()){
        guest.grace=0.6;   // hold host-authoritative pos briefly until the guest's pose stream catches up
        if(players[guest.slot]){ const rp=players[guest.slot]; rp.departed=false; rp.keysrc = guest.keys; rp.netRemote = guest; }   // returning guest counts (and revives at break) again
        else if(players.length<4){
          const i=players.length, sy=(currentMap==='stonebridge')?344:WORLD_H/2;
          // mid-game joiner: random character, but NEVER one already taken by another player
          const taken=new Set(players.map(pp=>pp.kind));
          const kind=shuffledChars().find(k=>!taken.has(k))||'michi';
          const p=makePlayer(kind, WORLD_W/2 + (i-1)*44, sy, {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',punch:'Comma',gear:'Period'});
          p.keysrc=guest.keys; p.netRemote=guest;
          // Joining mid-round? Sit them out (dead/hidden) until the next round starts, so nobody can
          // leave-and-rejoin at full health to dodge a loss. Joining during the break/intro is fine.
          if(state===STATE.PLAY){ p.pending=true; p.alive=false; p.hp=0; }
          players.push(p);
          mode=2;   // a solo online host is no longer solo (mode is otherwise only set at startGame)
        }
      }
    });
    peer.on('error', e => setStatus('Error PeerJS: ' + e.type));
    if(copyBtn && linkBox) copyBtn.onclick = () => {
      linkBox.select(); try{ document.execCommand('copy'); }catch(e){}
      copyBtn.textContent='¡Copiado!'; setTimeout(()=>copyBtn.textContent='Copiar',1500);
    };
  }
})();

})();

</script>
