    if(PROP.machubg && PROP.machubg.naturalWidth){ drawImageCover(PROP.machubg); ctx.fillStyle='rgba(10,20,40,0.22)'; ctx.fillRect(0,0,W,H); }
    else { ctx.fillStyle='#7ec3e8'; ctx.fillRect(0,0,W,H); }
    pvpEnsureBG(); ctx.drawImage(pvp.bgc,0,0);
    ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,W,H);
  }
  ctx.textAlign='center';
  ctx.fillStyle='#ffe9b0'; ctx.font='bold 28px Courier New';
  ctx.fillText(overlay?'ELIGE TU PERSONAJE':(opts.title||'VERSUS — ELIGE TU PERSONAJE'), W/2, 78);
  if(overlay){ ctx.fillStyle='#aef7c2'; ctx.font='bold 14px Courier New'; ctx.fillText('Entras al empezar la próxima ronda', W/2, 104); }
  const n=roster.length, perRow=charsPerRow(n), rows=Math.ceil(n/perRow);
  const cw=(rows>1)?160:((n>4)?160:200), gap=16, rowGap=12;
  const cy=(rows>1)?100:128, chh=(rows>1)?242:330;
  for(let i=0;i<n;i++){
    const k=roster[i], row=Math.floor(i/perRow), col=i%perRow;
    const rowN=Math.min(perRow, n-row*perRow), rowW=rowN*cw+(rowN-1)*gap;
    const cx=(W-rowW)/2+col*(cw+gap), cyR=cy+row*(chh+rowGap);
    const takenBy=entries.findIndex(pl=>pl && !pl.departed && pl.selKind && pl.kind===k);
    ctx.fillStyle='rgba(18,14,8,0.85)'; ctx.fillRect(cx,cyR,cw,chh);
    drawCardArt(k, cx+10, cyR+12, cw-20, chh-112);
    ctx.fillStyle=CHARS[k].color; ctx.font='bold 15px Courier New'; ctx.fillText(CHARS[k].name, cx+cw/2, cyR+chh-64);
    if(currentMap!=='laspalmas'){ ctx.fillStyle='#bdb190'; ctx.font='11px Courier New'; ctx.fillText(CHARS[k].tag||(CHARS[k].heavy?'Fuerte / Lento':'Ágil / Rápido'), cx+cw/2, cyR+chh-46); }
    if(takenBy>=0){   // first come, first served — grey it out for everyone else
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(cx,cyR,cw,chh);
      ctx.fillStyle=PVP_SEL_COLS[takenBy%4]; ctx.font='bold 15px Courier New';
      ctx.fillText('J'+(takenBy+1)+(takenBy===mySlot?' (TÚ)':''), cx+cw/2, cyR+chh-16);
    }
    let ring=0;   // one cursor ring per player still choosing
    entries.forEach((pl,pi)=>{
      if(!pl || pl.departed || pl.selKind || (pl.selCur||0)!==i) return;
      const off=2+ring*7; ctx.strokeStyle=PVP_SEL_COLS[pi%4]; ctx.lineWidth=(pi===mySlot)?4:2;
      ctx.strokeRect(cx+off,cyR+off,cw-2*off,chh-2*off); ring++;
    });
  }
  const botY=cy+rows*(chh+rowGap)-rowGap;
  const meP=entries[mySlot], active=entries.filter(pl=>pl && !pl.departed);
  ctx.font='bold 17px Courier New';
  if(active.length && active.every(pl=>pl.selKind)){ ctx.fillStyle='#ffe14a'; ctx.fillText('¡COMENZANDO!', W/2, botY+40); }
  else if(meP && meP.selKind){ ctx.fillStyle='#aef7c2'; ctx.fillText('Listo — esperando a los demás…', W/2, botY+40); }
  else { ctx.fillStyle='#ffe14a'; ctx.fillText('←/→: elegir · ↑/↓: fila · Espacio: confirmar', W/2, botY+40); }
  ctx.fillStyle='#9a8f75'; ctx.font='12px Courier New';
  ctx.fillText('Primer llegado, primer servido — cada personaje solo puede elegirse una vez', W/2, botY+62);
  ctx.textAlign='left';
}

function togglePause(){
  // Online: the host owns the pause. Entering STATE.PAUSE freezes the authoritative simulation, and

function specCycle(dir){

function updateCamera(){
  if(WORLD_W<=W && WORLD_H<=H){ camX=0; camY=0; return; }
  // Modo Infinito ONLINE: every machine's camera follows ITS OWN player — the host's screen is just
  // another player's view and guests render their own — so nobody drags anyone across the map, and
  // players are NOT clamped into a shared view (they roam the whole map; edge arrows point at the
  // others). Dead: the camera holds on your body (the revive marker). No own player (late-join
  // spectator): fall through to the group camera. Local co-op (one shared screen) keeps the old rule.
  if(survival && (NET.role==='guest' || NET.hosting || players.length===1)){   // offline solo joins the me-follow path (Ticla lookahead works there too)
    const me=players[NET.role==='guest'?NET.slot:0];
    if(me && !me.departed){
      let anchor=me;
      if(!me.alive){
        // Dead: spectate a RANDOM living teammate, and stick with them until they fall too (then
        // hop to another). The moment you're revived the camera snaps back to your own character.
        // Nobody left alive → hold on your own body (the game-over is a frame away anyway).
        let sp=(gSpecIdx!=null && players[gSpecIdx])?players[gSpecIdx]:null;
        if(!sp || sp===me || !sp.alive || sp.departed){
          const opts=[]; for(let i=0;i<players.length;i++){ const q=players[i]; if(q && q!==me && q.alive && !q.departed) opts.push(i); }
          gSpecIdx = opts.length ? opts[randi(0,opts.length-1)] : null;
          sp = (gSpecIdx!=null) ? players[gSpecIdx] : null;
        }
        if(sp) anchor=sp;
      } else gSpecIdx=null;
      // plain follow — the Ticla lookahead experiment made riders dizzy, so the camera treats the
      // bike exactly like walking
      camX=clamp(anchor.x - W/2, 0, Math.max(0,WORLD_W - W));
      camY=clamp(anchor.y - H/2, 0, Math.max(0,WORLD_H - H));
      if(!Number.isFinite(camX)) camX=0; if(!Number.isFinite(camY)) camY=0;
      return;
    }
  }
  const al=players.filter(p=>p.alive);
  let cx,cy;
  if(al.length){ let sx=0,sy=0; for(const p of al){sx+=p.x;sy+=p.y;} cx=sx/al.length; cy=sy/al.length; if(currentMap==='machu'){ let se=0; for(const p of al) se+=machuElev(p.x); cy+=se/al.length; } }
  else { cx=camX+W/2; cy=camY+H/2; }
  if(!Number.isFinite(cx)) cx=camX+W/2; if(!Number.isFinite(cy)) cy=camY+H/2;
  camX=clamp(cx - W/2, 0, Math.max(0,WORLD_W - W));
  camY=clamp(cy - H/2, 0, Math.max(0,WORLD_H - H));
  if(!Number.isFinite(camX)) camX=0; if(!Number.isFinite(camY)) camY=0;
  const mx=46, mt=62, mb=46;

}

    if(!o){ o={animTime:Math.random()*2, wob:Math.random()*6.28}; gEnemMap[se.id]=o; }
    if(freshE){
      const st=estatic[se.id]; if(st){ for(const kk in st) o[kk]=st[kk]; o._hasStatic=true; }   // sticky once received

    }
    o.animTime=(o.animTime||0)+dt; o.wob=(o.wob||0)+dt*6;
    if(interp && aEnem[se.id]){ const pa=aEnem[se.id]; o.x=pa.x+(se.x-pa.x)*alpha; o.y=pa.y+(se.y-pa.y)*alpha; }
    else { o.x=se.x; o.y=se.y; }

    const sp=src.players[i], rp=netRenderPlayer(sp);

      // host round-trip; the host adopts it from the input stream and the snapshot converges
      if(NET.guestWeapon && weaponOwned(rp, NET.guestWeapon)) rp.weapon=NET.guestWeapon;
    }
    else if(interp && a.players[i]){ rp.x=a.players[i].x+(sp.x-a.players[i].x)*alpha; rp.y=a.players[i].y+(sp.y-a.players[i].y)*alpha; }
    const pv=players[i]; if(pv && !sp.alive && pv.flapFreeze!=null) rp.flapFreeze=pv.flapFreeze;   // keep the Cóndor wing-freeze across per-frame rebuilds

  players=np;

  apuchis.length=0; const seenA={};
  for(const sa of cur.apuchis){
    let o=gApuMap[sa.id]; if(!o){ o={bob:Math.random()*6.28, spawn:0, r:18}; gApuMap[sa.id]=o; }
    o.type=sa.type; o.x=sa.x; o.y=sa.y; o.bob+=dt*7; if(o.spawn<1) o.spawn=Math.min(1,o.spawn+dt*3);
    seenA[sa.id]=1; apuchis.push(o);
  }
  for(const id in gApuMap){ if(!seenA[id]) delete gApuMap[id]; }
  // AI allies — persistent objects (anim clocks tick locally), positions interpolated like enemies'
  { const aN = interp ? _byId(a.npcs||[]) : null; const seenN={};
    npcs.length=0;
    for(const sn of (src.npcs||[])){
      let o=gNpcMap[sn.id]; if(!o){ o=makeNpc(sn.kind, sn.x, sn.y); o.id=sn.id; gNpcMap[sn.id]=o; }
      o.npcState=sn.st?'active':'idle'; o.hp=sn.hp; o.maxhp=sn.maxhp; o.dir=sn.dir||o.dir; o.moving=!!sn.mv;
      o.punchAnim=sn.pa||0; o.hitFlash=sn.hf||0; if(typeof sn.fx==='number'){ o.facing.x=sn.fx; o.facing.y=sn.fy; }
      o.animTime+=dt; o.tagBob+=dt*3;
      if(interp && aN && aN[sn.id]){ const pn2=aN[sn.id]; o.x=pn2.x+(sn.x-pn2.x)*alpha; o.y=pn2.y+(sn.y-pn2.y)*alpha; }
      else { o.x=sn.x; o.y=sn.y; }
      seenN[sn.id]=1; npcs.push(o);
    }
    for(const id in gNpcMap){ if(!seenN[id]) delete gNpcMap[id]; }
  }
  // Super Ayuda — singleton: pose/state replicate, the step clock ticks locally, position interpolates
  { const sT=src.tio;
    if(!sT) tio=null;
    else {
      if(!tio || !tio._guest) tio={_guest:1, animT:Math.random()*10, radius:16, kills:0, tauntKills:0};
      tio.hp=sT.hp; tio.maxhp=sT.mh; tio.state=sT.st; tio.dir8=sT.d8||2; tio.moving=!!sT.mv;

      if(interp && a.tio){ tio.x=a.tio.x+(sT.x-a.tio.x)*alpha; tio.y=a.tio.y+(sT.y-a.tio.y)*alpha; }
      else { tio.x=sT.x; tio.y=sT.y; }
      tio.animT+=dt;
    }
  }
  lpItems.length=0; for(const it of (cur.lpItems||[])) lpItems.push({id:it.id, kind:it.kind, x:it.x, y:it.y, bob:time*6, spawn:1});
  hearts.length=0; for(const h of cur.hearts) hearts.push({x:h.x, y:h.y, bob:time*4, spin:time*3, life:16});
  if(cur.amuleto){ if(!amuleto) amuleto={bob:0, spin:0}; amuleto.x=cur.amuleto.x; amuleto.y=cur.amuleto.y; amuleto.item=cur.amuleto.item; amuleto.bob+=dt*4; amuleto.spin+=dt*2; }
  else amuleto=null;
  fx_effects.length=0; for(const f of cur.fx) fx_effects.push(f);

  // projectiles / pickups: resync from the authoritative snapshot, then dead-reckon locally between
  // snapshots so fast-moving shots stay smooth at 60fps (they travel in straight lines).
  if(gProjSeq!==cur.seq){
    gProjSeq=cur.seq;
    leaves.length=0;   for(const l of cur.leaves||[])  leaves.push({...l});
    bullets.length=0;  for(const bu of cur.bullets||[]) bullets.push({...bu});
    grenades.length=0; for(const g of cur.grenades||[]) grenades.push({...g});
    rays.length=0;     for(const r of cur.rays||[])    rays.push({...r});
    iceBeams.length=0; for(const b2 of cur.ice||[])    iceBeams.push({...b2});
    nuggets.length=0;  for(const g of cur.nuggets||[]) nuggets.push({...g});
    wallets.length=0;  for(const w of cur.wallets||[]) wallets.push({...w});
    turretArrows.length=0; for(const r2 of cur.tarrows||[]) turretArrows.push({...r2});
  }
  // boss-drop gadgets: bombs / turrets / drop crates replicate wholesale each snapshot
  bombs.length=0;     for(const b3 of cur.bombs||[])   bombs.push({...b3});
  decoys.length=0;    for(const d3 of cur.decoys||[])  decoys.push({...d3});
  bikes.length=0;     for(const b3 of cur.bikes||[])   bikes.push({...b3});
  corpses.length=0;   for(const c2 of cur.corpses||[]) corpses.push({...c2});
  mines.length=0;     for(const m of cur.mines||[])    mines.push({...m});
  turrets.length=0;   for(const t2 of cur.turrets||[]) turrets.push({...t2});
  bossDrops.length=0; for(const d2 of cur.drops||[])   bossDrops.push({...d2});
  // Inca walls also live inside `obstacles` (own-player prediction collides with them), so the
  // obstacle list is rebuilt from the pristine map layout whenever the replicated wall set changes
  { let sig=''; for(const w2 of cur.incaW||[]) sig+=w2.id+':'+w2.hp+',';
    if(sig!==gWallSig){
      gWallSig=sig;
      incaWalls.length=0;
      for(const w2 of cur.incaW||[]) incaWalls.push({x:w2.x, y:w2.y, w:GRID, h:GRID, t:'incaWall', hp:w2.hp, maxhp:wallMaxHp(), id:w2.id});
      const base=(currentMap==='stonebridge')?OBST_STONEBRIDGE:(currentMap==='templo')?OBST_TEMPLO:(currentMap==='machu')?OBST_MACHU:(currentMap==='laspalmas')?[]:OBST_AMAZONAS;
      obstacles=base.concat(incaWalls);
    } }
  for(const l of leaves){  l.x+=(l.vx||0)*dt; l.y+=(l.vy||0)*dt; }
  for(const bu of bullets){ bu.x+=(bu.vx||0)*dt; bu.y+=(bu.vy||0)*dt; }
  for(const g of grenades){ g.x+=(g.vx||0)*dt; g.y+=(g.vy||0)*dt; const gd=Math.pow(NADE_DRAG,dt); g.vx*=gd; g.vy*=gd; }
  for(const r of rays){    r.x+=(r.vx||0)*dt; r.y+=(r.vy||0)*dt; }
  for(const r2 of turretArrows){ r2.x+=(r2.vx||0)*dt; r2.y+=(r2.vy||0)*dt; }
  for(const g of nuggets){ g.x+=(g.vx||0)*dt; g.y+=(g.vy||0)*dt; g.bob=(g.bob||0)+dt*8; }
  for(const b2 of iceBeams){ b2.life-=dt; }               // fade the beam smoothly; resync restores it
  for(const w of wallets){ w.bob=(w.bob||0)+dt*4; w.spin=(w.spin||0)+dt*1.5; }

  // local audio cues driven off snapshot deltas
  if(gPrevRound===-999) gPrevRound=cur.round;
  try{ if(!survival && cur.state===STATE.PLAY && cur.round!==gPrevRound) playRoundStart(cur.round); }catch(e){}
  try{ netGuestMusic(cur.state); }catch(e){}
  gPrevRound=cur.round;
}

// ================= ONLINE MULTIPLAYER (state-replicated + client prediction, over PeerJS) =================
// Host: runs the authoritative simulation, broadcasts ~18 world-snapshots/s to every guest, and feeds
//       each guest's keypresses into its own player (slots 1-3) via that connection's keys object.
// Guest: renders the replicated world locally with real sprites, interpolates non-owned entities, and
//        predicts its OWN player from local input for zero-latency movement. (See netApply* above.)
(function initNet(){
  const $ = id => document.getElementById(id);
  const statusEl=$('netstatus'), linkBox=$('netlink'), copyBtn=$('netcopy'), panel=$('netui'),
        vid=$('remotevideo'), wrap=$('wrap'), banner=$('netbanner');
  const setStatus = t => { if(statusEl) statusEl.textContent = t; };
  const setBanner = t => { if(banner){ banner.style.display='block'; banner.textContent=t; } };
  if(typeof Peer === 'undefined'){ setStatus('No se pudo cargar PeerJS (¿sin internet?).'); return; }

  const joinId = new URLSearchParams(location.search).get('r');

  // translate a guest's normalized input into the canonical control codes fed into its host-side player
  function applyRemote(guest, d){
    const keysObj = guest.keys;
    keysObj['ArrowUp']    = !!d.u;
    keysObj['ArrowDown']  = !!d.dn;
    keysObj['ArrowLeft']  = !!d.l;
    keysObj['ArrowRight'] = !!d.r;
    keysObj['Comma']      = !!d.p;
    keysObj['Period']     = !!d.g;
    // guest's weapon choice: host adopts it (only if that slot is actually owned on the authoritative side)
    if(d.w && players[guest.slot] && weaponOwned(players[guest.slot], d.w)) players[guest.slot].weapon=d.w;
    // guest asks to send soles to a teammate — the host validates and applies (floatText + coin replicate back)
    if(d.mt && survival && players[guest.slot]) doTransfer(guest.slot, d.mt.to|0, d.mt.amt|0);
    // client-authoritative movement: adopt the pose the guest simulated locally (its own player runs
    // with zero input latency). Attacks/damage stay host-authoritative via the keys above.
    if(typeof d.x==='number' && typeof d.y==='number'){
      // NOTE: fx/fy legitimately hit 0 when aiming along an axis — `d.fy||1` would turn a
      // horizontal aim into a diagonal one (that bent Morganita beams 45° for guests).
      guest.pose = { x:d.x, y:d.y,
        fx:(typeof d.fx==='number'?d.fx:0), fy:(typeof d.fy==='number'?d.fy:1),
        dir:d.dr||'s', mv:!!d.mv };
    }
  }

  if(joinId){
    // ----------------------------- GUEST -----------------------------
    NET.role = 'guest';
    // the guest renders its own world (real sprites) and plays its own audio, so DON'T mute/hide it.
    if(panel) panel.style.display='none';
    if(vid)   vid.style.display='none';   // no more incoming video track
    if(wrap)  wrap.style.display='';       // show the local canvas — this is what the guest actually plays on
    setBanner('Conectando con el anfitrión…');

    // capture our keys: feed them to local prediction (NET.guestKeys) AND ship them to the host, but
    // STOP them reaching the local menu/game state machine (which the guest never drives directly).
    const gk = {};
    NET.guestKeys = gk;
    let lastSig = '';
    function inputPacket(){
      // PVP info overlay open: we're reading the menu — send no actions (our pose freezes via prediction too)
      const blk = (state===STATE.PVP && pvpInfo);
      const pk = {
        u:  !blk&&!!(gk['KeyW']||gk['ArrowUp']),    dn: !blk&&!!(gk['KeyS']||gk['ArrowDown']),
        l:  !blk&&!!(gk['KeyA']||gk['ArrowLeft']),  r:  !blk&&!!(gk['KeyD']||gk['ArrowRight']),
        p:  !blk&&!!(gk['Space']||gk['Comma']),     g:  !blk&&!!(gk['KeyF']||gk['Period'])
      };
      // stream our locally-simulated pose so the host adopts it verbatim (client-authoritative movement,
      // zero input round-trip). Only once prediction has a real position to report.

      if(down){ try{ if(introUnmute) introUnmute(); }catch(_e){} }  // intro clip rolling muted (autoplay fallback) → this gesture un-mutes it
      // Modo Infinito weapon switch — the page-level keydown hook never runs here (this handler
      // swallows the event), so mirror it: digits pick the Nth owned weapon, Q/E cycle
      if(down && survival && state===STATE.PLAY && !gk[e.code]){

            if(n>=0 && n<own.length){ lp.weapon=own[n]; NET.guestWeapon=lp.weapon; sendInput(true); }
          } else if(e.code==='KeyQ'||e.code==='KeyE'){

          } else if(!lp.alive && !lp.departed && (e.code==='KeyA'||e.code==='ArrowLeft'||e.code==='KeyD'||e.code==='ArrowRight')){
            specCycle((e.code==='KeyA'||e.code==='ArrowLeft')?-1:1);   // dead: hop between living teammates
          }
        }
      }
      // Escape isn't part of the input packet. Horda: it asks the host to toggle the shared pause
      // (edge-triggered). PVP: pause is local-only — toggle our own info overlay, the duel keeps running.
      if(e.code==='Escape' && down && !gk[e.code]){
        // on the Horda pick screen (replicated via {_nsel}): ask the host to un-pick our character
        // so we can choose again. (No {pt:1} pause here — there's nothing to pause yet.)
        const nselMe = NET.nsel && NET.nsel.list && NET.nsel.list[NET.slot];
        if(NET.nsel){
          if(nselMe && nselMe.skd && NET.conn && NET.conn.open){ try{ NET.conn.send({ds:1}); }catch(_e){} }
        }
        else if(state===STATE.PVP){

        }
        else if(state===STATE.PAUSE && pauseView==='settings'){ pauseView='main'; }   // back out of MY settings, don't unpause the room

      }
      // local pause-menu navigation (PVP overlay AND the horda shared pause): CONTINUAR / AJUSTES —
      // the volume sliders change THIS machine's localStorage volumes, nothing is sent to the host
      if(state===STATE.PVP && pvpInfo && down && !gk[e.code]){
        const c=e.code;
        if(pvp.pauseView==='settings'){
          if(c==='ArrowUp'||c==='ArrowDown'||c==='KeyW'||c==='KeyS') setSel=(setSel+1)%2;
          else if(c==='ArrowLeft'||c==='KeyA') adjustVol(setSel,-0.1);
          else if(c==='ArrowRight'||c==='KeyD') adjustVol(setSel,0.1);
          else if(c==='Enter') pvp.pauseView='main';
        } else {
          if(c==='ArrowLeft'||c==='KeyA'||c==='ArrowRight'||c==='KeyD') pvp.pauseSel=(pvp.pauseSel+1)%2;
          else if(c==='Enter'||c==='Space'){ if(pvp.pauseSel===1){ pvp.pauseView='settings'; setSel=0; } else pvpInfo=false; }
        }
      }
      if(state===STATE.PAUSE && down && !gk[e.code]){
        const c=e.code;
        if(pauseView==='settings'){
          if(c==='ArrowUp'||c==='ArrowDown'||c==='KeyW'||c==='KeyS') setSel=(setSel+1)%2;
          else if(c==='ArrowLeft'||c==='KeyA') adjustVol(setSel,-0.1);
          else if(c==='ArrowRight'||c==='KeyD') adjustVol(setSel,0.1);
          else if(c==='Enter') pauseView='main';
        } else {
          if(c==='ArrowUp'||c==='ArrowDown'||c==='KeyW'||c==='KeyS') pauseSel=(pauseSel+1)%2;
          else if(c==='Enter'){ if(pauseSel===1){ pauseView='settings'; setSel=0; } else if(NET.conn && NET.conn.open){ try{ NET.conn.send({pt:1}); }catch(_e){} } }
        }
      }
      // ---- guest soles-transfer menu: P toggles; while open the ARROWS + Enter drive the menu
      // instead of movement (WASD still moves and Space still shoots) ----
      if(down && survival && state===STATE.PLAY && e.code==='KeyP' && !gk[e.code]){
        gXfer.open=!gXfer.open; gXfer.amt=10;
        gk['ArrowUp']=gk['ArrowDown']=gk['ArrowLeft']=gk['ArrowRight']=false; sendInput(true);
      }
      if(gXfer.open && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].indexOf(e.code)>=0){
        if(down && !gk['_x'+e.code]){
          if(e.code==='ArrowUp') gXfer.sel--; else if(e.code==='ArrowDown') gXfer.sel++;
          else if(e.code==='ArrowLeft') gXfer.amt=Math.max(10,gXfer.amt-10); else if(e.code==='ArrowRight') gXfer.amt=Math.min(990,gXfer.amt+10);
          else if(e.code==='Enter'){
            const t=xferTargets(NET.slot);
            if(t.length && NET.conn && NET.conn.open){ gXfer.sel=((gXfer.sel%t.length)+t.length)%t.length;
              try{ NET.conn.send({mt:{to:t[gXfer.sel], amt:gXfer.amt}}); }catch(_e){} }
          }
        }
        gk['_x'+e.code]=down;   // private edge tracker — the real gk arrow states stay false while the menu is open
        e.preventDefault(); e.stopImmediatePropagation(); return;
      }
      if(gk[e.code]!==down){ gk[e.code]=down; sendInput(false); }   // fire the moment a key toggles
      e.preventDefault();
      e.stopImmediatePropagation();
    };
    addEventListener('keydown', swallow, true);
    addEventListener('keyup',   swallow, true);

    const peer = new Peer(); NET.peer = peer;
    // Opening the WebRTC data channel is NOT reliable: the handshake can silently stall (a dropped
    // ICE packet, or the host momentarily off the signaling server) and leave this guest stuck on
    // "Conectando con el anfitrión…" forever — while other guests get in fine. So keep (re)trying
    // until a channel actually opens, tearing down each half-open attempt before the next.
    let joined=false, connTimer=null, attempt=0, lastDataT=performance.now();
    const clearConnTimer=()=>{ if(connTimer){ clearTimeout(connTimer); connTimer=null; } };
    function tryConnect(){
      if(joined || NET.role!=='guest') return;
      clearConnTimer();
      if(NET.conn){ try{ NET.conn.close(); }catch(_e){} }   // retire the previous half-open attempt first
      attempt++; lastDataT=performance.now();
      setBanner(attempt>1 ? 'Reintentando conexión ('+attempt+')…' : 'Conectando con el anfitrión…');
      let conn;
      try{ conn = peer.connect(joinId, { reliable:false }); }catch(_e){ connTimer=setTimeout(tryConnect,2000); return; }
      NET.conn = conn;
      const onUp=()=>{ if(joined) return; joined=true; clearConnTimer(); lastSig=''; };
      conn.on('data',  d => { onUp(); lastDataT=performance.now(); try{ netOnSnapshot(d); if(banner) banner.style.display='none'; }catch(_e){} });
      conn.on('open',  () => { onUp(); setBanner('Conectado - esperando al anfitrión…'); sendInput(true); });
      conn.on('close', () => { NET.guestReady=false; if(joined){ joined=false; setBanner('Conexión perdida. Reconectando…'); tryConnect(); } });
      conn.on('error', () => {});                              // recovered by the retry timer / peer 'error' below
      connTimer=setTimeout(()=>{ if(!joined) tryConnect(); }, 5000);   // handshake didn't finish → drop it and retry
    }
    // A healthy host streams SOMETHING at ~18Hz in every state (snapshots / pick screen / {_wait}),
    // so a channel that reports open but goes >6s without data is a half-open handshake the host
    // never registered ("Esperando al anfitrión…" forever). Tear it down and reconnect fresh.
    // While the room is PAUSED (host alt-tabbed — its hidden tab heartbeats ~1Hz, throttled), be far
    // more patient before declaring the channel dead.
    setInterval(()=>{
      const lim=(state===STATE.PAUSE || (state===STATE.PVP && pvp.paused)) ? 30000 : 6000;
      if(joined && performance.now()-lastDataT>lim){
        joined=false; NET.guestReady=false; NET.nsel=null;
        setBanner('Conexión inestable. Reintentando…');
        tryConnect();
      }
    }, 2000);
    peer.on('open', tryConnect);
    // idle or a network blip can drop us from the signaling server; rejoin so we can (re)connect
    peer.on('disconnected', () => { if(!joined){ try{ peer.reconnect(); }catch(_e){} } });
    peer.on('error', e => {
      const t=(e&&e.type)||'';
      // "peer-unavailable" = the host id isn't registered on the server yet (host still loading, or it
      // briefly dropped off). All of these are transient — keep retrying instead of giving up.
      if(!joined && (t==='peer-unavailable'||t==='network'||t==='server-error'||t==='socket-error'||t==='socket-closed'||t==='disconnected')){
        setBanner('Buscando al anfitrión… (reintentando)');
        clearConnTimer(); connTimer=setTimeout(tryConnect, 2000);
      } else if(!joined){
        setBanner('Error de conexión: ' + t);
      }
    });

    // stream our pose + input ~30×/s so the host tracks our client-authoritative position smoothly and
    // any dropped packet (unreliable channel) self-corrects on the next tick. Instant key-toggle sends
    // (above) still fire immediately so punches/attacks stay crisp.
    setInterval(() => sendInput(true), 33);

  } else {
    // ----------------------------- HOST ------------------------------
    NET.role = 'host';
    const inGame = () => state===STATE.PLAY||state===STATE.BREAK||state===STATE.INTRO||state===STATE.PAUSE||state===STATE.DYING;
    const peer = new Peer(); NET.peer = peer;
    // if idle or a network blip drops the host off the signaling server, guests can no longer find us
    // ("peer-unavailable" → stuck on Conectando…). Rejoin the server so new guests keep connecting.
    peer.on('disconnected', () => { try{ peer.reconnect(); }catch(_e){} });
    peer.on('open', id => {
      NET.link = location.origin + location.pathname + '?r=' + id;
      if(linkBox) linkBox.value = NET.link;
      setStatus('Comparte el enlace con tus amigos. Cuando estén conectados, empieza la partida.');
    });
    // Drop a guest connection and (unless soft) mark their player departed. Shared by the per-conn
    // 'close' handler, the same-peer reconnect dedupe, and the silence prune below. soft = the same
    // person is taking the slot right back (channel replacement) — don't kill their live player.
    function hostDropGuest(guest, soft){
      const ci=NET.conns.indexOf(guest); if(ci<0) return;
      NET.conns.splice(ci,1);
      try{ if(guest.conn) guest.conn.close(); }catch(e){}
      const p=players[guest.slot];
      if(p && p.netRemote===guest){
        p.netRemote=null; p.keysrc={};
        if(!soft){
          // the leaver's character VANISHES (no corpse, no death pose, no revive prompt, no HUD bar)
          // and stops counting as a player — their slot and character free up for the next joiner
          p.departed=true;
          if(p.alive) spark(p.x,p.y,p.color,20,180);
          p.alive=false; p.hp=0; p.deathAnim=null; p.deadT=0; p.fell=false; p.pending=true;   // pending → drawPlayer draws nothing
        }
      }
      if(!soft) setStatus('J'+(guest.slot+1)+' se desconectó.');
    }
    // Ghost sweep: every live guest streams input ~30×/s, so a connection with no data for 9s (or
    // one that never sent anything within 8s of appearing) is a dead half-open channel. Left alone,
    // those ghosts count as players when a round starts — that's how a 4-player room ended up with
    // a fifth AFK character standing at spawn. Called from netBroadcast/enterNetSelect/startGame.
    NET._prune=function(){
      const now=performance.now();
      for(let i=NET.conns.length-1;i>=0;i--){
        const g=NET.conns[i];
        // guests stream input ~30×/s (≥1×/s from a hidden tab), so 5s of silence = gone; that's
        // also how long a closed-without-goodbye guest's character lingers before it vanishes
        const dead = g.lastData ? (now-g.lastData>5000) : (now-g.bornT>6000);
        if(dead) hostDropGuest(g);
      }
    };
    peer.on('connection', conn => {
      // same peer reconnecting (its previous channel stalled or was replaced by the guest-side
      // watchdog): retire the old connection FIRST and hand the newcomer the same slot — otherwise
      // the stale channel keeps a phantom slot alive and the room gains a fake extra player
      const prev=conn.peer ? NET.conns.find(g=>g.conn && g.conn.peer===conn.peer) : null;
      let slot;
      if(prev){ slot=prev.slot; hostDropGuest(prev, true); }
      else {
        // lowest free slot, so a leaver's spot can be re-taken by a new (or returning) guest
        const used=new Set(NET.conns.map(g=>g.slot));
        slot=1; while(used.has(slot)) slot++;
        if(slot>=lobbyCap()){ try{ conn.close(); }catch(e){} return; }   // host + (lobbyCap-1) guests
      }
      const guest = { conn, keys:{}, slot, bornT:performance.now(), lastData:0 };
      NET.conns.push(guest);
      setStatus('¡'+NET.conns.length+' jugador(es) conectado(s)! Empieza (o reinicia) la partida. (J'+(slot+1)+' listo)');
      conn.on('data', d => {
        guest.lastData=performance.now();
        if(d && d.pt){ if(state!==STATE.PVP) togglePause(); return; }                        // pause-toggle request
        if(d && d.ds){ if(state===STATE.NETSELECT) chooserDeselect(players[guest.slot]); return; }   // un-pick request (pick screen)
        applyRemote(guest, d);   // guest→host input / pose packets
      });
      conn.on('close', () => hostDropGuest(guest));
      // (snapshots are broadcast from the main loop via netBroadcast — nothing to set up per-connection)
      // Every (re)connect is a FRESH join: a leaver's character vanished when they dropped, so a
      // returning player never resumes the old body — they enter like anyone else, with a character
      // nobody currently holds. players[] keeps one entry per slot (departed leavers stay as hidden
      // placeholders so slot numbers == array indices), so joiners REPLACE their slot's placeholder.
      const REMOTE={up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',punch:'Comma',gear:'Period'};
      const seatPlayer=p=>{ if(guest.slot<players.length) players[guest.slot]=p; else players.push(p); };
      // if a game is already running, slot this guest in live
      if(inGame()){
        guest.grace=0.6;   // hold host-authoritative pos briefly until the guest's pose stream catches up
        // Modo Infinito mid-game join: seat them PENDING (hidden, untouchable) — they enter fresh at
        // the map spawn point when the next round starts (startLpRound). A returning slot keeps its
        // character; a new joiner gets a roster character no present player holds.
        if(survival){
          const old=players[guest.slot];
          const taken=new Set(players.filter(pp=>!pp.departed).map(pp=>pp.kind));
          let kind=(old && old.kind && !taken.has(old.kind)) ? old.kind : null;
          if(!kind){ const free=SURV_CHAR_LIST.filter(k=>!taken.has(k)); kind=free.length?free[randi(0,free.length-1)]:'alfredo'; }
          // that character may be on the map as an NPC ally (idle or fighting) — it's the player's now
          for(let i=npcs.length-1;i>=0;i--){ if(npcs[i].kind===kind){ spark(npcs[i].x,npcs[i].y,npcs[i].color,14,140); npcs.splice(i,1); } }
          npcQueue=npcQueue.filter(k=>k!==kind);
          const p=makePlayer(kind, LP_SPAWN.x, LP_SPAWN.y, REMOTE);
          p.keysrc=guest.keys; p.netRemote=guest;
          p.pending=true; p.alive=false; p.hp=0; p.soles=0;
          seatPlayer(p);
          mode=2;   // a solo online host is no longer solo
          floatText(LP_SPAWN.x, LP_SPAWN.y-30, '¡J'+(guest.slot+1)+' entra la próxima ronda!', '#aef7c2');
        }
        else {
          const sy=(currentMap==='stonebridge')?344:WORLD_H/2;
          // a slot's character is LOCKED for the whole game: whoever fills this slot again (a
          // dropped player reconnecting) gets the SAME character they chose — never a reshuffle.
          // Only a brand-new slot (first-time joiner) rolls a character nobody present holds.
          const old=players[guest.slot];
          const taken=new Set(players.filter(pp=>!pp.departed).map(pp=>pp.kind));
          const kind=(old && old.kind) ? old.kind : (shuffledChars().find(k=>!taken.has(k))||'michi');
          const p=makePlayer(kind, WORLD_W/2 + (guest.slot-1)*44, sy, REMOTE);
          p.keysrc=guest.keys; p.netRemote=guest;
          // Joining mid-round? Sit them out (dead/hidden) until the next round starts, so nobody can
          // leave-and-rejoin at full health to dodge a loss. Joining during the break/intro is fine.
          if(state===STATE.PLAY){ p.pending=true; p.alive=false; p.hp=0; }
          seatPlayer(p);
          mode=2;   // a solo online host is no longer solo (mode is otherwise only set at startGame)
        }
      }
      // joining a PVP duel already in progress (or during the pick phase): they choose their
      // character first (first-come-first-serve vs the ones already taken) and spawn next round
      else if(state===STATE.PVP && pvpOnline && pvp.sub!=='off' && pvp.sub!=='matchend'){
        guest.grace=0.6;
        // slot had a character this game (a dropped player's) → the returner resumes THAT character
        // (and its win count) and spawns next round; a brand-new slot picks via the chooser
        const old=players[guest.slot];
        const pl=makePlayer((old && old.kind)||'freddy', 0,0, REMOTE);
        pl.keysrc=guest.keys; pl.netRemote=guest;
        if(old && old.kind){ pl.selKind=old.kind; pl.alive=false; pl.pending=true; pl.hp=0; pl.deathAnim=null; }
        else pvpInitChooser(pl, guest.slot);
        if(guest.slot<players.length){ players[guest.slot]=pl; if(!(old && old.kind)) pvp.wins[guest.slot]=0; }
        else { players.push(pl); pvp.wins.push(0); }
        floatText(W/2, PVP_OY+70, (old && old.kind) ? ('¡J'+(guest.slot+1)+' vuelve como '+pl.name+'!') : ('¡J'+(guest.slot+1)+' se une! Eligiendo personaje…'), '#aef7c2');
      }
      // joining while everyone is on the horda pick screen: grab a cursor and pick too
      else if(state===STATE.NETSELECT){
        const pl=makePlayer('freddy', 0,0, REMOTE);
        pl.keysrc=guest.keys; pl.netRemote=guest;
        pvpInitChooser(pl, guest.slot);
        seatPlayer(pl);
      }
    });
    peer.on('error', e => setStatus('Error PeerJS: ' + e.type));
    if(copyBtn && linkBox) copyBtn.onclick = () => {
      linkBox.select(); try{ document.execCommand('copy'); }catch(e){}
      copyBtn.textContent='¡Copiado!'; setTimeout(()=>copyBtn.textContent='Copiar',1500);
    };
  }
})();

})();

</script>
