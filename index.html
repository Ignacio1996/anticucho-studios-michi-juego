let bgMusic=null, sbMusic=null, tpMusic=null, evMusic=null, menuMusic=null, deathMusic=null, losAndesMusic=null, pvpMusic=null, actx=null, sfxGain=null, audioStarted=false;
let lpMx=[], lpMxIdx=0, lpMxNext=-1;   // Las Palmas Modo Infinito playlist (3 tracks, crossfaded in order)
const LP_MX_VOL=0.155, LP_MX_FADE=3.2;   // Las Palmas tracks are mastered hot — this loudness-matches them to the other maps
// (the old masterGain/streamDest WebRTC audio tap is gone — guests play their own audio locally)
let musicVol=0.55, sfxVol=1; try{ const mv=localStorage.getItem('fm_musicVol'); if(mv!==null) musicVol=+mv; const sv=localStorage.getItem('fm_sfxVol'); if(sv!==null) sfxVol=+sv; }catch(e){}   // start music quieter by default (raise it in AJUSTES)
let pauseView='main', pauseSel=0, setSel=0;

function applyMusicVol(){ if(bgMusic)bgMusic.volume=0.95*musicVol; if(menuMusic)menuMusic.volume=0.71*musicVol; if(sbMusic)sbMusic.volume=0.70*musicVol; if(tpMusic)tpMusic.volume=0.95*musicVol; if(evMusic)evMusic.volume=0.95*musicVol; if(deathMusic)deathMusic.volume=0.5*musicVol; if(losAndesMusic)losAndesMusic.volume=0.5*musicVol; if(pvpMusic)pvpMusic.volume=0.47*musicVol; }
function adjustVol(sel,delta){ if(sel===0){ musicVol=clamp(musicVol+delta,0,1); applyMusicVol(); } else { sfxVol=clamp(sfxVol+delta,0,1); if(sfxGain) sfxGain.gain.value=sfxVol; } try{ localStorage.setItem('fm_musicVol',musicVol); localStorage.setItem('fm_sfxVol',sfxVol); }catch(e){} } let lastWow=0, plinCount=0;
AUDIO_SRC.menu="assets/snd_019.mp3";

AUDIO_SRC.michi_sel="assets/snd_022.mp3";

AUDIO_SRC.sol_a='assets/snd_sol_a.mp3'; AUDIO_SRC.sol_b='assets/snd_sol_b.mp3'; AUDIO_SRC.sol_c='assets/snd_sol_c.mp3'; AUDIO_SRC.sol10='assets/snd_sol10.mp3';

AUDIO_SRC.pvpboom="assets/snd_047.mp4";   // AAC audio — browsers decode it like any other SFX
// PVP-only characters — dedicated voice takes
AUDIO_SRC.teddington_sel="assets/snd_teddington_sel.mp3";   // "Teddington intro"
AUDIO_SRC.teddington_die="assets/snd_teddington_die.mp3";   // "Teddington DEATH"
AUDIO_SRC.condor_sel="assets/snd_condor_sel.mp3";           // "Condor INTRO"
AUDIO_SRC.condor_die="assets/snd_condor_die.mp3";           // "Condor DEATH"
AUDIO_SRC.condor_hit="assets/snd_condor_hit.mp3";           // "Condor HIT" — every 3rd bomb he places
// The four "equilibrado" characters: INTRO on select (and on winning a PVP match), DEATH on death,
// HIT1/HIT2 rotate randomly — every 2nd connecting punch in horda, every 3rd bomb in PVP.
for(const nm of ['alfredo','mati','sebas','vannucci']){

  AUDIO_SRC[nm+'_die']="assets/snd_"+nm+"_die.mp3";
  AUDIO_SRC[nm+'_hit1']="assets/snd_"+nm+"_hit1.mp3";
  AUDIO_SRC[nm+'_hit2']="assets/snd_"+nm+"_hit2.mp3";
}
AUDIO_SRC.sebas_hit2=AUDIO_SRC.sebas_hit1;   // Sebas shipped with a single HIT take
// Flash: INTRO + DEATH only for now — no HIT takes yet, so he punches/bombs silently
AUDIO_SRC.flash_sel="assets/snd_flash_sel.mp3";
AUDIO_SRC.flash_die="assets/snd_flash_die.mp3";
const MENU_IMG={ main:new Image(), banner:new Image() };
MENU_IMG.main.src="assets/img_001.jpg"; MENU_IMG.banner.src="assets/img_002.jpg";
// Audio elements play through their own native output — they are deliberately NOT routed
// through createMediaElementSource(). That routing only existed to tap audio into a WebRTC
// stream for online guests, which the prediction redesign removed (guests play their own
// audio). Worse, a routed element whose media is cross-origin (file://, or a CDN like
// raw.githack redirecting assets to raw.githubusercontent.com) is CORS-tainted and emits
// pure SILENCE — that killed all music/SFX on CDN-hosted test builds.
const AUDIO_DIRECT = (location.protocol==='file:');   // file:// can't fetch() → SFX skip the buffer path too
function routeEl(el){ return el; }
// ---- SFX playback via decoded Web Audio buffers (cached per file) ----
// The old path created a fresh <audio> element per sound; every SFX leaked a live media
// player — after minutes of play the browser hits its media-player cap and audio first
// stutters, then new sounds go silent. BufferSource nodes are fire-and-forget.
const SFX_BUF={}, SFX_LOADING={};
function sfxBuffer(src){
  if(!actx || AUDIO_DIRECT || !src) return null;   // file:// can't fetch() → element fallback
  const b=SFX_BUF[src]; if(b) return b;
  if(b!==false && !SFX_LOADING[src]){
    SFX_LOADING[src]=true;
    try{
      fetch(src).then(r=>{ if(!r.ok) throw 0; return r.arrayBuffer(); }).then(ab=>actx.decodeAudioData(ab))
        .then(buf=>{ SFX_BUF[src]=buf; delete SFX_LOADING[src]; })
        // failed (404 / CDN throttling / undecodable) → element fallback now, but let a later
        // play retry the fetch — throttled hosts recover once the initial asset burst is over
        .catch(()=>{ SFX_BUF[src]=false; delete SFX_LOADING[src]; setTimeout(()=>{ if(SFX_BUF[src]===false) delete SFX_BUF[src]; }, 8000); });
    }catch(e){ delete SFX_LOADING[src]; }
  }
  return null;
}
// rate<1 also lowers pitch — same effect as the old preservesPitch=false + playbackRate trick.
function playSfx(src, vol, rate){
  const buf=sfxBuffer(src);
  if(buf){
    try{
      const s=actx.createBufferSource(); s.buffer=buf; if(rate) s.playbackRate.value=rate;
      const g=actx.createGain(); g.gain.value=vol;   // sfxGain applies the user's SFX volume on top
      s.connect(g); g.connect(sfxGain); s.start();
      s.onended=()=>{ try{ g.disconnect(); }catch(e){} };
      return { stop(){ try{ s.stop(); }catch(e){} }, onended(cb){ const p=s.onended; s.onended=()=>{ if(p) p(); cb(); }; } };
    }catch(e){}
  }
  // first play of a file (decode still in flight) or file:// origin: <audio> element fallback
  return playSfxElement(src, vol, rate);
}
// Pooled <audio> fallback. Creating a fresh Audio per play (and, off file://, a fresh
// createMediaElementSource that pins it in the graph forever) leaks a live media player each
// time — after enough sounds the browser hits its media-element cap and audio stutters then
// goes silent. So reuse a small ring of elements per source: an idle (paused/ended) one is
// replayed from the start, and only when all are busy do we cap out and steal the oldest.
const SFX_EL_POOL={}, SFX_EL_CAP=4;
function playSfxElement(src, vol, rate){
  try{
    let pool=SFX_EL_POOL[src]; if(!pool) pool=SFX_EL_POOL[src]=[];
    let a=null;
    for(const el of pool){ if(el.paused || el.ended){ a=el; break; } }
    if(!a){
      if(pool.length<SFX_EL_CAP){ a=routeEl(new Audio(src)); pool.push(a);
        // a failed load (404 / CDN throttling) must not poison the pool — drop it so the next play retries
        a.addEventListener('error',()=>{ const i=pool.indexOf(a); if(i>=0) pool.splice(i,1); }); }
      else { a=pool.shift(); pool.push(a); try{ a.pause(); }catch(e){} }   // all busy → steal oldest
    }
    try{ a.currentTime=0; }catch(e){}
    a.volume=Math.min(1, vol*sfxVol);   // element volume caps at 1 (boosted voices only amplify on the Web Audio path)
    a.preservesPitch=a.mozPreservesPitch=a.webkitPreservesPitch=!rate;
    a.playbackRate=rate||1;
    a.play().catch(()=>{});
    return { stop(){ try{ a.pause(); a.currentTime=0; }catch(e){} }, onended(cb){ a.addEventListener('ended',cb,{once:true}); } };
  }catch(e){}
  return null;
}
function initAudio(){
  if(!audioStarted){
    audioStarted=true;
    try{ actx=new (window.AudioContext||window.webkitAudioContext)(); sfxGain=actx.createGain(); sfxGain.gain.value=sfxVol; sfxGain.connect(actx.destination); }catch(e){}
    // Music tracks load lazily (preload:none → the download starts on first play()) so page load
    // doesn't burst-request ~12MB of mp3s on top of ~800 sprites — free CDNs throttle that burst
    // and a failed element used to stay mute forever. On error: retry the load with backoff; the
    // many play()-if-paused call sites (initAudio keydown hook, state transitions) resume it after.
    const mkMusic=(src,vol)=>{ const el=new Audio(); el.preload='none'; el.loop=true; el.volume=vol; el._rt=0; el._src=src;
      el.addEventListener('error',()=>{ if(el._rt++<6) setTimeout(()=>{ try{ el.load(); }catch(e){} }, 2000+el._rt*2000); });
      el.src=src; return el; };
    try{ bgMusic=mkMusic(AUDIO_SRC.bg, 0.95); }catch(e){}
    try{ menuMusic=mkMusic(AUDIO_SRC.menu, 0.71); }catch(e){}
    try{ sbMusic=mkMusic(AUDIO_SRC.sbbg, 0.70); }catch(e){}
    try{ tpMusic=mkMusic(AUDIO_SRC.tpbg, 0.95); }catch(e){}
    try{ evMusic=mkMusic(AUDIO_SRC.elvalle, 0.95); }catch(e){}
    try{ deathMusic=mkMusic(AUDIO_SRC.death, 0.5); }catch(e){}
    try{ losAndesMusic=mkMusic(AUDIO_SRC.losandes, 0.5); }catch(e){}
    try{ pvpMusic=mkMusic(AUDIO_SRC.pvpbg, 0.47); }catch(e){}
    try{ lpMx=[mkMusic(AUDIO_SRC.lpmx1,0), mkMusic(AUDIO_SRC.lpmx2,0), mkMusic(AUDIO_SRC.lpmx3,0)]; for(const t of lpMx) t.loop=false; }catch(e){ lpMx=[]; }
    applyMusicVol();
    // warm the buffer cache for the most frequent SFX so even their first play skips the element fallback
    try{ sfxBuffer(AUDIO_SRC.plin); sfxBuffer(AUDIO_SRC.plin2); sfxBuffer(AUDIO_SRC.wow); }catch(e){}
    try{ sfxBuffer(WSFX.gun); for(const f of WSFX.fb) sfxBuffer(f); sfxBuffer(WSFX.slimehit); sfxBuffer(WSFX.turret); }catch(e){}
    // ...and the character voices a moment later (after the sprite burst), so the FIRST death/select
    // of a match doesn't wait on a network fetch — that lag was audible on CDN-hosted builds
    try{ setTimeout(()=>{ try{
      for(const k of PVP_CHAR_LIST){ sfxBuffer(AUDIO_SRC[k+'_sel']); sfxBuffer(AUDIO_SRC[k+'_die']); sfxBuffer(AUDIO_SRC[k+'_hit1']); sfxBuffer(AUDIO_SRC[k+'_hit2']); }
      sfxBuffer(AUDIO_SRC.condor_hit); sfxBuffer(AUDIO_SRC.hee1); sfxBuffer(AUDIO_SRC.hee2); sfxBuffer(AUDIO_SRC.hee3);
      sfxBuffer(AUDIO_SRC.sumac1); sfxBuffer(AUDIO_SRC.sumac2); sfxBuffer(AUDIO_SRC.shooshy1); sfxBuffer(AUDIO_SRC.shooshy2);
    }catch(e){} }, 2500); }catch(e){}
  }
  try{ if(actx && actx.state==='suspended') actx.resume(); if(introPlaying){ /* Las Palmas intro clip owns the audio — never resurrect a music track under it */ } else if(state===STATE.LOADING){ /* no music until the menu is ready */ } else if(isMenuState() || (NET.role==='guest' && NET.nsel)){ if(currentMap==='laspalmas' && (state===STATE.NETSELECT || (NET.role==='guest' && NET.nsel))){ /* Las Palmas playlist owns the pick screen — don't mix the menu track in */ } else if(menuMusic && menuMusic.paused) menuMusic.play().catch(()=>{}); } else { const gt=gameTrack(); if(gt && gt.paused && (!deathMusic || deathMusic.paused) && (!losAndesMusic || losAndesMusic.paused) && state!==STATE.OVER && state!==STATE.VICTORY) gt.play().catch(()=>{}); } }catch(e){}
}
function playPlin(){ plinCount++; playSfx(plinCount%7===0?AUDIO_SRC.plin2:AUDIO_SRC.plin, 0.4); }
// vending "denied" buzzer (no money / health already full): the classic harsh EERGH error sound —
// a short dissonant two-oscillator sawtooth buzz sliding down. Synthesized, no asset needed. This
// replaces the plin at the machines (the plin doubles as Freddy's hit sound, which made no sense
// coming out of a vending machine in Modo Infinito).
function playDenied(){
  try{
    if(!actx){ return; }
    const t0=actx.currentTime, g=actx.createGain();
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.30,t0+0.015);
    g.gain.setValueAtTime(0.30,t0+0.16);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.26);
    g.connect(sfxGain||actx.destination);
    for(const f of [98,124]){   // minor-second clash = instant "wrong!"
      const o=actx.createOscillator();
      o.type='sawtooth'; o.frequency.setValueAtTime(f,t0); o.frequency.linearRampToValueAtTime(f*0.82,t0+0.24);
      o.connect(g); o.start(t0); o.stop(t0+0.27);
    }
  }catch(e){}
}
// "locked" clunk for the enhance machine: two short falling square blips, synthesized so it needs no
// asset and can't be mistaken for the buzzer (buzzer = "no money", lock = "this can NEVER be bought")
function playLock(){
  try{
    if(!actx){ playPlin(); return; }
    const t0=actx.currentTime;
    for(const [dt,f] of [[0,150],[0.085,92]]){
      const o=actx.createOscillator(), g=actx.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t0+dt);
      g.gain.exponentialRampToValueAtTime(0.4,t0+dt+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+dt+0.1);
      o.connect(g); g.connect(sfxGain||actx.destination); o.start(t0+dt); o.stop(t0+dt+0.12);
    }
  }catch(e){}
}
let voices=[];
function playOne(src,vol){ const h=playSfx(src,vol); if(h){ voices.push(h); h.onended(()=>{ const k=voices.indexOf(h); if(k>=0) voices.splice(k,1); }); } return h; }
function stopVoices(){ for(const a of voices){ try{ a.stop(); }catch(e){} } voices.length=0; }
function playHee(){ playOne(AUDIO_SRC[['hee1','hee2','hee3'][randi(0,2)]], 0.6); }
// Alfredo & Mati recorded their voice takes quieter than the rest of the roster — and each CLIP by a
// different amount (Alfredo's select is ~7× quieter than Vannucci's, his death only ~2×). Boosts are
// per-clip, calibrated from measured RMS to land every take at Vannucci/Flash loudness. NOT clamped
// to 1: the Web Audio path amplifies past full volume (which quiet recordings need); only the <audio>
// element fallback clamps, inside playSfxElement. (The old per-character min(1,…) clamp made the
// boost a no-op: 0.95×1.35 just clipped back to 1.0 — that's why Alfredo never got louder.)
const VOICE_BOOST={ alfredo_sel:4.5, alfredo_die:1.6, alfredo_hit1:2.8, alfredo_hit2:2.8,
                    mati_sel:3.0, mati_die:1.6, mati_hit1:2.1, mati_hit2:2.0 };
function voiceVol(clip, base){ return base*(VOICE_BOOST[clip]||1); }
function playCharSelect(kind){ if(AUDIO_SRC[kind+'_sel']) playOne(AUDIO_SRC[kind+'_sel'], voiceVol(kind+'_sel',0.95)); }
function playCharDeath(kind){ if(AUDIO_SRC[kind+'_die']) playOne(AUDIO_SRC[kind+'_die'], voiceVol(kind+'_die',0.95)); }
function playRoundStart(r){
  const boss=(r%5===0);

// ---- Waveform end-detection: decode a track once and find where the audible content stops, so we
// loop/crossfade at the end of the MUSIC instead of the end of the FILE (mp3s carry trailing silence
// that otherwise sounds like a long gap before the song comes back). Async + cached; falls back to
// the element's duration until the decode lands. ----
const _audioEnd={};   // _src -> audible-length seconds (or a sentinel while measuring)
function measureAudioEnd(src){
  if(!src) return 0;
  if(src in _audioEnd){ const v=_audioEnd[src]; return (typeof v==='number')?v:0; }
  _audioEnd[src]='pending';
  try{
    if(!actx || !window.fetch){ _audioEnd[src]=0; return 0; }
    fetch(src).then(r=>r.arrayBuffer()).then(buf=>actx.decodeAudioData(buf)).then(ab=>{
      const ch=ab.getChannelData(0), thresh=0.01; let i=ab.length-1;
      for(; i>0; i--){ if(Math.abs(ch[i])>thresh) break; }

      _audioEnd[src]=(t>3 && t<ab.duration-0.15)?t:0;
    }).catch(()=>{ _audioEnd[src]=0; });
  }catch(e){ _audioEnd[src]=0; }

// the top instead of waiting out the file's trailing silence.
function musicLoopTrim(){

let selMode=1, selCursor1=0, selCursor2=1, selChar1=null, selChar2=null, modTest=false, selPending=false, selStartTimer=0;
function charFrame(p){
  const C=CHARS[p.kind], S=C.S, d=p.dir;
  if(C.flap){
    // Cóndor: wings never stop — the cycle runs off the global clock, moving or not, and there is
    // no punch pose. Front view ping-pongs 1-2-3-2; east/west and north alternate their two frames
    // (west = east flipped). Missing side/back files fall back to the front cycle.
    // On death the wings must stop mid-flap and hold the pose he died in, so freeze the clock at
    // the moment of death (captured once); coming back alive clears the freeze.
    const ok=im=>im&&im.naturalWidth>0;
    let clk=time;
    if(!p.alive){ if(p.flapFreeze==null) p.flapFreeze=time; clk=p.flapFreeze; }
    else if(p.flapFreeze!=null) p.flapFreeze=null;
    const f2=Math.floor(clk/0.16)%2;
    if(d==='n' && ok(S.n1) && ok(S.n2)) return {img:[S.n1,S.n2][f2], flip:false};
    if((d==='e'||d==='w') && ok(S.e1) && ok(S.e2)) return {img:[S.e1,S.e2][f2], flip:(d==='w')};
    return {img:[S.c1,S.c2,S.c3][[0,1,2,1][Math.floor(clk/0.16)%4]], flip:false};
  }
  if(p.punchAnim>0 && !C.noPunch){   // noPunch (Teddington): bombs place with walk/idle poses only
    const ph=clamp(1-(p.punchAnim/C.pd),0,0.999), i3=Math.floor(ph*3);
    if(d==='n') return {img:S[C.npKey], flip:false};
    if(d==='s') return {img:[S.sp1,S.sp2,S.sp1][i3], flip:false};
    return {img:[S.ep1,S.ep2,S.ep1][i3], flip:(d==='w')};
  }
  if(!p.moving){
    if(d==='n') return {img:S.nw2, flip:false};
    if(d==='s') return {img:S[C.sIdle], flip:false};
    return {img:S[C.eIdle], flip:(d==='w')};
  }
  const idx=[0,1,2,1][Math.floor(p.animTime/0.12)%4];
  if(d==='n') return {img:[S.nw1,S.nw2,S.nw3][idx], flip:false};
  if(d==='s') return {img:[S.sw1,S.sw2,S.sw3][idx], flip:false};
  return {img:[S.ew1,S.ew2,S.ew3||S.ew1][idx], flip:(d==='w')};   // 2-frame east sets (Teddington) walk 1-2-1-2
}

function tinted(img, key, color){
  if(!img || !img.naturalWidth) return img;   // don't cache a 0x0 canvas before the sprite has loaded
  const ck=key+'|'+color; if(tintCache[ck]) return tintCache[ck];
  const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
  const x=c.getContext('2d');
  x.drawImage(img,0,0);
  x.globalCompositeOperation='multiply'; x.fillStyle=color; x.fillRect(0,0,c.width,c.height);
  x.globalCompositeOperation='destination-in'; x.drawImage(img,0,0);
  x.globalCompositeOperation='source-over';
  tintCache[ck]=c; return c;
}

  if(survival && state===STATE.PLAY){

    if(lp && e.code && e.code.indexOf('Digit')===0){

      specCycle((e.code==='KeyA'||e.code==='ArrowLeft')?-1:1);

    if(NET.role!=='guest'){

function lpResolve(ent){

      continue;
    }
    const c0=Math.floor((ent.x-r)/C), c1=Math.floor((ent.x+r)/C), r0=Math.floor((ent.y-r)/C), r1=Math.floor((ent.y+r)/C);
    for(let rr=r0; rr<=r1; rr++) for(let dcx=c0; dcx<=c1; dcx++){ if(!lpSolidCell(dcx,rr)) continue;

function circleRectCollide(cx, cy, r, rect) {

}

function resolveCollision(ent) {

  else if(currentMap==='machu'){ ent.x=clamp(ent.x, 38+r, WORLD_W-38-r); ent.y=clamp(ent.y, MACHU_SKY+8+r, WORLD_H-30-r-machuElev(ent.x)); }

    if(bossSolid && !(o.t==='hut1'||o.t==='hut2'||o.t==='hut3'||o.t==='inti')) continue;
    const nx = clamp(ent.x, o.x, o.x+o.w);

}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(!p.txt){ p.vx*=0.9; p.vy*=0.9; }
    if(p.life<=0) particles.splice(i,1);
  }
}

  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function randomizeOnlineChars(){
  if(!NET.hosting) return;        // online host only (NET.role defaults to 'host' even for local play)
  const order=shuffledChars();    // distinct chars (CHAR_LIST has 4, max 4 players) -> no duplicates
  for(let i=0;i<players.length;i++) reassignKind(players[i], order[i%order.length]);
}

const TIERRA_MULT=[1,1.18,1.34,1.5];   // speed per stack
const PIEDRA_MULT=[1,1.3,1.6,2.0];     // damage per stack
// ---- Modo Infinito weapon enhancement (the "MEJORA" vending machine) ----
// p.enh[weapon] = 0..3 (0 = un-enhanced). Death wipes it (stripPowers). Each category scales
// relative to the weapon's un-enhanced "current" values, per the level index.
const ENH_MAX=3;
const WENH_DMG =[0.8, 1.0, 1.10, 1.25];   // guns (pistol/rapid/fire): per-shot damage ×
const WENH_RAD =[0.9, 1.0, 1.15, 1.20];   // grenades & mines: blast radius ×
const WENH_TURRET=[0.60,0.70,0.85, 1];    // turret arrow: fraction of a normal enemy's maxhp (1 = one-shot)
const WENH_BLOCK =[0.5, 0.7, 1.0, 1.2];   // concrete block: max-HP ×
function enhLvl(p,k){ return p&&p.enh ? Math.min(ENH_MAX,(p.enh[k]||0)) : 0; }
function wDmgMul(p,k){ return WENH_DMG[enhLvl(p,k)]; }
function wRadMul(p,k){ return WENH_RAD[enhLvl(p,k)]; }
// weapons the MEJORA machine can improve (the Distracción lure is excluded — nothing to level)
const ENHANCEABLE=new Set(['pistol','rapid','fire','grenade','mine','block','torreta']);
// Speed stays constant from round 1 to the last round on any given map — the only way to go
// faster is by stacking Tierra apuchis. (The machu/templo ×1.2 is a per-map constant, applied
// every round and matched on enemies, not a late-round ramp.)
function effSpeed(p){ return p.speed * TIERRA_MULT[p.tierra] * ((currentMap==='machu'||currentMap==='templo')?1.2:1); }
function effDmg(p){ return p.dmg * PIEDRA_MULT[p.piedra]; }
function effCd(p){ return p.cd; }
function effKnock(p){ return p.knock; }

function spawnEnemy(){
  let pool;
  if(survival){
    // Las Palmas keeps a FIXED type ratio — Grey dominant, Slime ~half of Grey, Egg ~a quarter
    // (4 : 2 : 1). Difficulty ramps through the swarm SIZE (see updateSurvival), not the mix.
    pool = ['normal','normal','normal','normal'];
    if(round>=3) pool.push('fast','fast');
    if(round>=5) pool.push('large');
  } else {
    pool = ['normal','normal'];
    if (round>=3) pool.push('fast');
    if (round>=5) pool.push('large');
    if (round>=8) pool.push('fast','normal');
    if (round>=11) pool.push('large','fast');
  }
  let type = pool[randi(0,pool.length-1)];
  if(type==='large'){            // cap concurrent big leaf-throwers (grows over time in survival)
    const cap = survival ? Math.min(6, 2+Math.floor(round/8))*Math.max(1,activePlayerCount())
                         : ((activePlayerCount()===1) ? (round>=11?2:1) : (round>=11?5:2));
    let cur=0; for(const en of enemies){ if(en.type==='large') cur++; }
    if(cur>=cap) type = (round>=3 && Math.random()<0.5) ? 'fast' : 'normal';
  }
  const t = ENEMY_TYPES[type];
  const mcfg=MAP_CFG[currentMap];
  let x,y;
  if(mcfg.edges==='lr'){
    x = (randi(0,1)===0) ? 26 : WORLD_W-26; y = rand(150, 540);
  } else if(currentMap==='machu'){
    const bz=BUSES[randi(0,BUSES.length-1)];
    x=clamp(bz.x+rand(-24,24), 42, WORLD_W-42);
    y=clamp(bz.y+rand(2,16), MACHU_SKY+16, WORLD_H-30-machuElev(x));
  } else if(currentMap==='laspalmas'){
    // spawn ONLY from the map's authored horde zones, and only on walkable ground: pick a random
    // zone, sample a uniform random point, resample if it lands in a wall (~20 tries), else give up
    // on this spawn rather than dropping an enemy inside geometry. No zones -> no horde enemies.
    if(!LP_SPAWN_ZONES.length) return;
    let placed=false;
    for(let t=0;t<20;t++){
      const z=LP_SPAWN_ZONES[randi(0,LP_SPAWN_ZONES.length-1)];
      const sxp=z.x+Math.random()*z.w, syp=z.y+Math.random()*z.h;
      if(!lpSolidAt(sxp,syp)){ x=sxp; y=syp; placed=true; break; }
    }
    if(!placed) return;
  } else {
    const edge = randi(0,3);
    if(edge===0){ x=rand(20,WORLD_W-20); y=20; }
    else if(edge===1){ x=WORLD_W-20; y=rand(20,WORLD_H-20); }
    else if(edge===2){ x=rand(20,WORLD_W-20); y=WORLD_H-20; }
    else { x=20; y=rand(20,WORLD_H-20); }
  }
  // Enemies reach their full per-enemy stats by round 15 and then STAY there. In endless Modo Infinito
  // the difficulty comes ENTIRELY from the growing swarm (see updateSurvival: the live-enemy cap and
  // spawn rate keep climbing, and the type mix gets nastier) — never from per-enemy HP/damage buffs,
  // so every enemy stays killable no matter how long the run lasts and your ammo isn't wasted.
  let scale = 1 + Math.min(round-1,14)*0.05;   // → 1.7 by round 15, then flat
  const dmgScale = scale, spdBonus = 0;
  let skin='chu', radius=t.radius, speed=t.speed, leafer=!!t.leafer, archer=false, supay=false, llama=false, ttype=null, tint=t.tint, baseHp=t.hp;
  if(currentMap==='stonebridge'){
    if(type==='normal'){ skin='knight'; }
    else if(type==='fast'){ skin='knight_gold'; tint='#ffcf3a'; radius=13; }
    else if(type==='large'){ skin='archer'; leafer=false; archer=true; radius=20; speed=26; baseHp=150; }
  }
  else if(currentMap==='machu'){
    if(type==='normal'){ skin='tourist'; ttype=TOUR_TYPES[randi(0,3)]; }
    else if(type==='fast'){ skin='guinea'; tint=null; radius=12; }
    else if(type==='large'){ skin='llama'; archer=true; llama=true; leafer=false; tint=null; radius=24; speed=26; baseHp=150; }
  }
  else if(currentMap==='templo'){
    skin='guachi';
    if(type==='fast'){ skin='supay'; radius=14; }
    else if(type==='large'){ skin='supay'; archer=true; supay=true; leafer=false; radius=26; speed=28; baseHp=170; }
  }
  else if(currentMap==='laspalmas'){   // Modo Infinito aliens
    if(type==='normal'){ skin='grey'; tint=null; radius=16; }
    else if(type==='fast'){ skin='slime'; tint=null; radius=13; }   // keeps the fast type's dash
    else if(type==='large'){ skin='egg'; tint=null; leafer=true; radius=26; speed=32; baseHp=210; }   // floating plasma thrower
  }
  if(currentMap==='machu') speed=Math.round(speed*1.2);
  if(survival) speed=Math.round(speed*1.2);   // Modo Infinito aliens are 20% quicker (still well under a player's base 156)
  enemies.push({
    id:_entId++,
    type, x, y,
    radius: radius,
    hp: baseHp*scale*mcfg.hpMul, maxhp: baseHp*scale*mcfg.hpMul,
    dmg: t.dmg*dmgScale*mcfg.dmgMul, speed: Math.round(speed+spdBonus), eye: t.eye, pts: t.pts,
    color: tint || '#6fae35', tint: tint, charge: !!t.charge, leafer: leafer, archer: archer, supay: supay, llama: llama, skin: skin, ttype: ttype, faceRight:true, gvar: randi(0,GIRL_NVAR-1), lvar: randi(0,5), gpvar: randi(0,3), dead:false, deathT:0,
    aiming:0, aimRight:false, shotDone:false, punchAnim:0,
    vx:0, vy:0, stagger:0, hitFlash:0, atkcd:0,
    chargeCd: rand(2,4), charging:0, shootCd: rand(1.8,3.4), wob:Math.random()*TAU,
    dir:'s', animTime:Math.random()*2, moving:true,
  });
}

const apuchis = [];   // collectible spirit pickups
const APU_DEF = {
  tierra:    { weight:35, color:'#c07a36', label:'TIERRA',    rare:false },
  piedra:    { weight:25, color:'#d2ad5c', label:'PIEDRA',    rare:false },
  rio:       { weight:18, color:'#8fa6ae', label:'RIO',       rare:false },
  cuarzo:    { weight:10, color:'#e8e2d6', label:'CUARZO',    rare:false },
  morganita: { weight:8,  color:'#ff7ab0', label:'MORGANITA', rare:true  },
  safiro:    { weight:4,  color:'#4a7ad0', label:'SAFIRO',    rare:true  },
};
function weightedApu(morgOK, safOK){
  const pool=[];
  for(const k in APU_DEF){
    if(k==='morganita' && !morgOK) continue;
    if(k==='safiro' && !safOK) continue;
    if((k==='morganita'||k==='safiro') && round<8) continue;
    let w=APU_DEF[k].weight;
    if(k==='morganita'||k==='safiro'){ if(currentMap==='stonebridge' && round<9) w*=0.4; if(round>10) w*=1.5; }
    pool.push([k,w]);
  }
  let tot=0; for(const e of pool) tot+=e[1];
  let r=Math.random()*tot;
  for(const e of pool){ r-=e[1]; if(r<=0) return e[0]; }
  return pool[0][0];
}
function spawnApuPos(){
  const machu=(currentMap==='machu');
  for(let t=0;t<40;t++){
    let x=(WORLD_W>W)?rand(camX+130,camX+W-130):rand(110,W-110), y;
    if(machu){ x=clamp(x,70,WORLD_W-70); y=rand(machuTop(x)+26, WORLD_H-46-machuElev(x)); }
    else y=(currentMap==='stonebridge')?rand(150,540):((WORLD_H>H)?rand(camY+120,camY+H-120):rand(110,H-110));
    let ok=true;
    for(const o of obstacles){ if(circleRectCollide(x,y,24,o)){ok=false;break;} }
    if(ok && cliffs.length) for(const c of cliffs){ if(x>c.x-24&&x<c.x+c.w+24&&y>c.y-24&&y<c.y+c.h+24){ok=false;break;} }
    if(ok) for(const a of apuchis){ if(dist(x,y,a.x,a.y)<60){ok=false;break;} }
    if(ok) return {x,y};
  }
  let fx=clamp((WORLD_W>W)?rand(camX+130,camX+W-130):rand(110,W-110),70,WORLD_W-70);
  let fy=machu?rand(machuTop(fx)+26, WORLD_H-46-machuElev(fx)):((currentMap==='stonebridge')?rand(150,540):((WORLD_H>H)?rand(camY+120,camY+H-120):rand(110,H-110)));
  return {x:fx,y:fy};
}
function placeApu(type){
  const pos=spawnApuPos();
  apuchis.push({id:_entId++, type, x:pos.x, y:pos.y, r:18, bob:Math.random()*TAU, spawn:0});
}
// Las Palmas: enemies drop Apuchis (half size) on death — not every time, and the rare ones
// (Morganita/Safiro) stay rare thanks to weightedApu's weights + late-game gating.
// Modo Infinito ground pickups: 'shoe' = speed (reuses the Tierra speed multiplier). Weapons get
// added here with the inventory system.
const lpItems=[];
// Enemy-dropped pickups don't linger forever: they last a few seconds, blink faster as they run out,
// then vanish so the field never fills up with un-grabbed loot. (Applied in Modo Infinito only.)
const LP_PICKUP_LIFE=21, LP_PICKUP_BLINK=3.5;   // soles/hearts linger longer before fading (blink the last ~3.5s)
function pickupBlinkHide(life){ return life!=null && life<LP_PICKUP_BLINK && Math.floor(time*(life<1?14:7))%2===0; }
function lpMaybeDrop(e){
  const big=(e.type==='large');
  // health hearts: uncommon from any enemy, much likelier from the big ones. Heal is partial
  // (~25%, see updateHearts) so you're never fully safe.
  if(Math.random() < (big?0.22:0.05)) hearts.push({x:e.x,y:e.y,bob:Math.random()*TAU,spin:Math.random()*TAU,life:LP_PICKUP_LIFE});
  // speed shoe: rare, small permanent stack until you die
  if(lpItems.length<24 && Math.random() < (big?0.06:0.03)) lpItems.push({id:_entId++, kind:'shoe', x:e.x+rand(-8,8), y:e.y+rand(-8,8), bob:Math.random()*TAU, spawn:0, life:LP_PICKUP_LIFE});
}
function updateLpItems(dt){
  // fade out shoe / power-up drops that sit un-grabbed (weapon crates have no life → they persist)
  for(let i=lpItems.length-1;i>=0;i--){ const it=lpItems[i]; if(it.life!=null){ it.life-=dt; if(it.life<=0){ lpItems.splice(i,1); } } }
  for(const it of lpItems){ it.bob+=dt*6; if(it.spawn<1) it.spawn=Math.min(1,it.spawn+dt*3); }
  for(const p of players){ if(!p.alive || p.riding) continue;   // no pickups from the saddle — park the Ticla first
    for(let i=lpItems.length-1;i>=0;i--){ const it=lpItems[i];
      if(dist(p.x,p.y,it.x,it.y)<p.radius+15){
        if(it.kind==='shoe'){ if(p.tierra>=3) continue; p.tierra=Math.min(3,p.tierra+1); floatText(p.x,p.y-26,'VELOCIDAD '+p.tierra+'/3','#eaf1ff'); playPickup(); }
        else if(WEAPONS[it.kind]){ giveWeapon(p, it.kind); }
        lpItems.splice(i,1);
      }
    }
  }
}

function drawLpItem(it){
  if(pickupBlinkHide(it.life)) return;
  const bob=Math.abs(Math.sin(it.bob))*6, cy=it.y-bob, pop=clamp(it.spawn,0,1);
  ctx.save(); ctx.globalAlpha=pop;
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(it.x,it.y+8,11,3.6,0,0,TAU); ctx.fill();

  ctx.restore();
}

let lpCrateT=10;
// weighted crate loot table — common ammo drops often, the powerful placeables are rare
// rapid-fire, grenades, mines and fire (the ammo consumables) dominate; blocks/turrets/decoy are rare
// Map crates rain the COMMON weapons; the rare/powerful trio (torreta, bloques, Distracción) is
// vending-machine exclusive — that's what the big save-up price at the ARMAS machine buys you.
const CRATE_LOOT=[['rapid',12],['fire',7],['grenade',8],['mine',7]];
function pickCrateKind(){ let tot=0; for(const w of CRATE_LOOT) tot+=w[1]; let r=Math.random()*tot; for(const w of CRATE_LOOT){ r-=w[1]; if(r<=0) return w[0]; } return 'rapid'; }
const VEND_RARES=['torreta','block','decoy'];
// only offer rares the buyer can actually carry more of — never silently eat 120+ soles for nothing
function vendRareRoom(p,k){ const a=(p.ammo&&p.ammo[k])||0; return k==='torreta'?a<WEAPONS.torreta.ammoMax : k==='decoy'?a<1 : a<WEAPONS.block.ammoMax*3; }
// Shuffled-bag draw instead of a uniform roll: each player cycles through the WHOLE rare trio
// (random order) before any kind repeats, so the Distracción actually shows up in every run
// instead of losing coin-flips all night. Kinds the buyer can't carry more of are skipped at
// draw time but stay in the bag — still owed once there's room. Host-only state (purchases
// resolve on the host sim), so _rareBag never needs to travel in snapshots.
function pickVendRare(p){
  const av=VEND_RARES.filter(k=>vendRareRoom(p,k)); if(!av.length) return null;
  let bag=p._rareBag;
  if(!bag || !bag.some(k=>av.includes(k))){
    bag=p._rareBag=VEND_RARES.slice();
    for(let i=bag.length-1;i>0;i--){ const j=randi(0,i), t=bag[i]; bag[i]=bag[j]; bag[j]=t; }
  }
  return bag.splice(bag.findIndex(k=>av.includes(k)),1)[0];
}
const ORO_MAX=100;     // gold nuggets needed to charge the ORO special (was 50)
const CRATE_LIFE=45;   // each crate lives ~45s, blinks its last seconds (pickupBlinkHide), then rotates elsewhere
function crateMax(){ return 5+activePlayerCount(); }   // pool size scales with the party
// A crate spawns CLOSE to someone — just outside a random player's screen — but never inside
// ANY player's current view (no pop-in). Each crate expires on its own clock, so the pool
// rotates continuously instead of all boxes appearing/vanishing together.
function spawnWeaponCrate(){
  if(lpItems.filter(it=>it.kind!=='shoe').length>=crateMax()) return;
  const kind=pickCrateKind();
  const alive=players.filter(p=>p&&p.alive&&!p.departed);
  for(let t=0;t<50;t++){
    let x,y;
    if(alive.length && t<40){   // ring just past the anchor player's viewport
      const a=alive[randi(0,alive.length-1)], ang=Math.random()*TAU, r=rand(720,1150);
      x=a.x+Math.cos(ang)*r; y=a.y+Math.sin(ang)*r;
    } else { x=rand(180,LP_W-180); y=rand(180,LP_H-180); }   // fallback: anywhere
    if(x<180||x>LP_W-180||y<180||y>LP_H-180) continue;
    if(lpSolidAt(x,y)) continue;
    let seen=false;
    for(const p of alive){ if(Math.abs(x-p.x)<W/2+50 && Math.abs(y-p.y)<H/2+50){ seen=true; break; } }
    if(seen) continue;
    lpItems.push({id:_entId++, kind, x:Math.round(x), y:Math.round(y), bob:Math.random()*TAU, spawn:0, life:CRATE_LIFE});
    return;
  }
}
function spawnBreakItems(){
  apuchis.length=0;
  let morgUsed=false, safUsed=false;
  const lateGame = round>8;                       // after round 8: guarantee 5 Tierra (max 9 total)
  // More players -> more pickups (each still grabs its own share); departed players don't count
  const nParty = activePlayerCount();
  const partyMul = (nParty>=4) ? 1.6 : (nParty===3) ? 1.35 : (nParty>=2) ? 1 : 0.85;
  const apuMul = ((currentMap==='stonebridge') ? 1.3 : 1) * partyMul;
  const nOthers = Math.round((lateGame ? randi(3,4) : randi(3,5)) * apuMul);
  // Rio = full-health pickup, one grab per player. Exactly one per player
  // (max 1 each), so everyone can heal but there are never spares.
  const rioTarget = nParty;
  for(let i=0;i<rioTarget;i++){ placeApu('rio'); }
  for(let i=0;i<nOthers;i++){
    let type=weightedApu(!morgUsed, !safUsed);
    if(type==='rio') type='tierra';                  // Rio already placed to target above
    if(lateGame && type==='tierra') type='piedra';   // extra Tierra handled separately late game
    if(type==='morganita') morgUsed=true;
    if(type==='safiro') safUsed=true;
    placeApu(type);
  }
  if(lateGame){ const nt=Math.round(5*apuMul); for(let i=0;i<nt;i++) placeApu('tierra'); }
}

  spark(e.x,e.y,'#9a9085',5,70);
}
function updateLeaves(dt){
  for(let i=leaves.length-1;i>=0;i--){
    const l=leaves[i];
    l.x+=l.vx*dt; l.y+=l.vy*dt; l.life-=dt; if(!l.arrow && !l.fire && !l.spit && !l.plasma) l.spin+=dt*7;
    let gone = l.life<=0 || l.x<-20||l.x>WORLD_W+20||l.y<-20||l.y>WORLD_H+20;

        else { p.hp-=l.dmg; spark(p.x,p.y,'#ff5050',6,100); if(p.hp<=0){p.hp=0;p.alive=false; p.deathAnim=0; lastDead=p; playCharDeath(p.kind); spark(p.x,p.y,p.color,20,180);} }
        gone=true; break;

    }

// ---------- Modo Infinito: Boxhead-style 8-way shooting ----------
// The basic attack becomes a projectile fired in the direction the character faces (the last
// direction it moved: N/NE/E/SE/S/SW/W/NW). Apuchi specials (Morganita/Safiro) still fire on the
// same key. Only active on the survival map — Horda/PVP keep their melee punch.

function bulletShots(e){ return e.type==='fast'?2 : e.type==='large'?5 : 3; }
// Modo Infinito: EXACT shots-to-kill per weapon per enhancement level [enh0..enh3].
// grey = normal, slime = fast, egg = large. The rapid equivalent needs more shots per kill but its
// 2.7x fire rate still makes it a straight time-to-kill upgrade over the pistol at every level.
const LP_SHOTS={
  pistol:{ normal:[5,4,3,2], fast:[4,3,2,1], large:[9,8,7,6] },
  rapid: { normal:[8,6,5,3], fast:[6,5,3,2], large:[14,12,10,8] },
};
function lpShotDmg(e,wk,lvl){ const t=LP_SHOTS[wk]; if(!t) return null; const a=t[e.type]||t.normal; return e.maxhp/a[Math.min(3,lvl||0)]*1.001; }

function segPtDist2(ax,ay,bx,by,px,py){
  const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
  let t = l2<1e-6 ? 0 : ((px-ax)*dx+(py-ay)*dy)/l2; t=t<0?0:t>1?1:t;
  const cx=ax+t*dx-px, cy=ay+t*dy-py; return cx*cx+cy*cy;
}
// ---- Weapon inventory (Modo Infinito). Pistol is always owned + unlimited; specials carry ammo. ----

  rapid:   {name:'RÁPIDA',   col:'#7fd4ff', auto:true,  cd:0.06, ammoMax:110},
  fire:    {name:'FUEGO',    col:'#ff7a2a', auto:false, cd:0.45, ammoMax:26},   // ignites + spreads; deliberate trigger — slower than the pistol
  grenade: {name:'GRANADAS', col:'#8ac24a', auto:false, cd:0.5,  ammoMax:8 },

const WEAPON_ORDER=['pistol','rapid','fire','grenade','mine','block','torreta','decoy'];   // number keys 1..N map to this order

function switchWeapon(p,k){ if(weaponOwned(p,k)) p.weapon=k; }

function fireBullet(p,fire){

function tryShoot(p){

  if(p.special==='safiro'){ p.cooldown=effCd(p); p.punchAnim=CHARS[p.kind].pd; fireLightning(p,'#7ad0ff',215); p.specialCharges--; if(p.specialCharges<=0){ p.special='none'; floatText(p.x,p.y-26,'SAFIRO agotado','#5aa0ff'); } return; }
  const wk=(p.weapon&&WEAPONS[p.weapon])?p.weapon:'pistol', W=WEAPONS[wk];
  p.cooldown=W.cd; p.punchAnim=CHARS[p.kind].pd;

// --- Modo Infinito placeables: mines, concrete blocks, beefed turrets ---
const mines=[];
function placeMine(p){
  const rad=120*(survival?wRadMul(p,'mine'):1);   // enhancement widens the blast
  mines.push({ id:_entId++, x:Math.round(p.x), y:Math.round(p.y), arm:1.0, owner:players.indexOf(p), rad });   // ~1s to arm

// Friendly fire, sting-not-slaughter: explosions HURT players caught in them — the punishment for
// stepping on a mine or hugging a grenade — but they can never kill: 20% of max HP, floored at 1.
const BLAST_PLAYER_FRAC=0.2;
function blastHurtPlayers(x,y,R){
  for(const p of players){
    if(!p.alive || p.pending) continue;
    if(dist(x,y,p.x,p.y) >= R+p.radius) continue;
    const dmg=Math.round(p.maxhp*BLAST_PLAYER_FRAC);
    p.hp=Math.max(1, p.hp-dmg);
    p.hitFlash=1.0; spark(p.x,p.y,'#ff9a5a',10,150); floatText(p.x,p.y-26,'-'+dmg,'#ff9a7a');
  }
}
// a mine wipes out everything caught in the blast outright (bosses just take a heavy hit)
function mineBlast(x,y,owner,rad){
  const R=rad||120;
  spark(x,y,'#ffd24a',26,240); spark(x,y,'#ff6a2a',16,170); cameraShake=12; sfxMineBoom(x,y);
  fx_effects.push({kind:'shock', x, y, r:R, life:0.4, max:0.4});
  const ow=players[owner], bossDmg=ow?effDmg(ow)*2.5:70;
  // copy: killEnemy splices the live array mid-loop, which skipped the enemy right after each kill
  for(const e of enemies.slice()){ if(e.dead||e.dcLock) continue; if(dist(x,y,e.x,e.y)<R+(e.footR||e.radius)){
    if(e.boss){ e.hp-=bossDmg; } else { e.hp=0; }
    e.hitFlash=0.16; e.stagger=0.3; spark(e.x,e.y,'#ff9a2a',6,140);
    if(e.hp<=0){ e.hp=0; killEnemy(e, ow); }
  } }
  blastHurtPlayers(x,y,R);
}
function updateMines(dt){
  for(let i=mines.length-1;i>=0;i--){ const m=mines[i];
    if(m.arm>0){ m.arm-=dt; continue; }
    let boom=false;
    for(const e of enemies){ if(!e.dead && dist(m.x,m.y,e.x,e.y)<(e.footR||e.radius)+16){ boom=true; break; } }
    // players set mines off too — watch where you step (the arm delay is your window to walk away)
    if(!boom) for(const p of players){ if(p.alive && !p.pending && dist(m.x,m.y,p.x,p.y)<p.radius+16){ boom=true; break; } }
    if(boom){ mineBlast(m.x,m.y,m.owner,m.rad); mines.splice(i,1); }
  }
}
function drawMines(){

// ---- Grenades + explosions (grenade launcher; also reused by mines later) ----
const grenades=[];
function explodeAt(x,y,radius,frac,owner){
  spark(x,y,'#ffd24a',26,240); spark(x,y,'#ff6a2a',16,170); cameraShake=11; sfxNadeBoom(x,y);
  fx_effects.push({kind:'shock', x, y, r:radius, life:0.4, max:0.4});
  // copy: killEnemy splices the live array mid-loop, which skipped the enemy right after each kill
  for(const e of enemies.slice()){ if(e.dead||e.dcLock) continue; const d=dist(x,y,e.x,e.y); if(d<radius+(e.footR||e.radius)){
    // grenades wipe out regular enemies instantly; EGGS are tanks — half their bar per blast, so
    // it takes two grenades (a mine still one-shots them); bosses just take a chunk
    if(e.boss){ e.hp-=e.maxhp*frac; } else if(e.skin==='egg'){ e.hp-=Math.ceil(e.maxhp/2); } else { e.hp=0; }

  grenades.push({ id:_entId++, x:p.x, y:p.y, vx:fx*spd, vy:fy*spd, fuse:0.95+power*1.05, owner:players.indexOf(p),

const NADE_DRAG=0.22;   // fraction of velocity retained per second
function updateGrenades(dt){

    if(currentMap==='laspalmas' && lpSolidAt(g.x,g.y) && !lpBulletPass(g.x,g.y)){ g.x-=g.vx*dt; g.y-=g.vy*dt; g.vx*=-0.25; g.vy*=-0.25; }

function updateDecoys(dt){

      d.x+=d.vx*dt; d.y+=d.vy*dt; d.vx*=gd; d.vy*=gd;
      if(lpSolidAt(d.x,d.y)){ d.x=ox; d.y=oy; d.vx=0; d.vy=0; }   // no bounce — he just stops
      if(Math.hypot(d.vx,d.vy)<55){ d.phase='land'; d.pose='LAND'; d.t=0; }

        if(dy>Math.abs(dx)*0.45){ d.pose='SOUTH_IDLE'; d.flip=false; }

function decoyBoom(d){
  d.phase='dead'; d.pose='DEATH'; d.flip=false; d.t=0;

  // else caught inside the blast radius — no lured enemy may survive (players couldn't shoot it).
  // Iterate over a COPY: killEnemy splices the live array, which made for..of skip the next enemy
  // (that's how some blast victims used to walk away).
  for(const e of enemies.slice()){ if(e.dead||e.boss) continue;

// The Ale art ships on a 1077x976 canvas with lots of transparent padding that varies per pose,
// so each sprite is trimmed to its visible pixels once (cached) and every pose is drawn at ONE

const _aleTrim={};
function aleTrimBox(k){
  let t=_aleTrim[k]; if(t!==undefined) return t;
  const im=ALE_IMG[k]; if(!im || !im.naturalWidth) return null;   // not loaded yet — retry later
  try{
    const c=document.createElement('canvas'); c.width=im.naturalWidth; c.height=im.naturalHeight;
    const g=c.getContext('2d'); g.drawImage(im,0,0);
    const px=g.getImageData(0,0,c.width,c.height).data;
    let x0=c.width,y0=c.height,x1=-1,y1=-1;
    for(let y=0;y<c.height;y+=2) for(let x=0;x<c.width;x+=2){
      if(px[(y*c.width+x)*4+3]>10){ if(x<x0)x0=x; if(x>x1)x1=x; if(y<y0)y0=y; if(y>y1)y1=y; } }
    t=(x1<0)?null:{x:x0,y:y0,w:x1-x0+2,h:y1-y0+2};
  }catch(e){ t=null; }   // tainted canvas (file:// run) — fall back to the untrimmed draw
  _aleTrim[k]=t; return t;
}
const ALE_H=36;      // standing height on screen (~half a playable character)
const ALE_REF=560;   // SOUTH_IDLE's visible pixel height — the uniform-scale reference
function drawDecoy(d){
  const img=ALE_IMG[d.pose], dead=(d.pose==='DEATH');

  if(d.phase!=='dead'){
    // faint rotating dashed ring = the lure radius, so players can read exactly which enemies
    // he'll pull (and which stay theirs to shoot)
    const tks=performance.now()/1000;
    ctx.save();
    ctx.globalAlpha=0.20+0.10*Math.sin(tks*4.5);   // slow blink
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2.5;
    ctx.setLineDash([16,13]); ctx.lineDashOffset=-tks*45;   // rotating dashes
    ctx.beginPath(); ctx.arc(d.x,d.y,DECOY_LURE_R,0,TAU); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(d.x,d.y+10,10,4,0,0,TAU); ctx.fill();
  const tb=img && img.naturalWidth ? aleTrimBox(d.pose) : null;
  if(tb){
    const s=ALE_H/ALE_REF, DW2=tb.w*s, DH2=tb.h*s;
    if(d.flip){ ctx.translate(d.x,0); ctx.scale(-1,1); ctx.translate(-d.x,0); }
    ctx.drawImage(img, tb.x, tb.y, tb.w, tb.h, d.x-DW2/2, d.y+10-DH2, DW2, DH2);
  } else if(img && img.naturalWidth){
    const DH2=dead?22:34, DW2=DH2*img.naturalWidth/img.naturalHeight;
    if(d.flip){ ctx.translate(d.x,0); ctx.scale(-1,1); ctx.translate(-d.x,0); }
    ctx.drawImage(img, d.x-DW2/2, d.y+10-DH2, DW2, DH2);

    // placeholder until the Alessito art lands in assets/ — a tiny orange kid
    ctx.fillStyle='#e8a24a'; ctx.beginPath(); ctx.arc(d.x, d.y-14, 7, 0, TAU); ctx.fill();
    ctx.fillStyle='#c05a2a'; ctx.fillRect(d.x-6, d.y-8, 12, 16);
    if(d.phase==='scared'||d.phase==='doom'){ ctx.fillStyle='#fff'; ctx.font='bold 10px Courier New'; ctx.textAlign='center'; ctx.fillText('!!', d.x, d.y-24); ctx.textAlign='left'; }
    if(dead){ ctx.fillStyle='#7a4a2a'; ctx.fillRect(d.x-10, d.y+2, 20, 6); }
  }

// ================= SUPER AYUDA — el Tío mercenario (Modo Infinito) =================
// A 1500-soles bodyguard NPC. His silhouette (Tio_SHADOW) waits at a fixed spot on the grass strip
// between the tennis court and the east sidewalk (never visible from the player spawn); walk up
// with the gear key to hire him. He plants himself in the MACHO_1 pose while Tio_INTRO plays, then
// escorts whichever player is nearest with an endless RÁPIDA. Walking and shooting share ONE step
// clock, so mid-stride the walk frame swaps for the same-numbered shoot frame (walk-and-gun). On
// his own he kneels to snipe (rooted while kneeling), taunts through the MACHO poses after a kill
// streak, and banters sporadically. When he falls (Tio_DEATH + Tio_DEATHAUDIO) the body lingers a
// while, then the shadow reappears on the spot and he can be hired again.

  MUERTOS:'assets/Tio_extraMUERTOS.mp3', CHISTE:'assets/Tio_Marcianos_chiste.mp3', SAPITO:'assets/Tio_SAPITO.mp3' };

// ---- Tio sprite pick: state + 8-dir facing → pose key/flip. Walking and shooting share the SAME
// 4-beat step clock ([1,2,3,2] ping-pong; 2-frame east sets take beats %2), so switching between
// the walk set and the shoot set lands on the same-numbered frame — walk-and-gun, mid-stride.
function tioPose(t){
  if(t.state==='dead')  return {k:'DEATH', fl:false};
  if(t.state==='intro') return {k:'MACHO_1', fl:false};
  if(t.state==='taunt') return {k:'MACHO_'+(t.tauntPose||1), fl:false};
  const d=t.dir8;
  if(t.state==='kneel'){
    if(d===2) return {k:'SOUTH_kneelSHOOT', fl:false};
    if(d===1) return {k:'SOUTHEAST_kneelSHOOT', fl:false};
    if(d===3) return {k:'SOUTHEAST_kneelSHOOT', fl:true};
    if(d===4) return {k:'WEST_KneelSHOOT', fl:false};
    if(d===0) return {k:'WEST_KneelSHOOT', fl:true};
    if(d===6) return {k:'NORTH_KneelSHOOT', fl:false};
    if(d===5) return {k:'NORTHWEST_KneelSHOOT', fl:false};
    return {k:'NORTHWEST_KneelSHOOT', fl:true};   // NE
  }
  const ph=Math.floor(t.animT*6)%4, f4=t.moving?[1,2,3,2][ph]:2, f2=t.moving?[1,2][ph%2]:2;
  const sh=t.shootFlash>0;
  if(d===6) return {k:'NORTH_w'+f4, fl:false};                        // no north shoot set — walk frames pull double duty
  if(d===2||d===1||d===3) return {k:(sh?'SOUTH_SHOOT':'SOUTH_W')+f4, fl:d===3};   // SE as-is, SW flipped
  if(d===7||d===0) return {k:sh?('EAST_Shoot'+f2):('EAST_w'+f2), fl:false};       // E / NE
  return {k:sh?('EAST_Shoot'+f2):('EAST_w'+f2), fl:true};                          // W / NW
}

// ================= TICLA — the bicycle (Modo Infinito) =================

// the world forever: ride it, park it anywhere, come back for it later. Indestructible — the RISK

// 4-way (FireRed style). Rams shove enemies hard and hurt them (slimes pop, greys die in 2 passes,

function updateBullets(dt){

    const b=bullets[i];

    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    // walls (check the segment's midpoint + end so a fast bullet can't tunnel a thin wall/net)
    if(currentMap==='laspalmas' && !lpBulletPass(b.x,b.y) && (lpSolidAt(b.x,b.y)||lpSolidAt((ax+b.x)/2,(ay+b.y)/2))){ spark(b.x,b.y,b.fire?'#fff2c0':'#bfe4ff',3,70); bullets.splice(i,1); continue; }
    let hit=false;
    for(const e of enemies){ if(e.dead) continue;
      if(e.dcLock) continue;   // mobbing the Distracción → immune to player fire (the blast finishes them)
      const rr=(e.footR||e.radius)+6;
      if(segPtDist2(ax,ay,b.x,b.y,e.x,e.y) < rr*rr){
        const _tb=(survival && !b.fire) ? lpShotDmg(e,b.wk||'pistol',b.lvl) : null;   // Modo Infinito: exact shots-to-kill per enhancement level
        e.hp -= (_tb!=null) ? _tb : (e.maxhp/(b.fire?4:bulletShots(e)))*b.pmul*(b.wmul||1);
        e.hitFlash=0.14; e.stagger=0.18;

        if(e.hp<=0){ const owner=players[b.owner]; killEnemy(e, owner);
          if(b.tioB){ if(tio){ tio.kills++; tio.tauntKills++; } }   // the Tío tallies toward his taunt (his barks are his own audio, not a character voice)
          else { const vo=b.npc||owner; if(vo) playPunchSound(vo); } }   // voice on KILL (NPC ally uses its own voice), throttled per character
        hit=true; break;
      }
    }
    if(hit || b.life<=0 || b.x<0||b.y<0||b.x>WORLD_W||b.y>WORLD_H){ bullets.splice(i,1); }

// Two tiers of burn: a DIRECT hit (lit up by the shot itself) burns all the way to death, while an
// enemy merely INFECTED by the spreading flames chars down to a sliver (~6% HP) and stops there —
// crippled and one tap from dead, but the contagion alone doesn't finish them.
function igniteEnemy(e,owner,spread){
  if(e.boss){ e.burnT=Math.max(e.burnT||0,2.5); } else { e.burnT=4.5; }
  e.burnOwner=owner;

}
function updateBurns(dt){
  for(const e of enemies){ if(e.dead || !(e.burnT>0)) continue;
    e.burnT-=dt;
    // fatal (shot-lit) burn runs a touch hotter so 4.5s always covers 100% even without the
    // shot's own damage; bosses resist either way
    const dps=e.maxhp*(e.boss?0.06:(e.burnFatal?0.24:0.22));
    if(!e.boss && !e.burnFatal){
      const floor=e.maxhp*0.06;
      if(e.hp>floor) e.hp=Math.max(floor, e.hp-dps*dt);   // spread burn never kills on its own
    } else e.hp-=dps*dt;
    if(Math.random()<0.5) spark(e.x,e.y-e.radius*0.4,(Math.random()<0.5?'#ff7a2a':'#ffd24a'),1,60);
    if(e.hp<=0){ const owner=players[e.burnOwner]; killEnemy(e, owner); continue; }
    // spread to any non-burning enemy pressed against this one
    for(const o of enemies){ if(o===e||o.dead||o.burnT>0) continue;
      if(dist(e.x,e.y,o.x,o.y) < (e.footR||e.radius)+(o.footR||o.radius)+4){ igniteEnemy(o, e.burnOwner, true); o.burnT=Math.min(e.burnT,3.2)+0.6; }
    }
  }
}

function segSeg(ax,ay,bx,by,cx,cy,dx,dy){
  function o(px,py,qx,qy,rx,ry){ const v=(qy-py)*(rx-qx)-(qx-px)*(ry-qy); return v>0?1:(v<0?2:0); }

function playPunchSound(p){

  // character's hit audio to once per 6s per player so the voices never pile up on top of each other.
  if(survival){ if((time-(p._hitVoiceT||-1e9))<6) return; p._hitVoiceT=time; }

  // net event, and this call already rides the 'punch' event, so guests would hear it twice.
  if(k==='teddington'){ playOne(AUDIO_SRC[['hee1','hee2','hee3'][randi(0,2)]], 0.6); return; }

    // Sebas is even chattier, so his lands every 4th (applies to Horda + Modo Infinito, both non-PVP)
    const horStep=(k==='vannucci')?3:(k==='sebas')?4:2;

function fireRays(b){
  const r=nearestPlayer(b); const tgt=r.p; if(!tgt) return;
  const base=Math.atan2(tgt.y-b.y, tgt.x-b.x);
  for(const off of [-0.2,0,0.2]){ const a=base+off; rays.push({x:b.x, y:b.y-12, vx:Math.cos(a)*250, vy:Math.sin(a)*250, life:4}); }
  spark(b.x,b.y-12,'#ffe24a',8,90); cameraShake=6;
}
function updateRays(dt){
  for(let i=rays.length-1;i>=0;i--){ const r=rays[i]; r.x+=r.vx*dt; r.y+=r.vy*dt; r.life-=dt;
    let gone=r.life<=0||r.x<-30||r.x>WORLD_W+30||r.y<-30||r.y>H+30;
    if(!gone) for(const o of obstacles){ if(circleRectCollide(r.x,r.y,5,o)){gone=true;break;} }
    if(!gone) for(const p of players){ if(!p.alive) continue;
      if(dist(r.x,r.y,p.x,p.y)<p.radius+7){
        p.hitFlash=1.0; cameraShake=5;
        if(p.shields>0){ p.shields--; p.shieldFlash=0.25; spark(p.x,p.y,'#7fd4ff',12,150); floatText(p.x,p.y-24,'BLOQUEO','#7fd4ff'); }
        else { p.hp-=Math.ceil(p.maxhp/3); spark(p.x,p.y,'#ffe24a',10,150); if(p.hp<=0){p.hp=0;p.alive=false; p.deathAnim=0; lastDead=p; playCharDeath(p.kind); spark(p.x,p.y,p.color,20,180);} }
        gone=true; break;
      }
    }
    if(gone) rays.splice(i,1);
  }
}
function drawRays(){
  for(const r of rays){ const ang=Math.atan2(r.vy,r.vx);
    ctx.save(); ctx.translate(r.x,r.y); ctx.rotate(ang);
    ctx.shadowColor='#ffe24a'; ctx.shadowBlur=12;
    ctx.fillStyle='rgba(255,236,120,0.9)'; ctx.fillRect(-12,-3,24,6);
    ctx.fillStyle='#ffd21a'; ctx.fillRect(-12,-1.5,24,3);
    ctx.fillStyle='#fff7d0'; ctx.fillRect(-4,-1,10,2);
    ctx.shadowBlur=0; ctx.restore();
  }
}
function updateWallets(dt){
  for(let i=wallets.length-1;i>=0;i--){ const wl=wallets[i]; wl.bob+=dt*4; wl.spin+=dt*1.5;
    for(const p of players){ if(!p.alive) continue;
      if(dist(p.x,p.y,wl.x,wl.y)<p.radius+24){
        walletGot[wl.kind]=true; wallets.splice(i,1);
        spark(p.x,p.y,'#ffe08a',22,180); floatText(p.x,p.y-28,(wl.kind==='evan'?'\u00a1Billetera de Evan!':'\u00a1Billetera de Brian!'),'#ffe9b0');
        if(walletGot.evan && walletGot.brian){
          state=STATE.VICTORY; menuSel=0; saveMapBeaten(currentMap);
          camX=clamp(p.x-W/2,0,Math.max(0,WORLD_W-W)); camY=clamp(p.y-H/2,0,Math.max(0,WORLD_H-H));
          playLosAndes(); initConfetti();
        }
        break;
      }
    }
  }
}
function drawWallets(){
  for(const wl of wallets){ const oy=machuElev(wl.x); const img=PROP[wl.kind==='evan'?'walEvan':'walBrian'];
    const h=48, y=wl.y+Math.sin(wl.bob)*3+oy;
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.beginPath(); ctx.ellipse(wl.x,wl.y+10+oy,18,5,0,0,TAU); ctx.fill();
    ctx.save(); ctx.shadowColor='#ffe08a'; ctx.shadowBlur=12+5*Math.sin(wl.bob);
    if(img && img.naturalWidth){ const wdt=h*img.naturalWidth/img.naturalHeight; ctx.drawImage(img, wl.x-wdt/2, y-h, wdt, h); }
    else { ctx.fillStyle='#9a6a3a'; ctx.fillRect(wl.x-20,y-28,40,26); }
    ctx.restore();
    ctx.fillStyle='#ffe9b0'; ctx.font='bold 12px Courier New'; ctx.textAlign='center'; ctx.fillText('\u00a1Billetera!', wl.x, y-h-8); ctx.textAlign='left';
  }
}
function updateAmuleto(dt){
  if(!amuleto) return; amuleto.bob+=dt*4; amuleto.spin+=dt*2;
  const isDoor=amuleto.item==='door';
  for(const p of players){ if(!p.alive) continue;
    const hit = isDoor ? (p.x>amuleto.x-52 && p.x<amuleto.x+52 && p.y<amuleto.y+82) : (dist(p.x,p.y,amuleto.x,amuleto.y)<p.radius+18);
    if(hit){ amuleto=null; state=STATE.VICTORY; menuSel=0; camX=clamp(p.x - W/2,0,Math.max(0,WORLD_W-W)); camY=clamp(p.y - H/2,0,Math.max(0,WORLD_H-H)); saveMapBeaten(currentMap); initConfetti(); spark(p.x,p.y,'#ffffff',26,190); return; }
  }
}
function drawDoor(){
  const dx=amuleto.x, dy=amuleto.y, w=66, h=108;
  const pulse=0.5+0.5*Math.sin(time*4.5);
  const left=dx-w/2, right=dx+w/2, top=dy, bot=dy+h;
  ctx.save();
  ctx.shadowColor='#ffffff'; ctx.shadowBlur=34+20*pulse;
  const grd=ctx.createLinearGradient(dx, top, dx, bot);
  grd.addColorStop(0,'rgba(255,255,255,0.98)'); grd.addColorStop(1,'rgba(210,235,255,0.9)');
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.moveTo(left, bot); ctx.lineTo(left, top+20);
  ctx.quadraticCurveTo(dx, top-12, right, top+20); ctx.lineTo(right, bot); ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=0.55+0.45*pulse; ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(left+9, bot); ctx.lineTo(left+9, top+26);
  ctx.quadraticCurveTo(dx, top+4, right-9, top+26); ctx.lineTo(right-9, bot); ctx.closePath();
  ctx.fill();
  ctx.globalAlpha=1;
  if(Math.random()<0.6) spark(dx+rand(-w/2,w/2), bot-rand(0,h), '#ffffff', 1, 50);
  ctx.restore();
  ctx.fillStyle='#ffe9b0'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
  ctx.fillText('\u00a1Escapa por la puerta!', dx, bot+18); ctx.textAlign='left';
}
function drawAmuleto(){
  if(!amuleto) return;
  if(amuleto.item==='door'){ drawDoor(); return; }
  const img=PROP[amuleto.item||'amuleto']; const y=amuleto.y+Math.sin(amuleto.bob)*5;
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(amuleto.x,amuleto.y+18,16,5,0,0,TAU); ctx.fill();
  ctx.save(); ctx.shadowColor='#ffe24a'; ctx.shadowBlur=16+6*Math.sin(time*5);
  if(img && img.naturalWidth){ const h=46, w=h*img.naturalWidth/img.naturalHeight; ctx.drawImage(img, amuleto.x-w/2, y-h/2, w, h); }
  else { ctx.fillStyle='#ffd21a'; ctx.beginPath(); ctx.arc(amuleto.x,y,16,0,TAU); ctx.fill(); }
  ctx.restore();
  ctx.fillStyle='#ffe9b0'; ctx.font='bold 12px Courier New'; ctx.textAlign='center'; ctx.fillText(amuleto.item==='key'?'\u00a1Recoge la Llave!':'\u00a1Recoge el Amuleto!', amuleto.x, y-32); ctx.textAlign='left';
}
function killEnemy(e,p){
  const idx = enemies.indexOf(e);
  if(idx<0) return;
  if(e.skin==='tourist' && !e.dead){ e.dead=true; e.deathT=0; e.hitFlash=0; e.vx=0; e.vy=0; score+=e.pts; if(e.type==='normal'||e.type==='fast') dropNugget(e.x,e.y); spark(e.x,e.y,e.color||'#fff',12,160); floatText(e.x,e.y-10,'+'+e.pts,'#ffe680'); return; }
  enemies.splice(idx,1);
  score += e.pts;
  if(survival && !e.boss){ kills++; lpMaybeDrop(e);
    const col=e.skin==='slime'?'#7fe0ff':(e.skin==='egg'?'#a6f0d0':'#d2d5db'); spark(e.x,e.y,col,14,150);   // alien death pop
  }
  if(e.type==='large' && !survival){ hearts.push({x:e.x,y:e.y,bob:Math.random()*TAU,spin:Math.random()*TAU,life:16}); }   // Horda: big enemies always drop a heart. Modo Infinito governs hearts via lpMaybeDrop instead.
  if(e.boss){
    for(let k=0;k<80;k++) spark(e.x+rand(-40,40), e.y+rand(-54,20), ['#ffd24a','#ff7a3a','#ffffff','#ff5050','#ffe24a'][randi(0,4)], 1, 260);
    cameraShake=18;
    if(e.giant){
      if(currentMap==='templo'){
        amuleto={x:Math.round(WORLD_W/2), y:22, bob:0, spin:0, item:'door'};
        playLosAndes();
        floatText(WORLD_W/2, 150, '\u00a1JARJACHA COLOSAL DERROTADA!','#ffe9b0');
        floatText(WORLD_W/2, 182, '\u00a1Una puerta se abri\u00f3 al norte!','#bfefff');
        return;
      }
      if(currentMap==='machu'){
        wallets.push({x:clamp(Math.round(e.x),90,WORLD_W-90), y:clamp(Math.round(e.y),MACHU_SKY+40,WORLD_H-90), kind:e.kind, bob:Math.random()*TAU, spin:0});
        floatText(e.x,e.y-40,(e.kind==='evan'?'\u00a1EVAN DERROTADO!':'\u00a1BRIAN DERROTADO!'),'#ffe9b0');
        floatText(e.x,e.y-14,'\u00a1Recoge su billetera!','#bfefff'); return;
      }
      amuleto={x:e.x, y:Math.min(e.y, H-90), bob:0, spin:0, item:(currentMap==='stonebridge'?'key':'amuleto')};
      playLosAndes();
      floatText(amuleto.x, amuleto.y-46, (currentMap==='stonebridge'?'\u00a1BRUJA BLANCA COLOSAL DERROTADA!':'\u00a1TEDDINGTON COLOSAL DERROTADO!'),'#ffe9b0');
      return;
    }
    floatText(e.x,e.y-34,(currentMap==='stonebridge'?'\u00a1BRUJA BLANCA DERROTADA!':currentMap==='templo'?'\u00a1JARJACHA DERROTADA!':currentMap==='machu'?(e.kind==='evan'?'\u00a1EVAN DERROTADO!':'\u00a1BRIAN DERROTADO!'):'\u00a1TEDDINGTON DERROTADO!'),'#ffe9b0');
    // rounds 5/10/15: one gadget power per boss round — only the LAST boss standing drops it
    // (matters on Machu Picchu, where Evan and Brian spawn together)
    if(!enemies.some(en=>en.boss && !en.dead)) spawnBossDrop(e.x,e.y);
    return;
  }
  if(e.type==='normal'||e.type==='fast'){ dropNugget(e.x,e.y); }
  spark(e.x,e.y,e.color,12,160);
  floatText(e.x,e.y-10,'+'+e.pts,'#ffe680');
}

// ---------- Boss-drop gadgets (Rata Blanca / Paredes Incas / Torreta) ----------
// Mid-game bosses (rounds 5/10/15 — the giant round-20 boss ends the game instead) drop ONE random
// gadget pickup. Whoever grabs it first keeps it (single owner, also online). All gadgets are placed
// with the gear key: F for J1, . (Period) for everyone else.
const GRID = 40;                 // invisible placement grid for the Inca wall blocks
// Wall blocks take real damage like a player would: melee enemies hit for their e.dmg (normal 8,
// fast 5, large 20), projectiles for their l.dmg, bosses smash 80 per touch. 240 HP = 30 hits
// from a base normal enemy (double the original 15-hit prototype).
const WALL_HP = 240;
// Modo Infinito concrete blocks are meant to build a refuge that actually lasts — give them a much
// bigger pool than the Horda Paredes Incas so a walled base survives several waves before crumbling.
const LP_BLOCK_HP = 900;         // ~112 hits from a base normal enemy (8 dmg); a swarm still grinds it down
function wallMaxHp(){ return currentMap==='laspalmas' ? LP_BLOCK_HP : WALL_HP; }
const bossDrops = [];            // {id,type,x,y,bob}
const bombs = [];                // Rata Blanca dynamite: {id,owner(player idx),x,y,t}
const incaWalls = [];            // wall blocks; each is ALSO pushed into `obstacles` so collision/pathing just work
const turrets = [];              // {id,x,y,hp,maxhp,cd,ang,hitFlash}
const turretArrows = [];         // {x,y,vx,vy,life,spin}
const GEAR_DEF = {
  dinamita: { label:'RATA BLANCA',   color:'#ff6a4a', count:5  },
  muro:     { label:'PAREDES INCAS', color:'#d8d2c2', count:20 },
  torreta:  { label:'TORRETA',       color:'#caa66a', count:1  },
};
// shuffled bag: the 3 boss rounds of a run deal out all 3 powers in random order, so a full
// playthrough always sees each power once (pure 1/3 rolls could skip one for games in a row)
let gearBag=[];
function nextGearDrop(){
  if(!gearBag.length){
    gearBag=['dinamita','muro','torreta'];
    for(let i=gearBag.length-1;i>0;i--){ const j=randi(0,i); const t=gearBag[i]; gearBag[i]=gearBag[j]; gearBag[j]=t; }
  }
  return gearBag.pop();
}
function spawnBossDrop(x,y){
  const type=nextGearDrop();
  const px=clamp(x,70,WORLD_W-70);
  let py;
  if(currentMap==='machu') py=clamp(y,MACHU_SKY+40,WORLD_H-90);
  else if(currentMap==='stonebridge') py=clamp(y,150,540);
  else py=clamp(y,70,WORLD_H-70);
  bossDrops.push({id:_entId++, type, x:Math.round(px), y:Math.round(py), bob:Math.random()*TAU});
  floatText(px,py-38,'¡PODER ESPECIAL!','#ffe14a');
}
function updateBossDrops(dt){
  for(let i=bossDrops.length-1;i>=0;i--){
    const dr=bossDrops[i]; dr.bob+=dt*4;
    let taken=false;
    for(const p of players){ if(!p.alive||p.pending) continue;
      if(dist(p.x,p.y,dr.x,dr.y)<p.radius+22){
        const G=GEAR_DEF[dr.type];
        p.gear=dr.type; p.gearCount=G.count;
        floatText(p.x,p.y-30,'¡'+G.label+' x'+G.count+'!',G.color);
        spark(dr.x,dr.y,G.color,20,170); playPickup(); taken=true; break;
      }
    }
    if(taken) bossDrops.splice(i,1);
  }
}
function ownedBombs(p){ const idx=players.indexOf(p); const arr=[]; for(const b of bombs){ if(b.owner===idx) arr.push(b); } return arr; }
function useGear(p){
  if(!p.alive) return;
  // armed dynamite out in the field? the same key detonates it before anything else
  const mine=ownedBombs(p);
  if(mine.length){
    for(const b of mine){ explodeBomb(b); const bi=bombs.indexOf(b); if(bi>=0) bombs.splice(bi,1); }
    if(p.gear==='dinamita' && p.gearCount<=0) p.gear='none';
    return;
  }
  if(p.gear==='none'||p.gearCount<=0) return;
  if(p.gear==='dinamita'){
    bombs.push({id:_entId++, owner:players.indexOf(p), x:Math.round(p.x), y:Math.round(p.y), t:0});
    p.gearCount--;
    floatText(p.x,p.y-26,'DINAMITA LISTA ('+p.gearCount+' más)','#ff6a4a'); playPickup();
  } else if(p.gear==='muro'){
    if(placeWall(p)){ p.gearCount--; if(p.gearCount<=0) p.gear='none'; }
  } else if(p.gear==='torreta'){
    if(placeTurret(p)){ p.gearCount--; if(p.gearCount<=0) p.gear='none'; }
  }
}
// Rata Blanca explosion: normal/fast enemies die outright, throwers (leafers/archers) lose
// 3/4 of their max health, bosses take 2x a regular hit from the bomb's owner — the same
// damage rules the specials (Oro/Morganita/Safiro) use.
function explodeBomb(b){
  const ow=players[b.owner], bossDmg=ow?effDmg(ow)*2.3:70;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i]; if(e.dead) continue;
    if(dist(b.x,b.y,e.x,e.y) < 150+e.radius){
      if(e.boss){ e.hp-=bossDmg; } else if(e.leafer||e.archer){ e.hp-=e.maxhp*0.75; } else { e.hp=0; }
      e.hitFlash=0.12; e.stagger=0.3;
      const a=Math.atan2(e.y-b.y,e.x-b.x);
      e.vx+=Math.cos(a)*190; e.vy+=Math.sin(a)*190;
      spark(e.x,e.y,'#ff9a2a',6,140);
      if(e.hp<=0) killEnemy(e,null);
    }
  }
  fx_effects.push({kind:'zap', x:b.x, y:b.y, r:150, life:0.3, max:0.3, col:'#ff9a2a'});
  fx_effects.push({kind:'shock', x:b.x, y:b.y, r:150, life:0.35, max:0.35});
  playZapSound(); cameraShake=10;
}
function rectsOverlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function wallAreaFree(rect, placer){
  if(currentMap==='templo'){ if(rect.x<58||rect.y<58||rect.x+rect.w>WORLD_W-58||rect.y+rect.h>WORLD_H-58) return false; }
  else if(currentMap==='machu'){ if(rect.x<38||rect.x+rect.w>WORLD_W-38||rect.y<MACHU_SKY+8||rect.y+rect.h>WORLD_H-30-Math.max(machuElev(rect.x),machuElev(rect.x+rect.w))) return false; }
  else if(currentMap==='stonebridge'){ if(rect.x<8||rect.x+rect.w>WORLD_W-8||rect.y<116||rect.y+rect.h>572) return false; }
  else { if(rect.x<8||rect.y<8||rect.x+rect.w>WORLD_W-8||rect.y+rect.h>WORLD_H-8) return false; }
  // Las Palmas: don't let a block land on solid terrain (houses, trees, water edges)
  if(currentMap==='laspalmas'){ for(let sx=rect.x+6;sx<=rect.x+rect.w-6;sx+=12) for(let sy=rect.y+6;sy<=rect.y+rect.h-6;sy+=12){ if(lpSolidAt(sx,sy)) return false; } }
  for(const o of obstacles){ if(rectsOverlap(rect,o)) return false; }
  for(const pl of players){ if(pl!==placer && pl.alive && circleRectCollide(pl.x,pl.y,pl.radius+2,rect)) return false; }
  for(const t of turrets){ if(circleRectCollide(t.x,t.y,18,rect)) return false; }
  if(cliffs.length){ for(const cx2 of [rect.x+4,rect.x+rect.w-4]) for(const cy2 of [rect.y+4,rect.y+rect.h-4]){ if(inCliff(cx2,cy2)) return false; } }
  return true;
}
// the GRID cell one block ahead of the player's facing direction — shared by placement and the aim overlay
function wallCellFor(p){
  const tx=p.x+p.facing.x*GRID, ty=p.y+p.facing.y*GRID;
  return {x:Math.floor(tx/GRID)*GRID, y:Math.floor(ty/GRID)*GRID};
}
function placeWall(p){
  const c=wallCellFor(p);
  const rect={x:c.x, y:c.y, w:GRID, h:GRID, t:'incaWall', hp:WALL_HP, maxhp:WALL_HP, id:_entId++};
  if(!wallAreaFree(rect,p)){ floatText(p.x,p.y-26,'¡AQUÍ NO!','#d8d2c2'); return false; }
  incaWalls.push(rect); obstacles.push(rect);
  resolveCollision(p);   // placing while overlapping the new block nudges the builder out
  // enemies standing on the spot get shoved aside so the block always fits
  for(const e of enemies){ if(!e.dead && circleRectCollide(e.x,e.y,e.radius,rect)) resolveCollision(e); }
  spark(rect.x+GRID/2, rect.y+GRID/2, '#d8d2c2', 10, 110); playPickup();
  return true;
}
function placeTurret(p){
  const tx=clamp(p.x+p.facing.x*52, 40, WORLD_W-40), ty=clamp(p.y+p.facing.y*52, 40, WORLD_H-40);
  let ok=true;
  const spot={x:tx-14,y:ty-14,w:28,h:28};
  for(const o of obstacles){ if(rectsOverlap(spot,o)){ok=false;break;} }
  if(ok && currentMap==='laspalmas' && (lpSolidAt(tx,ty)||lpSolidAt(tx-12,ty)||lpSolidAt(tx+12,ty)||lpSolidAt(tx,ty-12)||lpSolidAt(tx,ty+12))) ok=false;
  if(ok && cliffs.length && inCliff(tx,ty)) ok=false;
  if(ok){ for(const t of turrets){ if(dist(tx,ty,t.x,t.y)<48){ok=false;break;} } }
  if(ok && currentMap==='machu' && (ty<MACHU_SKY+20||ty>WORLD_H-30-machuElev(tx))) ok=false;
  if(ok && currentMap==='stonebridge' && (ty<126||ty>562)) ok=false;
  if(!ok){ floatText(p.x,p.y-26,'¡AQUÍ NO!','#caa66a'); return false; }
  turrets.push({id:_entId++, x:Math.round(tx), y:Math.round(ty), hp:40, maxhp:40, cd:1.2, ang:0, hitFlash:0});
  spark(tx,ty,'#caa66a',14,130); floatText(tx,ty-34,'¡TORRETA!','#caa66a'); playPickup();
  return true;
}
function hitWall(w,n){
  w.hp-=n; spark(w.x+w.w/2, w.y+10, '#c9c2b2', 5, 90);
  if(w.hp<=0){
    const wi=incaWalls.indexOf(w); if(wi>=0) incaWalls.splice(wi,1);
    const oi=obstacles.indexOf(w); if(oi>=0) obstacles.splice(oi,1);
    spark(w.x+w.w/2, w.y+w.h/2, '#d8d2c2', 18, 150); playHitThud();
    floatText(w.x+w.w/2, w.y, '¡MURO DESTRUIDO!', '#d8d2c2');
  }
}
function hitTurret(t,n){
  // damage gate: a mob piling on can only land ONE hit every 0.15s total — without this, 15
  // enemies each with their own attack cooldown shred 800hp in about a second (and the moment
  // they all arrive their cooldowns are ALL at zero: a synchronized first-frame burst)
  if(survival){ if((t._gate||0)>0) return; t._gate=0.15; }
  t.hp-=n; t.hitFlash=0.15; spark(t.x,t.y-20,'#caa66a',5,90);
  if(t.hp<=0){
    const i=turrets.indexOf(t); if(i>=0) turrets.splice(i,1);
    spark(t.x,t.y-16,'#caa66a',22,170); floatText(t.x,t.y-36,'¡TORRETA DESTRUIDA!','#ff8a6a');
    playHitThud(); cameraShake=6;
  }
}
// true when the straight line from (x1,y1) to (x2,y2) crosses any player-built Inca wall
function segIncaBlocked(x1,y1,x2,y2){
  for(const w of incaWalls){
    const rx=w.x,ry=w.y,rx2=w.x+w.w,ry2=w.y+w.h;
    if(segSeg(x1,y1,x2,y2,rx,ry,rx2,ry)||segSeg(x1,y1,x2,y2,rx2,ry,rx2,ry2)||
       segSeg(x1,y1,x2,y2,rx2,ry2,rx,ry2)||segSeg(x1,y1,x2,y2,rx,ry2,rx,ry)) return true;
  }
  return false;
}
function updateGear(dt){
  // dynamite fuse sparkle
  for(const b of bombs){ b.t=(b.t||0)+dt; if(Math.random()<0.25) spark(b.x+4,b.y-16,'#ffe24a',1,35); }
  // turrets: track the nearest enemy, loose an arrow every 3s at the nearest one in line of sight
  for(const t of turrets){
    if(t.hitFlash>0) t.hitFlash-=dt;
    if(t._gate>0) t._gate-=dt;
    t.cd-=dt;
    const trange=t.beef?640:560, treload=t.beef?2.4:3, tspd=t.beef?460:340;   // beefed turret reload 1.4->2.4s: one extra breath between arrows
    let aim=null, ad=1e9;
    for(const e of enemies){ if(e.dead) continue; const dd=dist(t.x,t.y,e.x,e.y); if(dd<ad){ad=dd;aim=e;} }
    if(aim) t.ang=Math.atan2(aim.y-(t.y-26), aim.x-t.x);
    if(t.cd<=0 && aim && ad<trange){
      let best=null, bd=1e9;
      // Modo Infinito: turrets shoot OVER the player's concrete blocks, so a base with a turret inside
      // can still fire out (survival skips the line-of-sight wall check; other maps keep it).
      for(const e of enemies){ if(e.dead) continue; const dd=dist(t.x,t.y,e.x,e.y); if(dd<bd && dd<trange && (survival || !segBlocked(t.x,t.y-26,e.x,e.y))){bd=dd;best=e;} }
      if(best){
        const a=Math.atan2(best.y-(t.y-26), best.x-t.x);
        // Modo Infinito: the arrow's kill power scales with the turret's enhancement (no one-shot until enh3)
        const frac=survival ? WENH_TURRET[Math.min(ENH_MAX, t.enh||0)] : 1;
        turretArrows.push({x:t.x, y:t.y-26, vx:Math.cos(a)*tspd, vy:Math.sin(a)*tspd, life:2.2, spin:a, beef:t.beef, frac});
        t.ang=a; t.cd=treload; spark(t.x,t.y-26,'#d8c89a',4,60); sfxTurretShot(t.x,t.y);
      } else t.cd=0.4;   // everything walled off — retry soon instead of waiting the full 3s
    }
  }
  // turret arrows: instant-kill normal enemies, chip bosses
  for(let i=turretArrows.length-1;i>=0;i--){
    const r=turretArrows[i]; r.x+=r.vx*dt; r.y+=r.vy*dt; r.life-=dt;
    let gone=r.life<=0||r.x<-30||r.x>WORLD_W+30||r.y<-30||r.y>WORLD_H+30;
    // survival: skip obstacle collision entirely — on Las Palmas `obstacles` holds only the player's
    // own concrete blocks, and turret arrows are meant to fly over them (terrain isn't in obstacles).
    if(!gone && !survival){ for(const o of obstacles){ if(circleRectCollide(r.x,r.y,4,o)){gone=true; spark(r.x,r.y,'#bfa77a',4,60); break;} } }
    if(!gone) for(const e of enemies){ if(e.dead||e.dcLock) continue;
      if(dist(r.x,r.y,e.x,e.y)<e.radius+6){
        const fr=(r.frac==null?1:r.frac);
        if(e.boss){ e.hp-=30*fr; }                                 // bosses take it like a regular player hit
        else if(fr>=1){ if(e.leafer||e.archer) e.hp-=e.maxhp*0.34; else e.hp=0; }   // enh3: one-shot normals, 3 arrows for throwers
        else { e.hp-=e.maxhp*fr; }                                 // sub-enh3: chips by the turret's fraction (needs several arrows)
        e.hitFlash=0.12; e.stagger=0.25;
        spark(e.x,e.y,'#d8c89a',6,110); playHitThud();
        if(e.hp<=0) killEnemy(e,null);
        gone=true; break;
      }
    }
    if(gone) turretArrows.splice(i,1);
  }
  // bosses are too big to be fenced in — they smash wall blocks on contact (5 dmg per swing)
  for(const e of enemies){ if(!e.boss||e.dead) continue;
    if(e._wallCd>0){ e._wallCd-=dt; continue; }
    for(const w of incaWalls){
      if(circleRectCollide(e.x,e.y,(e.footR||e.radius)+6,w)){ e._wallCd=0.5; hitWall(w,80); cameraShake=5; break; }
    }
  }
  // Modo Infinito: any enemy pressed against a concrete block claws at it (its melee dmg per swing),
  // so barricades get chewed down instead of just funnelling — enemies still prefer to route around.
  if(survival) for(const e of enemies){ if(e.boss||e.dead) continue;
    if(e._wallCd>0){ e._wallCd-=dt; continue; }
    for(const w of incaWalls){
      if(circleRectCollide(e.x,e.y,(e.footR||e.radius)+5,w)){
        e._wallCd=0.55; if(e.skin==='knight'||e.skin==='knight_gold') e.punchAnim=KN_PUNCH;
        hitWall(w, e.dmg||8); break;
      }
    }
  }
}

// ---------- Camera shake ----------
let cameraShake = 0;

// ---------- Update loops ----------
function updatePlayers(dt){
  for(const p of players){
    if(!p.alive) continue;
    if(p.shieldFlash>0) p.shieldFlash-=dt;
    if(p.cooldown>0) p.cooldown-=dt;
    if(p.punchAnim>0) p.punchAnim-=dt;
    if(p.hitFlash>0) p.hitFlash-=dt;
    // movement
    const c=p.controls;
    const ks=p.keysrc||keys;
    p.animTime+=dt;
    const rem=p.netRemote;
    if(rem && rem.grace>0) rem.grace-=dt;
    // Client-authoritative movement: a joined player simulates its OWN position locally (zero input
    // round-trip) and streams us the pose; we adopt it verbatim, only clamping + wall-resolving so it
    // can't clip through geometry. `grace` briefly ignores the stream right after we teleport the player
    // (round start / revive / join) until its post-teleport pose catches up. Attacks stay host-side below.
    if(rem && rem.pose && (!(rem.grace>0)) && p.alive && !p.pending){
      const ps=rem.pose;
      p.moving=ps.mv;
      if(ps.mv){ p.facing.x=ps.fx; p.facing.y=ps.fy; p.dir=ps.dir; }
      p.x=clamp(ps.x,0,WORLD_W); p.y=clamp(ps.y,0,WORLD_H);
      resolveCollision(p);
    } else {
      // local players (and the fallback before a guest's pose stream arrives): integrate from keys.
      let mx=0,my=0;
      if(ks[c.up]) my-=1;
      if(ks[c.down]) my+=1;
      if(ks[c.left]) mx-=1;
      if(ks[c.right]) mx+=1;
      // Ticla steering: strict 4-way where the LAST direction key pressed wins outright — hold W
      // going north, tap D → you turn east; release D (W still held) → back to north. Tracked by
      // press order per player. Walking keeps the normal 8-way blend.
      {
        const ord=p._keyOrd||(p._keyOrd=[]);
        const nowK={u:!!ks[c.up], d:!!ks[c.down], l:!!ks[c.left], r:!!ks[c.right]};
        for(const kk of ['u','d','l','r']){ const has=ord.indexOf(kk)>=0;
          if(nowK[kk]&&!has) ord.push(kk); else if(!nowK[kk]&&has) ord.splice(ord.indexOf(kk),1); }
        if(p.riding){ mx=0; my=0; const last=ord[ord.length-1];
          if(last==='u') my=-1; else if(last==='d') my=1; else if(last==='l') mx=-1; else if(last==='r') mx=1; }
      }
      if(p._stun>0){ mx=0; my=0; }   // just crashed off the Ticla — brief daze
      // shared-screen co-op: an open transfer menu borrows the OTHER pad's keys (P1's menu uses the
      // arrows = J2's movement; J2's menu uses WASD = J1's movement) — freeze that victim briefly
      if(survival && NET.role!=='guest'){
        const p0=players[0], p1=players[1];
        if(p0 && p0!==p && p0._xfer && p0._xfer.open && p0.alive && c.up==='ArrowUp'){ mx=0; my=0; p.moving=false; }
        if(p1 && p1!==p && !p1.netRemote && p1._xfer && p1._xfer.open && p1.alive && c.up==='KeyW'){ mx=0; my=0; p.moving=false; }
      }
      p.moving=!!(mx||my);
      if(mx||my){
        const l=Math.hypot(mx,my); mx/=l; my/=l;
        p.facing.x=mx; p.facing.y=my;
        p.dir = Math.abs(mx)>Math.abs(my) ? (mx<0?'w':'e') : (my<0?'n':'s');
        let sp=effSpeed(p);
        if(p.riding){
          // skid when flipping direction at speed: momentum drops and dust kicks — the grid feels physical
          if(p._rideDir && p._rideDir!==p.dir && (p._rideAcc||0)>0.5){
            p._rideAcc=0.4; sfxSkid(p.x,p.y);
            fx_effects.push({kind:'dust', x:Math.round(p.x), y:Math.round(p.y+p.radius*0.7), life:0.35, max:0.35});
          }
          p._rideDir=p.dir;
          // ease into top speed from ~35% — pedaling from a standstill FEELS like pedaling
          p._rideAcc=Math.min(1,(p._rideAcc||0)+dt*1.8);
          sp*=BIKE_SPEED*(0.35+0.65*p._rideAcc)*(p._rideSlow>0?0.55:1);
        }
        p.x+=mx*sp*dt; p.y+=my*sp*dt;
        resolveCollision(p);
      } else if(p.riding){ p._rideAcc=Math.max(0,(p._rideAcc||0)-dt*3); }   // keep _rideDir: a quick stop-and-flip still reads as a skid
    }
    if(survival){   // Modo Infinito: auto weapons fire while held; grenades charge on hold; the rest tap-to-fire
      if(state===STATE.PLAY){
        const _W=WEAPONS[p.weapon]||WEAPONS.pistol;
        if(p.riding){
          // no shooting from the saddle — the fire key rings the bell instead (pure joy, zero damage)
          p.nadeArmed=false;

function nearestPlayer(e){

    const nb=[[1,0],[-1,0],[0,1],[0,-1]];

function updateEnemies(dt){

    if(e.dead){ e.deathT+=dt; if(e.deathT>5.7) enemies.splice(i,1); continue; }
    if(e.boss){ updateBoss(e,dt); continue; }
    if(e.hitFlash>0) e.hitFlash-=dt;
    if(e.stagger>0){ e.stagger-=dt; }
    if(e.atkcd>0) e.atkcd-=dt;
    if(e.punchAnim>0) e.punchAnim-=dt;
    if(e.hitAnim>0) e.hitAnim-=dt;
    e.wob += dt*6;

    e.vx*=0.86; e.vy*=0.86;

    // chaotic curving bursts — each picks its own random heading so a lit group scatters — but it's
    // leashed to where it caught fire, so one incendiary round can't walk the blaze across the map.

      if(e.panicAX==null){ e.panicAX=e.x; e.panicAY=e.y; e.panicA=Math.random()*TAU; e.panicT=0; e.panicSpin=(Math.random()<0.5?-1:1)*rand(1.6,3.6); }
      e.panicT-=dt;
      if(e.panicT<=0){ e.panicT=rand(0.35,0.8); e.panicA=Math.random()*TAU; e.panicSpin=(Math.random()<0.5?-1:1)*rand(1.6,3.6); }
      e.panicA+=e.panicSpin*dt;   // the constant turn = running in circles

      const lx=e.x-e.panicAX, ly=e.y-e.panicAY;
      if(Math.hypot(lx,ly)>240){ e.panicA=Math.atan2(-ly,-lx); mx2=Math.cos(e.panicA); my2=Math.sin(e.panicA); }   // leash: curve back toward the ignition spot
      const psp=e.speed*1.3;
      e.x+=mx2*psp*dt; e.y+=my2*psp*dt;
      e.moving=true; e.animTime+=dt;
      e.dir=Math.abs(mx2)>Math.abs(my2)?(mx2<0?'w':'e'):(my2<0?'n':'s'); e.faceRight=mx2>0;
      resolveCollision(e);
      e._lx=e.x; e._ly=e.y;
      continue;   // no chasing, no attacking while ablaze
    } else if(e.panicAX!=null){ e.panicAX=null; e.panicAY=null; }

    const {p:tgt,d} = nearestTarget(e);

        e.aimRight = adx>0;
        if(!e.shotDone && e.aiming<=(e.supay?0.9:e.llama?0.6:0.7)){ if(e.supay) fireSupayballs(e,tgt); else if(e.llama) fireSpit(e,tgt); else fireArrow(e,tgt); e.shotDone=true; }
      } else if(tgt.isDecoy && d < e.radius+26){

        if(e.skin==='grey'){ e.hitAnim=0.34; const hx=tgt.x-e.x, hy=tgt.y-e.y; e.dir=Math.abs(hx)>Math.abs(hy)?(hx<0?'w':'e'):(hy<0?'n':'s'); }
        spark(tgt.x,tgt.y-8,'#ffcf9a',3,70);
      }
    } else if(e.dcLock) e.dcLock=false;
