    if(tgt && !tgt.isDecoy && d < e.radius+tgt.radius+2 && e.atkcd<=0){
      e.atkcd=0.6; if(e.skin==='tourist'){ fx_effects.push({kind:'camflash', x:e.x, y:e.y-e.radius*1.3+(currentMap==='machu'?machuElev(e.x):0), life:0.18, max:0.18}); playCameraClick(); } if(e.skin==='knight'||e.skin==='knight_gold') e.punchAnim=KN_PUNCH; if(e.skin==='supay' && !e.supay){ e.hitAnim=0.18; const hx=tgt.x-e.x, hy=tgt.y-e.y; e.dir=Math.abs(hx)>Math.abs(hy)?(hx<0?'w':'e'):(hy<0?'n':'s'); e.aimRight=hx>0; } if(e.skin==='grey'){ e.hitAnim=0.34; const hx=tgt.x-e.x, hy=tgt.y-e.y; e.dir=Math.abs(hx)>Math.abs(hy)?(hx<0?'w':'e'):(hy<0?'n':'s'); }
      // Modo Infinito damage gate: walking into a cluster no longer means 10 simultaneous hits —
      // at most one contact hit lands every 0.28s (the rest of the mob swings at air). Ranged
      // attacks (slime balls, arrows) bypass the gate. Other modes keep their original rules.
      if(!(survival && (tgt.dmgGateT||0)>0)){

        if(survival && tgt.riding){ tgt._rideHits=(tgt._rideHits||0)+1; tgt._rideHitDecay=2.5; if(tgt._rideHits>=3) crashBike(tgt); }
        if(tgt.shields>0){
          tgt.shields--; tgt.shieldFlash=0.25;
          spark(tgt.x,tgt.y,'#7fd4ff',12,150);
          floatText(tgt.x,tgt.y-24,'BLOQUEO','#7fd4ff');
        } else {
          tgt.hp -= e.dmg;
          spark(tgt.x,tgt.y,'#ff5050',6,100);
          // AI allies die through updateNpcs (their own death voice + respawn queue), not the player path
          if(tgt.hp<=0 && !tgt.isNpc){ tgt.hp=0; tgt.alive=false; tgt.deathAnim=0; lastDead=tgt; playCharDeath(tgt.kind); spark(tgt.x,tgt.y,tgt.color,20,180); }
        }
      }
    }
    // turret melee: enemies claw it down with their real contact damage (player contact wins ties above)
    else if(turTgt && e.atkcd<=0 && dist(e.x,e.y,turTgt.x,turTgt.y) < e.radius+20){
      e.atkcd=0.6; if(e.skin==='knight'||e.skin==='knight_gold') e.punchAnim=KN_PUNCH;
      hitTurret(turTgt, e.dmg||8);
    }
  }
}

function updateBreakItems(dt){
  for(const a of apuchis){ a.bob+=dt*7; if(a.spawn<1) a.spawn=Math.min(1,a.spawn+dt*3); }
  for(const p of players){ if(!p.alive || p.riding) continue;   // no pickups from the saddle — park the Ticla first
    for(let i=apuchis.length-1;i>=0;i--){
      const a=apuchis[i];
      if(dist(p.x,p.y,a.x,a.y) < p.radius+a.r){
        if(a.type==='rio' && (p.rioGrabbed || p.hp>=p.maxhp)) continue;   // 1 Rio each, and not when full
        if(apuMaxed(p,a.type)) continue;   // already at max stack for this power -> leave it for the others (don't waste it)

// True when the player is already at the max stack for a capped power, so grabbing another

function apuMaxed(p,type){

// ---------- Wave control ----------
function enemiesForRound(r){ return Math.round(4 + r*1.7 + Math.pow(r,1.15)); }

function startRound(){
  round++;
  state = STATE.PLAY;
  // Party difficulty: solo keeps its 0.7x discount; any 2-player game (local or online)
  // is the 1.3x co-op baseline; 3p is +15% and 4p +25% over that baseline.
  // Recomputed every round from the ACTIVE player count, so mid-game joins/leaves take
  // effect at the next round (this also fixes the solo-host case: mode is set once at
  // startGame, so a lone online host kept the 0.7x discount even after friends joined).
  const nParty = activePlayerCount();
  const partyMul = (nParty>=4) ? 1.63 : (nParty===3) ? 1.50 : (nParty>=2) ? 1.3 : 1;
  spawnQueue = Math.max(3, Math.round(enemiesForRound(round)*MAP_CFG[currentMap].countMul*((currentMap==='stonebridge'&&nParty>=2)?1.2:1)*(nParty===1?0.7:1)*partyMul));
  // Bigger parties also spawn faster, not just more: without this, extra firepower kills
  // the fixed trickle instantly and rounds get longer instead of harder.
  spawnPace = partyMul;
  spawnTimer = 0;
  if(round%5===0 && currentMap==='machu'){ spawnQueue=Math.round(spawnQueue*0.5); spawnMachuBoss('evan', round===20, 0); spawnMachuBoss('brian', round===20, 1); }
  else if(round===20){ spawnQueue=0; spawnGiantBoss(); }
  else if(round%5===0){ spawnQueue = Math.round(spawnQueue*0.45); spawnBoss(round); }
  playRoundStart(round);
  apuchis.length=0; lpItems.length=0; fx_effects.length=0; leaves.length=0; bullets.length=0; grenades.length=0; mines.length=0; hearts.length=0; rays.length=0; iceBeams.length=0; amuleto=null; nuggets.length=0; wallets.length=0; walletGot={evan:false,brian:false};
}
function startBreak(){
  state = STATE.BREAK;
  breakTimer = BREAK_LEN;
  // Tierra/Piedra stacks expire at the end of each round
  for(const p of players){ p.tierra=0; p.piedra=0; p.rioGrabbed=false; }
  // co-op: fallen players return for the countdown (can grab Apuchis) at their cross.
  // Free respawn is at 50% health (fresh joiners enter at full) — grab a Rio to top up.
  // Disconnected guests stay down until they reconnect.
  { const anchor=players.find(pp=>pp.alive); for(const p of players){ if(!p.alive && !p.departed){ if(anchor){ p.x=anchor.x+(p===players[0]?-40:40); p.y=anchor.y; } const joining=p.pending; p.pending=false; p.alive=true; p.fell=false; p.deathAnim=null; p.hp=joining?p.maxhp:Math.round(p.maxhp*0.5); p.reviveProgress=0; p.shieldFlash=0; resolveCollision(p); if(p.netRemote) p.netRemote.grace=0.5; spark(p.x,p.y,p.color,18,150); floatText(p.x,p.y-28,joining?'¡ENTRA!':'RENACE','#aef7c2'); } } }
  spawnBreakItems();
  const bonus = 20 + round*5;   // round completion bonus
  score += bonus;
}

// ---------- Las Palmas survival: endless spawner (no rounds/breaks) ----------
// Las Palmas cinematic intro: fullscreen video (with its own audio) that plays every time you enter
// the map, then hands off to the round. Skippable. If the asset is missing it silently starts the game,
// so the mode always works even before the video file is added.
let introPlaying=false, introSkip=null;   // introSkip: call to end the clip early (SALTAR button or a key)
let introUnmute=null;   // guest clip started muted (no gesture yet): first key/click calls this to un-mute
// Silence EVERY music element — the intro clip is the only thing that should be audible.
function silenceAllMusic(){ try{ lpMusicStop(); [menuMusic,bgMusic,sbMusic,tpMusic,evMusic,pvpMusic,deathMusic,losAndesMusic].forEach(m=>{ if(m) m.pause(); }); }catch(e){} }
// The intro's baked-in audio (Alfredo) was recorded quiet; route the <video> through a Web Audio
// gain > 1 so it plays back noticeably louder — then through a DynamicsCompressor so the boost
// doesn't blow headphones on the track's loud spikes: quiet dialogue stays at normal loudness,
// anything crossing the threshold gets squashed 7:1 instead of clipping at 3× raw. A
// MediaElementSource can be created only once per element, so cache the whole chain.
let _introSrcNode=null, _introGain=null, _introComp=null;
function boostIntroAudio(v){
  try{
    if(!actx) return;
    if(actx.state==='suspended') actx.resume();   // routed audio is silent if the context is parked
    if(!_introSrcNode){
      _introSrcNode=actx.createMediaElementSource(v); _introGain=actx.createGain();
      _introSrcNode.connect(_introGain);
      try{
        _introComp=actx.createDynamicsCompressor();
        _introComp.threshold.value=-20; _introComp.knee.value=18; _introComp.ratio.value=7;
        _introComp.attack.value=0.003; _introComp.release.value=0.25;
        _introGain.connect(_introComp); _introComp.connect(actx.destination);
      }catch(e){ _introComp=null; _introGain.connect(actx.destination); }
    }
    _introGain.gain.value=_introComp?3.0:2.55;   // no compressor available → trim the boost ~15% instead
  }catch(e){}
}
function playLasPalmasIntro(onDone){
  const v=document.getElementById('introvideo'), skip=document.getElementById('introskip');
  if(!v){ onDone(); return; }
  let done=false, watchdog=0;
  const finish=()=>{ if(done) return; done=true; introPlaying=false; introSkip=null; if(watchdog) clearTimeout(watchdog);
    try{ v.pause(); v.onended=v.onerror=v.onplaying=null; }catch(e){}
    v.style.display='none'; if(skip){ skip.style.display='none'; skip.onclick=null; }
    onDone();   // caller decides what plays next (character select re-starts the map music)
  };
  introSkip=finish;
  introPlaying=true;                   // set BEFORE silencing so any stray initAudio() stays muted
  try{ silenceAllMusic(); }catch(e){}  // hard-stop all music while the clip plays
  boostIntroAudio(v);
  v.muted=false; v.volume=1;
  v.style.display='block'; if(skip){ skip.style.display='block'; skip.onclick=finish; }
  v.onended=finish; v.onerror=finish;   // decode error → just start the round
  // <source> children don't reliably bubble an 'error' to the video, so a watchdog covers a total
  // failure (missing files / stalled). 'playing' means it started fine and cancels the watchdog.
  v.onplaying=()=>{ if(watchdog){ clearTimeout(watchdog); watchdog=0; } };
  watchdog=setTimeout(()=>{ if(!done && v.paused && (v.currentTime||0)<0.05) finish(); }, 8000);
  try{ v.load(); }catch(e){}            // reset to the start + pick a playable <source> (mp4 or webm)
  try{ v.currentTime=0; }catch(e){}
  const pr=v.play(); if(pr&&pr.catch) pr.catch(()=>finish());   // autoplay blocked → start the round
}
// ---- Online Modo Infinito intro: everyone watches, only the host can skip ----
// The data channel is UNRELIABLE, so we don't fire one-shot start/stop messages: the host
// heartbeats {_introNet:1} every frame while its clip plays, and each guest ends its own clip
// the instant the first real gameplay snapshot arrives (the host resumes broadcasting those the
// moment its intro finishes or is skipped). That survives dropped packets in both directions.
let netIntroAccum=0;
function netBroadcastIntro(dt){
  if(NET.role!=='host' || !NET.conns.length) return;
  netIntroAccum+=dt; if(netIntroAccum<0.08) return; netIntroAccum=0;   // ~12×/s is plenty for a start cue
  for(const g of NET.conns){ try{ if(g.conn && g.conn.open) g.conn.send({_introNet:1}); }catch(e){} }
}
function playIntroGuest(){
  if(introPlaying) return;   // idempotent — repeated heartbeats mustn't restart the clip
  const v=document.getElementById('introvideo'), skip=document.getElementById('introskip');
  if(!v) return;
  NET.nsel=null; NET.snap=null; NET.guestReady=false;   // leave the pick screen; wait for the pick screen / gameplay after
  gIntroCutSeq=gLastSeq;                                // only packets NEWER than this may end the clip
  introPlaying=true; introSkip=null;                    // guests can't skip — the host controls the clip
  try{ silenceAllMusic(); }catch(e){}
  boostIntroAudio(v);
  v.muted=false; v.volume=1;
  v.style.display='block'; if(skip) skip.style.display='none';   // no SALTAR button for guests
  v.onended=endIntroGuest; v.onerror=endIntroGuest;
  try{ v.load(); v.currentTime=0; }catch(e){}
  // Autoplay policy: a guest who hasn't touched the page yet can't start an UNMUTED video — that
  // used to leave the clip frozen on its first frame. Fall back to a MUTED start (always allowed),
  // show a pulsing "click/press a key for sound" banner so they know ONE gesture fixes it, and
  // un-mute on that first key/click/tap (a real gesture also lets the boost ctx resume).
  // The guest key handler swallows events (stopImmediatePropagation), so it calls introUnmute itself.
  const sndHint=on=>{ try{ const h=document.getElementById('introsnd'); if(h) h.style.display=on?'block':'none'; }catch(e){} };
  const pr=v.play();
  if(pr&&pr.catch) pr.catch(()=>{ try{ v.muted=true; const p2=v.play(); if(p2&&p2.catch) p2.catch(()=>{}); }catch(e){} });
  // the banner also covers the sneakier failure: unmuted play was ALLOWED but the boost context is
  // still parked (WebAudio-routed sound stays silent until a gesture resumes it)
  setTimeout(()=>{ try{ if(introPlaying && (v.muted || (actx && actx.state==='suspended'))) sndHint(true); }catch(e){} }, 500);
  introUnmute=()=>{
    if(!introPlaying){ introUnmute=null; sndHint(false); return; }
    try{ boostIntroAudio(v); v.muted=false; if(v.paused){ const p3=v.play(); if(p3&&p3.catch) p3.catch(()=>{}); } }catch(e){}
    sndHint(false);
  };
}
function endIntroGuest(){
  const v=document.getElementById('introvideo'), skip=document.getElementById('introskip');
  introPlaying=false; introSkip=null; introUnmute=null;
  try{ if(v){ v.pause(); v.onended=v.onerror=null; v.style.display='none'; } }catch(e){}
  try{ const h=document.getElementById('introsnd'); if(h) h.style.display='none'; }catch(e){}
  if(skip) skip.style.display='none';
}
// Online host path (lobby ENTER): playLasPalmasIntro rolls the clip (with a working SALTAR) while
// netBroadcastIntro (host frame loop) cues every guest to roll theirs; when the clip ends or the host
// skips, the room lands on the character pick screen (see handleMenuKey's STATE.LOBBY branch).
// Las Palmas apocalyptic atmosphere: a subtle warm-red multiply + faint red mist + soft dark-red
// vignette, matching the alien-invasion intro. Kept light so the map stays readable.
function drawLasPalmasTint(){
  ctx.save();
  // 1) inject warm red light so even green areas glow reddish (the "mist")
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle='rgba(130,18,10,0.20)';
  ctx.fillRect(0,0,W,H);
  // 2) multiply to redden + deepen the midtones/shadows
  ctx.globalCompositeOperation='multiply';
  ctx.fillStyle='rgba(255,105,85,0.34)';
  ctx.fillRect(0,0,W,H);
  // 3) faint flat red haze
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(150,25,15,0.10)';
  ctx.fillRect(0,0,W,H);
  // 4) soft dark-red vignette for the apocalyptic mood
  const g=ctx.createRadialGradient(W/2,H*0.46,H*0.26,W/2,H*0.55,H*1.02);
  g.addColorStop(0,'rgba(40,0,0,0)'); g.addColorStop(1,'rgba(48,0,0,0.42)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.restore();
}
// ---------- Modo Infinito death poses ----------
// Bespoke lying-down art (body + blood pool + dropped water gun) per roster character. A fallen
// player or ally stays on the ground in this pose ~30s, fading out over the last 3, then vanishes.
const DP_IMG={}; for(const nm of ['alfredo','mati','sebas','vannucci','flash']){ const im=new Image(); im.src='assets/char_'+nm+'_dp.png'; DP_IMG[nm]=im; }
const CORPSE_LIFE=30, CORPSE_FADE=3;
const corpses=[];   // fallen NPC allies leave one of these; players draw their pose via drawPlayer while dead
function drawDeathPose(kind,x,y,groundY,t){
  const img=DP_IMG[kind]; if(!img || !img.naturalWidth) return false;
  const DW=img.naturalWidth*0.42, DH=img.naturalHeight*0.42;   // assets ship at 2× — drawn slightly smaller than half so the pose matches the standing sprite

function updateCorpses(dt){ for(let i=corpses.length-1;i>=0;i--){ corpses[i].t+=dt; if(corpses[i].t>=CORPSE_LIFE) corpses.splice(i,1); } }
// ---------- Modo Infinito NPC helpers ----------
// The roster characters nobody is playing wander the map IDLE + hidden; walk into one to TAG it and
// it joins as an AI ally that hunts enemies until it dies. ONE ally at a time; random order; a delay
// before the next appears; the pool loops once everyone has fallen. Host-authoritative + replicated.
const npcs=[];
let npcQueue=[], npcSpawnT=14;
// Allies come ONLY from this mode's playable roster, minus every character a PRESENT player holds.
// E.g. 4 players online and nobody chose Flash → Flash is the only ally that game. A leaver's
// character returns to the pool; a mid-game joiner claims theirs back OUT of the pool (the host
// join handler despawns any NPC of that kind and filters the queue).
function npcRoster(){ return SURV_CHAR_LIST.filter(k=>!players.some(p=>p.kind===k && !p.departed)); }
function refillNpcQueue(){ npcQueue=npcRoster(); for(let i=npcQueue.length-1;i>0;i--){ const j=randi(0,i); const t=npcQueue[i]; npcQueue[i]=npcQueue[j]; npcQueue[j]=t; } }
function makeNpc(kind,x,y){
  const n=makePlayer(kind,x,y,null);   // reuse the player shape so drawPlayer/charFrame just work
  n.id=_entId++;                       // stable id for cross-snapshot matching (online replication)
  n.isNpc=true; n.npcState='idle'; n.tagBob=Math.random()*TAU;
  n.maxhp *= (activePlayerCount()<=1 ? 3 : 2);   // solo: the ally is your only backup → 3× player HP; co-op/online: 2×
  n.hp=n.maxhp; n.weapon='pistol';               // always a pistol
  n.aiShootCd=0; n.aiRepathT=0; n.aiWX=x; n.aiWY=y;
  n.aiSide=Math.random()<0.5?-1:1; n.aiStuckT=0; n.aiLX=x; n.aiLY=y; n.aiDetourT=0; n.aiDetourA=0; n.aiReturn=false;
  n.aiTgt=null; n.aiTgtT=0;   // target lock: commit to one enemy ~1s so aim/facing doesn't thrash in a crowd
  n.aiOffT=0;                 // seconds spent fully off-screen (catch-up teleport timer)
  n.aiFleeT=0; n._hf=0;       // survival instinct: flee window + hit edge tracker
  return n;
}
// -- NPC navigation brains --
// Walking is blocked by map solids AND player-built concrete blocks; a shot only needs the bullet
// path clear (bullets stop on solids but fly over the pool/jacuzzi — same rule as updateBullets).
function npcWalkBlocked(x,y){ if(lpSolidAt(x,y)) return true; if(incaWalls.length) for(const w of incaWalls){ if(x>w.x-4&&x<w.x+w.w+4&&y>w.y-4&&y<w.y+w.h+4) return true; } return false; }
function npcShotLos(x0,y0,x1,y1){ const d=Math.hypot(x1-x0,y1-y0), stp=Math.max(2,Math.ceil(d/14)); for(let s=1;s<stp;s++){ const tx=x0+(x1-x0)*s/stp, ty=y0+(y1-y0)*s/stp; if(lpSolidAt(tx,ty)&&!lpBulletPass(tx,ty)) return false; } return true; }
// Whisker steering: head straight for (tx,ty), but if the next ~66px are walled, swing the heading in
// growing steps to whichever side opens up first. n.aiSide is hysteresis — once it commits to going
// around a house clockwise it keeps hugging that side instead of dithering left-right at the corner.
function npcSteer(n,tx,ty){
  const base=Math.atan2(ty-n.y,tx-n.x);
  const probe=a=>{ const cx=Math.cos(a),cy=Math.sin(a); return !(npcWalkBlocked(n.x+cx*22,n.y+cy*22)||npcWalkBlocked(n.x+cx*44,n.y+cy*44)||npcWalkBlocked(n.x+cx*66,n.y+cy*66)); };
  if(probe(base)){ n.aiSide=0; return base; }
  const pref=n.aiSide||(Math.random()<0.5?-1:1);
  for(const stepDeg of [30,55,80,105,130,155]){
    const st=stepDeg*Math.PI/180;
    if(probe(base+pref*st)){ n.aiSide=pref; return base+pref*st; }
    if(probe(base-pref*st)){ n.aiSide=-pref; return base-pref*st; }
  }
  return base+Math.PI;   // fully boxed in — back straight out
}
function spawnIdleNpc(){
  if(npcs.length>=1 || !npcQueue.length) return;   // ONE ally at a time — the next appears after this one falls
  const kind=npcQueue.pop();
  if(players.some(p=>p.kind===kind && !p.departed)) return;   // stale queue entry (a present player owns it) — drop it, retry next tick
  for(let t=0;t<60;t++){                     // anywhere walkable on the map (a corner, behind a house…),
    const x=rand(240,LP_W-240), y=rand(240,LP_H-240);   // just never inside ANY player's view (no pop-in on any screen)
    if(lpSolidAt(x,y)) continue;
    let seen=false;
    for(const p of players){ if(p.departed) continue;
      const px=clamp(p.x-W/2,0,Math.max(0,WORLD_W-W)), py=clamp(p.y-H/2,0,Math.max(0,WORLD_H-H));
      if(x>px-60 && x<px+W+60 && y>py-60 && y<py+H+60){ seen=true; break; } }
    if(seen) continue;
    // never FULLY hidden behind a tall prop (palm crown, water tower…): reject spots buried deep
    // inside a big sprite's rect — peeking out partially is fine, invisible is not findable
    let buried=false;
    for(const pr of LP_PROPS){
      if(pr.h<160) continue;   // small props can't fully cover a character
      if(x>pr.x-pr.w/2+34 && x<pr.x+pr.w/2-34 && y<pr.sy-24 && y>pr.sy-pr.h+34){ buried=true; break; }
    }
    if(buried) continue;
    npcs.push(makeNpc(kind,Math.round(x),Math.round(y))); return;
  }

function startSurvival(){

// arm the next Modo Infinito wave; between-rounds (not the first) every fallen player re-enters at
// FULL health next to a survivor (stripped at the 15s mark, so they come back with the basic gun),
// and mid-game joiners (pending) enter fresh at the map spawn point by the water tower
function startLpRound(first){

  survSpawnT=first?2.0:1.0;
  if(!first){
    const anchor=players.find(pp=>pp.alive);
    for(const p of players){ if(!p.alive && !p.departed){
      const joining=p.pending;
      if(joining){ p.x=LP_SPAWN.x+rand(-34,34); p.y=LP_SPAWN.y+rand(-26,26); }
      else if(anchor){ p.x=anchor.x+rand(-46,46); p.y=anchor.y+rand(-34,34); }
      p.pending=false; p.alive=true; p.fell=false; p.deathAnim=null; p.deadT=0; p.hp=p.maxhp;
      p.reviveProgress=0; p.shieldFlash=0; resolveCollision(p);

function updateSurvival(dt){
  survTime+=dt;
  if(vendFlash>0) vendFlash-=dt;
  updateCorpses(dt);   // fallen allies fade off the ground after ~30s
  updateNpcs(dt);      // AI ally helpers (tag-to-recruit)
  updateLpItems(dt);   // ground pickups (shoe = speed, hearts = health)
  // ground crates are now an OCCASIONAL bonus (the vending machine is the reliable source you save up
  // for) — they rain in far less often than before
  lpCrateT-=dt; if(lpCrateT<=0){ lpCrateT=rand(3,7); spawnWeaponCrate(); }   // frequent top-up; the pool cap does the real limiting
  for(const p of players){
    if(!p.alive && !p.pending){
      // rescue window: powers only strip once the 15s lapse — an in-time revive keeps everything
      if((p.deadT||0)>REVIVE_GRACE && !p._stripped){ stripPowers(p); p._stripped=true; }
    }
    else if(p.alive){ p._stripped=false; p.rioGrabbed=false; }   // Rio heals grabbable whenever you're hurt
    // the broke-at-a-machine insult alternates per VISIT: it flips when you walk away, so the next
    // approach greets you with the other line. Host-tracked + replicated (vendFlip) so every screen
    // shows the same one.
    const nv=vendNear(p);
    if(!nv && p._vAt){ p.vendFlip=1-(p.vendFlip||0); }
    p._vAt=nv||null;
  }
  lpSpeedPenalty(dt);   // Modo Infinito ONLY (called from updateSurvival): every 5 hits costs one white-running-shoe speed level
  for(const p of players){ if(p.dmgGateT>0) p.dmgGateT-=dt; }        // contact-damage gate windows tick down
  for(const n of npcs){ if(n.dmgGateT>0) n.dmgGateT-=dt; }

  if(lpBreakT>0){

    if(lpBreakT<=0){ breakTimer=0; round++; startLpRound(false); }

  }

// --- speed penalty (Modo Infinito only — this runs solely from updateSurvival) ---
// Every 5 hits a player takes strips one white-running-shoe speed level (p.tierra, capped 0..3 and
// filled ONLY by the shoe pickup on Las Palmas). At 0 shoes you're already at base speed, so there's
// nothing to lose — you never drop below the character's starting speed. Hits are counted host-
// authoritatively off the hitFlash rising edge. Horda/PVP never call this, so their speed is untouched.
function lpSpeedPenalty(dt){
  for(const p of players){
    if(!p.alive){ p._hf=0; p.hitStreak=0; continue; }
    // riding the Ticla: contact hits pound the BIKE (its own wear pool), not your legs — plowing
    // through a crowd was silently stripping shoe levels, which read as "the bike stole my speed"
    if(p.riding){ p._hf=p.hitFlash; continue; }
    const prev=p._hf||0;
    if(p.hitFlash>prev+0.02){                 // a fresh hit landed this frame
      p.hitStreak=(p.hitStreak||0)+1;
      if(p.hitStreak>=5){ p.hitStreak=0;
        if(p.tierra>0){ p.tierra--; floatText(p.x,p.y-30,'-VELOCIDAD','#ff9a7a'); spark(p.x,p.y,'#ff9a7a',8,110); }
        // no shoe levels left → already at base speed, nothing more to lose
      }

// --- straggler herding: an enemy that no player can see for >10s teleports next to the nearest
// player but OUTSIDE every player's screen, so the last-enemy hunt doesn't drag ---
function lpViewOf(p){ return { x:clamp(p.x-W/2,0,Math.max(0,WORLD_W-W)), y:clamp(p.y-H/2,0,Math.max(0,WORLD_H-H)) }; }
function lpOnAnyScreen(x,y,m){ m=m||0;
  for(const p of players){ if(p.departed) continue; const v=lpViewOf(p);
    if(x>v.x-m && x<v.x+W+m && y>v.y-m && y<v.y+H+m) return true; }
  return false;
}
function lpTeleportStraggler(e){
  let best=null,bd=1e18; for(const p of players){ if(p.departed) continue; const d=dist(p.x,p.y,e.x,e.y); if(d<bd){bd=d;best=p;} }
  if(!best) return;
  for(let rad=Math.round(H*0.62); rad<Math.max(WORLD_W,WORLD_H); rad+=70){
    for(let a=0;a<14;a++){

      const x=clamp(best.x+Math.cos(ang)*rad, 44, WORLD_W-44), y=clamp(best.y+Math.sin(ang)*rad, 44, WORLD_H-44);

      if(lpOnAnyScreen(x,y,90)) continue;   // must NOT be rendered on ANY player's screen

function lpStragglerHerd(dt, aliveN){
  if(spawnQueue>0 || aliveN<=0 || aliveN>3){ lpStragglerT=0; return; }   // only the LAST 1-3 of a fully-spawned wave
  const live=enemies.filter(e=>!e.dead);
  if(live.some(e=>lpOnAnyScreen(e.x,e.y,60))){ lpStragglerT=0; return; }  // a player can see one → they'll find it, reset
  lpStragglerT+=dt;
  if(lpStragglerT>10){ for(const e of live) lpTeleportStraggler(e); lpStragglerT=0; }
}

function updatePlay(dt){

  }

}
function updateBreak(dt){
  updatePlayers(dt);
  for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i]; if(e.dead){ e.deathT+=dt; if(e.deathT>5.7) enemies.splice(i,1); } }

function deathFrameIdx(t){ return t<0.5?0 : t<1.0?1 : t<1.6?2 : 3; }
function drawDeathScene(){
  const dp=dying&&dying.player; if(!dp){ drawArena(); return; }
  ctx.save();
  ctx.translate(dp.x,dp.y); ctx.scale(dying.zoom,dying.zoom); ctx.translate(-dp.x,-dp.y);
  drawArena();
  const m=DEATH_META[dp.kind]; const arr=DEATH_IMG[dp.kind]; const img=arr&&arr[deathFrameIdx(dying.t)];
  if(img && img.naturalWidth){
    const s=m.dh/m.h, dw=m.w*s, dh=m.h*s;
    const dx=dp.x - m.d1cx*s, dy=(dp.y+dp.radius+5) - m.d1by*s;
    ctx.drawImage(img,dx,dy,dw,dh);
  } else if(survival && DP_IMG[dp.kind] && DP_IMG[dp.kind].naturalWidth){
    drawDeathPose(dp.kind, dp.x, dp.y, dp.y+dp.radius+4, 0);   // Modo Infinito: zoom onto the lying pose
  } else {
    // characters without bespoke KO frames: same tipped-sprite fade the in-round deaths use
    const C=CHARS[dp.kind];
    if(C && C.loaded()){
      const t=clamp(dying.t/0.9,0,1), fr=charFrame(dp);
      const DH2=(C.natScale&&fr.img&&fr.img.naturalHeight)?C.dh*(fr.img.naturalHeight/C.cell.h):C.dh;
      const DW2=(C.natAspect&&fr.img&&fr.img.naturalWidth)?DH2*(fr.img.naturalWidth/fr.img.naturalHeight):C.cell.w*(DH2/C.cell.h);
      ctx.save(); ctx.translate(dp.x, dp.y+dp.radius-4); ctx.rotate((fr.flip?-1:1)*t*Math.PI/2);
      ctx.globalAlpha=1-0.55*t;
      if(fr.img && fr.img.naturalWidth) ctx.drawImage(fr.img,-DW2/2,-DH2,DW2,DH2);
      ctx.restore(); ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}
function updateDying(dt){
  if(!dying) return;
  dying.t+=dt; dying.timer-=dt;
  dying.zoom=Math.min(2.3, 1+dying.t*0.85);
  if(dying.timer<=0){ state=STATE.OVER; }
}
function drawDying(){ drawDeathScene(); ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(0,0,W,H); }
function gameOver(){
  if(survival) lpRecordRun();   // rounds-first record + local leaderboard entry
  camX = clamp((lastDead?lastDead.x:W/2) - W/2, 0, Math.max(0,WORLD_W-W));
  camY = clamp((lastDead?lastDead.y:H/2) - H/2, 0, Math.max(0,WORLD_H-H));
  if(lastDead && lastDead.fell){ dying=null; state=STATE.OVER; menuSel=0; playDeathMusic(); return; }
  dying={ player: lastDead || players.find(p=>!p.alive) || players[0], t:0, timer:6, zoom:1 };
  state=STATE.DYING; menuSel=0; playDeathMusic();
}

function sbFlagstone(g,x1,y1,x2,y2){
  g.fillStyle='#6f5a3e'; g.fillRect(x1,y1,x2-x1,y2-y1);
  const sw=66, sh=42;
  for(let row=0,y=y1; y<y2; y+=sh, row++){
    const off=(row%2)?sw*0.42:0;
    for(let x=x1-off; x<x2; x+=sw){

      const jx=(ahash(x,y)-0.5)*6, jy=(ahash(y,x)-0.5)*4;
      const bx=Math.max(x1,x+3+jx), by=Math.max(y1,y+3+jy);
      const bx2=Math.min(x2,x+sw-3+jx), by2=Math.min(y2,y+sh-3+jy);
      if(bx2<=bx||by2<=by) continue;
      g.fillStyle = v>0.66?'#c9a45b':(v>0.33?'#bd9851':'#b18c47');
      g.fillRect(bx,by,bx2-bx,by2-by);

function drawCliff(g,c){
  const cx=c.x+c.w/2, cy=c.y+c.h/2, rx=c.w/2, ry=c.h/2, N=22;
  const pt=(i,f)=>{ const a=i/N*TAU, n=(0.80+0.20*ahash(i*3+c.x,i*5+c.y))*f; return [cx+Math.cos(a)*rx*n, cy+Math.sin(a)*ry*n]; };
  const poly=(f)=>{ g.beginPath(); for(let i=0;i<N;i++){ const p=pt(i,f); i?g.lineTo(p[0],p[1]):g.moveTo(p[0],p[1]); } g.closePath(); };
  g.fillStyle='#46414d'; poly(1.07); g.fill();          // outer broken lip
  g.fillStyle='#332f39'; poly(1.0); g.fill();            // inner lip shade
  g.save(); poly(0.93); g.clip();
  const gr=g.createLinearGradient(0,cy-ry,0,cy+ry); gr.addColorStop(0,'#26252e'); gr.addColorStop(0.5,'#0e0d13'); gr.addColorStop(1,'#020203');
  g.fillStyle=gr; g.fillRect(cx-rx-12,cy-ry-12,rx*2+24,ry*2+24);
  g.fillStyle='rgba(0,0,0,0.55)'; g.beginPath(); g.ellipse(cx,cy+ry*0.4,rx*0.85,ry*0.5,0,0,TAU); g.fill();
  g.restore();
  g.strokeStyle='rgba(160,150,128,0.22)'; g.lineWidth=3; g.beginPath(); for(let i=0;i<=N/2;i++){ const p=pt(i,0.97); i?g.lineTo(p[0],p[1]):g.moveTo(p[0],p[1]); } g.stroke();
}
function temploFloor(g){

  const id=g.createImageData(WD,HD), d=id.data;
  for(let y=0;y<HD;y++){ for(let x=0;x<WD;x++){ const i=(y*WD+x)<<2;
    const n=ahash(x,y), m=ahash(x>>3,y>>3), big=ahash(x>>6,y>>6);
    let r,gg,b;
    if(big>0.62){ const t=0.5+0.5*m; r=88+t*22; gg=68+t*16; b=46+t*12; }
    else { const t=0.4+0.6*m; r=102+t*30; gg=98+t*28; b=94+t*28; }
    if(n>0.93){ r-=28; gg-=28; b-=28; } else if(n<0.06){ r+=16; gg+=16; b+=14; }
    d[i]=r; d[i+1]=gg; d[i+2]=b; d[i+3]=255; } }

function drawGrandDescent(g){
  // full-height staircase descending from the upper plateau (left, high) to the lower courtyard (right, low)
  const x0=MACHU_STX0, x1=MACHU_STX1, n=16, sw=(x1-x0)/n;
  for(let k=0;k<n;k++){
    const xa=x0+k*sw, topThis=machuTop(xa), topPrev=(k>0?machuTop(xa-sw):topThis);
    const t=k/n;
    const rr=Math.round(150-44*t), gg=Math.round(142-44*t), bb=Math.round(122-40*t);
    g.fillStyle='rgb('+rr+','+gg+','+bb+')';
    g.fillRect(xa, topThis, Math.ceil(sw)+1, WORLD_H-topThis);
    // lit tread along the top of this step
    g.fillStyle='rgba(255,250,228,0.20)'; g.fillRect(xa, topThis, Math.ceil(sw)+1, 5);
    // shadowed riser (vertical drop face from previous step down to this one)
    if(topThis>topPrev){ g.fillStyle='rgba(0,0,0,0.34)'; g.fillRect(xa, topPrev, 8, topThis-topPrev+3); }
    // crisp step edge
    g.strokeStyle='rgba(40,34,28,0.5)'; g.lineWidth=1.5; g.beginPath(); g.moveTo(xa, topThis); g.lineTo(xa, WORLD_H); g.stroke();
    // a few horizontal tread grooves for depth
    g.strokeStyle='rgba(255,255,255,0.06)'; for(let gy=topThis+22; gy<WORLD_H; gy+=46){ g.beginPath(); g.moveTo(xa,gy); g.lineTo(xa+sw,gy); g.stroke(); }
  }
  // soft shadow where the lower courtyard meets the foot of the stairs
  const sh=g.createLinearGradient(x1,0,x1+70,0); sh.addColorStop(0,'rgba(0,0,0,0.28)'); sh.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=sh; g.fillRect(x1,MACHU_LOWSKY,70,WORLD_H-MACHU_LOWSKY);
}

function buildArenaBG(g){
  if(currentMap==='machu'){ buildMachuBG(g); return; }
  if(currentMap==='templo'){ buildTemploBG(g); return; }
  if(currentMap==='stonebridge'){ buildStonebridgeBG(g); return; }
  // lush jungle grass
  const id=g.createImageData(W,H), d=id.data;
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)<<2;
      const p=ahash(x>>5,y>>5), h=ahash(x,y);
      let r,gg,b;
      if(h>0.975){ r=86;gg=140;b=46; } else if(p<0.5){ r=58;gg=120;b=44; } else { r=66;gg=132;b=50; }
      d[i]=r; d[i+1]=gg; d[i+2]=b; d[i+3]=255;
    }
  }
  g.putImageData(id,0,0);
  // ferns, leaf litter, sprouts
  for(let y=16;y<H-16;y+=9) for(let x=16;x<W-16;x+=9){
    const r=ahash(x*7+5,y*7+2);
    if(r<0.055){ g.fillStyle='#357025'; g.fillRect(x,y-2,1,6); g.fillRect(x-2,y,1,4); g.fillRect(x+2,y,1,4); g.fillRect(x-3,y+2,1,3); g.fillRect(x+3,y+2,1,3); g.fillStyle='#2a5a1c'; g.fillRect(x,y+4,1,2); }
    else if(r<0.085){ g.fillStyle=['#7a5a2a','#8a6a30','#6a4a24'][((r*1000)|0)%3]; g.fillRect(x,y,3,2); g.fillRect(x+1,y+2,2,1); }
    else if(r>0.965){ g.fillStyle='#6fae45'; g.fillRect(x,y,2,2); }
  }
  // obstacles
  for(const o of obstacles){
    if(o.t==='rock') drawTorchBase(g,o);
    else if(o.t==='pillar') drawHut(g,o);
    else drawLogWall(g,o);
  }
}

function drawPlayer(p){
  if(p.pending) return;   // online: joined mid-round, not in play yet — draw nothing until they enter next round
  if(survival && p.alive && p.riding){ drawRider(p); return; }   // on the Ticla: the bike sprite IS the player
  if(!p.alive){
    if(p.fell){
      if(p.fallT>0){ const k=clamp(p.fallT/0.5,0,1), C=CHARS[p.kind]; if(C.loaded()){ const fr=charFrame(p), CELL=C.cell, DH=C.dh*k, scale=DH/CELL.h, DW=CELL.w*scale, top=p.y-DH+p.radius+(1-k)*30, dx=p.x-DW/2; ctx.save(); ctx.globalAlpha=k; if(fr.flip){ctx.translate(p.x,0);ctx.scale(-1,1);ctx.translate(-p.x,0);} ctx.drawImage(fr.img,dx,top,DW,DH); ctx.restore(); } }
      return;

    // fade — the body stays until a teammate revives them; only NPC ally corpses fade after ~30s).
    // The revive ring still draws on top. The clock is clamped clear of drawDeathPose's fade window.
    if(survival && DP_IMG[p.kind] && DP_IMG[p.kind].naturalWidth){
      drawDeathPose(p.kind, p.x, p.y, p.y+p.radius+4, Math.min(p.deadT||0, CORPSE_LIFE-CORPSE_FADE));
      if((p.reviveProgress||0)>0){
        const fr2=clamp(p.reviveProgress/reviveNeed(),0,1);
        ctx.strokeStyle='#aef7c2'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(p.x,p.y-3,19,-Math.PI/2,-Math.PI/2+fr2*TAU); ctx.stroke();
      }
      return;
    }
    if(p.deathAnim!=null){
      const m=DEATH_META[p.kind], arr=DEATH_IMG[p.kind], img=arr&&arr[deathFrameIdx(p.deathAnim)];
      if(img && img.naturalWidth){ const sc=m.dh/m.h, dw=m.w*sc, dh=m.h*sc; const dx=p.x-m.d1cx*sc, dy=(p.y+p.radius+5)-m.d1by*sc; ctx.drawImage(img,dx,dy,dw,dh); }
      else{
        // PVP-only kinds (Teddington / Cóndor) have no bespoke KO frames: tip the standing sprite
        // over and hold the fallen pose at FULL opacity, like the drawn death frames do
        const C=CHARS[p.kind];
        if(C && C.loaded()){
          const t=clamp(p.deathAnim/0.9,0,1), fr=charFrame(p);
          const DH=(C.natScale&&fr.img&&fr.img.naturalHeight)?C.dh*(fr.img.naturalHeight/C.cell.h):C.dh;
          const DW=(C.natAspect&&fr.img&&fr.img.naturalWidth)?DH*(fr.img.naturalWidth/fr.img.naturalHeight):C.cell.w*(DH/C.cell.h);
          ctx.save(); ctx.translate(p.x, p.y+p.radius-4); ctx.rotate((fr.flip?-1:1)*t*Math.PI/2);
          if(fr.img && fr.img.naturalWidth) ctx.drawImage(fr.img,-DW/2,-DH,DW,DH);
          ctx.restore();
        }
      }
      return;
    }
    // death cross — co-op respawn point for next round
    ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(p.x,p.y+12,12,4,0,0,TAU); ctx.fill();
    ctx.lineCap='round';
    ctx.strokeStyle='#5a3c22'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(p.x,p.y-18); ctx.lineTo(p.x,p.y+12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x-11,p.y-7); ctx.lineTo(p.x+11,p.y-7); ctx.stroke();
    ctx.strokeStyle='#8a6a44'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(p.x,p.y-18); ctx.lineTo(p.x,p.y+12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x-11,p.y-7); ctx.lineTo(p.x+11,p.y-7); ctx.stroke();
    ctx.lineCap='butt';
    if((p.reviveProgress||0)>0){
      const fr=clamp(p.reviveProgress/reviveNeed(),0,1);
      ctx.strokeStyle='#aef7c2'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x,p.y-3,19,-Math.PI/2,-Math.PI/2+fr*TAU); ctx.stroke();
    }
    return;
  }
  const r=p.radius;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(p.x,p.y+r-2,r,r*0.4,0,0,TAU); ctx.fill();

  const C=CHARS[p.kind];
  const useSprite = C.loaded();
  const blink = p.hitFlash>0 && Math.floor(p.hitFlash*16)%2===0;   // quick blink ~1s when hit
  const flash = false;
  if(useSprite){
    const fr = charFrame(p);
    const CELL = C.cell;
    const DH = (C.natScale && fr.img && fr.img.naturalHeight) ? C.dh*(fr.img.naturalHeight/CELL.h) : C.dh;
    const scale=DH/CELL.h;
    const DW = (C.natAspect && fr.img && fr.img.naturalWidth) ? DH*(fr.img.naturalWidth/fr.img.naturalHeight) : CELL.w*scale;
    // floats (Cóndor): airborne — hover above the ground shadow with a gentle flight bob
    const hov = C.floats ? 11+Math.sin(time*3.4)*3.5 : 0;
    const dx=p.x-DW/2, dy=p.y+r-DH+5-hov;
    ctx.save();
    if(blink) ctx.globalAlpha=0.28;
    if(fr.flip){ ctx.translate(p.x,0); ctx.scale(-1,1); ctx.translate(-p.x,0); }
    ctx.drawImage(fr.img,dx,dy,DW,DH);
    ctx.globalAlpha=1;
    if(flash){
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.7;
      ctx.drawImage(fr.img,dx,dy,DW,DH);
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    }
    ctx.restore();

    // procedural body (Michi / fallback before sprites load)

    ctx.fillRect(p.x-r, p.y-r, r*2, r*2);
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(p.x-r, p.y+r*0.4, r*2, r*0.6);
    ctx.fillStyle = p.kind==='freddy'?'#e8d8b0':'#f0c8a0';
    ctx.fillRect(p.x-r*0.6, p.y-r*0.7, r*1.2, r*0.7);
    ctx.fillStyle='#222';
    ctx.fillRect(p.x-r*0.45+ p.facing.x*2, p.y-r*0.45+p.facing.y*2, 3,3);
    ctx.fillRect(p.x+r*0.15+ p.facing.x*2, p.y-r*0.45+p.facing.y*2, 3,3);
  }
  // punch fist (procedural — only when not using Freddy's sprite punch)
  if(p.punchAnim>0 && !useSprite){
    const reach=r+ (p.kind==='freddy'?22:18);
    const fx=p.x+p.facing.x*reach, fy=p.y+p.facing.y*reach;
    ctx.fillStyle='#f4d8b0';
    ctx.beginPath(); ctx.arc(fx,fy,6,0,TAU); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(fx,fy); ctx.stroke();
  }
  // shield ring (Cuarzo)
  if(p.shields>0){
    const rr=r+8+Math.sin(time*6)*2;
    ctx.strokeStyle = p.shieldFlash>0 ? '#ffffff' : '#7fd4ff';
    ctx.globalAlpha=0.85; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.x,p.y-r*0.4,rr,0,TAU); ctx.stroke();
    ctx.globalAlpha=1;
    for(let s=0;s<p.shields;s++){ const ang=-Math.PI/2 + (s-(p.shields-1)/2)*0.5;
      ctx.fillStyle='#cdeeff'; ctx.beginPath(); ctx.arc(p.x+Math.cos(ang)*rr, p.y-r*0.4+Math.sin(ang)*rr, 2.6,0,TAU); ctx.fill(); }
  }
  // equipped special aura
  if(p.special!=='none'){
    ctx.strokeStyle = p.special==='morganita' ? '#ff7ab0' : '#5aa0ff';
    ctx.globalAlpha=0.45+0.3*Math.sin(time*8); ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.x,p.y-r*0.4,r+3,0,TAU); ctx.stroke();
    ctx.globalAlpha=1;
  }
  // (character name tags intentionally omitted)
}

      if(tio && tio.state!=='dead'){   // the hired gun gets the same slim strip bar
        const bw2=110, bx2=W-16-bw2;
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx2-8,ay-14,bw2+16,34);
        ctx.textAlign='right'; ctx.fillStyle='#ffe14a'; ctx.font='bold 10px Courier New';

    }
  } else if(state===STATE.PLAY){
    const cnt='Enemigos: '+(enemies.filter(en=>!en.dead).length+spawnQueue);
    if(players.length>=3){
      // 3-4 players (online): the health bars fill the whole top strip and boss bars fill the
      // centre just below it, so a centered round label gets covered. Tuck it into a badge in the
      // top-right corner (below PUNTOS) where nothing else draws.
      const label='RONDA '+round;

      const bw=Math.max(ctx.measureText(label).width, ctx.measureText(cnt).width)+24, by=56, bx=W-8-bw;
      ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(bx,by,bw,40);

      ctx.textAlign='right';
      ctx.fillStyle='#ffe9b0'; ctx.font='bold 16px Courier New'; ctx.fillText(label, W-20, by+18);
      ctx.fillStyle='#ffd0d0'; ctx.font='11px Courier New'; ctx.fillText(cnt, W-20, by+33);
      ctx.textAlign='center';
    } else {
      ctx.fillText('RONDA '+round, W/2, 22);
      ctx.fillStyle='#ffd0d0'; ctx.font='11px Courier New'; ctx.fillText(cnt, W/2, 40);
    }
  }
  // PUNTOS is Horda's run score — Modo Infinito's score IS the kill count, so no second number there

    ctx.textAlign='left';
  } else ctx.textAlign='left';
  let px=14;
  // 5-player online sessions won't fit five 200px bars across the top — shrink the bar + stride so
  // every player's health/ammo strip stays on-screen (≤4 players keep the roomy original layout).
  // Departed (disconnected) players have left the game — no bar, no model, nothing.
  const _act=players.filter(p=>!p.departed);
  const _np=_act.length, _bw=_np>=5?160:200, _stride=_np>=5?176:240;
  for(const p of _act){
    const w=_bw;
    ctx.fillStyle=p.color; ctx.font='bold 12px Courier New';
    ctx.fillText(p.name, px, 14);
    if(p.pending){
      // Joined mid-round \u2014 waiting for the next round to enter.
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(px,19,w,12);
      ctx.strokeStyle='#ffe14a'; ctx.lineWidth=1; ctx.strokeRect(px,19,w,12);

      ctx.fillText('ENTRA EN LA PR\u00d3XIMA RONDA', px+w/2, 29); ctx.textAlign='left';
      px += _stride; continue;
    }
    drawBar(px, 19, w, 12, p.alive?p.hp/p.maxhp:0, '#ff5a4a');
    ctx.fillStyle='#fff'; ctx.font='10px Courier New';
    const _hpTxt=Math.ceil(p.hp)+'/'+p.maxhp;
    ctx.fillText(_hpTxt, px+4, 29);
    if(survival){
      // ZAPATILLA stacks (speed levels 0-3): 3 pip slots right after the HP numbers, filled =
      // levels held — same colour as the pause-menu shoe, so losing one to the hit penalty is visible
      const _sx=px+8+ctx.measureText(_hpTxt).width;
      for(let d=0;d<3;d++){

        ctx.fillRect(_sx+d*9, 22, 6, 6);

    if(!survival){ // boss-drop gadget status (Horda only) — count + key hint, blinking DETONAR while armed
      const pi=players.indexOf(p), gkey=(pi===0?'F':'.');
      const armed=bombs.some(b=>b.owner===pi);
      if(p.gear && p.gear!=='none' && GEAR_DEF[p.gear]){
        const G=GEAR_DEF[p.gear];
        ctx.fillStyle=G.color; ctx.font='bold 10px Courier New'; ctx.textAlign='right';
        ctx.fillText(G.label+' x'+p.gearCount+' ['+gkey+']', px+w, 40); ctx.textAlign='left';
      }
      if(armed && Math.floor(time*4)%2===0){
        ctx.fillStyle='#ff6a4a'; ctx.font='bold 10px Courier New';
        ctx.fillText('¡DETONAR ['+gkey+']!', px+4, 40);
      }
    }
    ctx.font='bold 11px Courier New'; ctx.textAlign='right';
    if(survival){ ctx.fillStyle='#ffe07a'; ctx.fillText('S/. '+(p.soles||0), px+w, 14); }   // Modo Infinito wallet (soles)
    else if(p.special==='oro'){ if(Math.floor(time*3)%2===0){ ctx.fillStyle='#ff9a2a'; ctx.fillText('ORO '+ORO_MAX+'/'+ORO_MAX+' \u00a1FULL!', px+w, 14); } } else { ctx.fillStyle='#ffd21a'; ctx.fillText('ORO '+p.oro+'/'+ORO_MAX, px+w, 14); }
    ctx.textAlign='left';
    if(survival) drawPlayerWeapons(p, px, 35, w);
    else drawApuStatus(p, px, 48);
    px += _stride;
  }
}

function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawImageCover(img){

  let dw,dh; if(ir>cr){ dh=H; dw=H*ir; } else { dw=W; dh=W/ir; }
  ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
}

function wrapLeft(text,x,y,maxw,lh){
  const words=text.split(' '); let line='', yy=y;

  if(line) ctx.fillText(line,x,yy);
  return yy;
}

let mapThumbLp=null, _lpThumbHasImg=false;
function renderLpThumb(){
  const oc=document.createElement('canvas'); oc.width=W; oc.height=H; const g=oc.getContext('2d');
  const img=LP_TERRAIN_IMG;
  if(img && img.naturalWidth){
    const cw=Math.min(img.naturalWidth, Math.round(img.naturalHeight*(W/H))||img.naturalWidth);
    const ch=Math.round(cw*H/W);
    const cx=clamp(Math.round(LP_SPAWN.x-cw/2),0,img.naturalWidth-cw);
    const cy=clamp(Math.round(LP_SPAWN.y-ch/2),0,img.naturalHeight-ch);

    _lpThumbHasImg=true;
  } else { g.fillStyle='#4f8a3a'; g.fillRect(0,0,W,H); _lpThumbHasImg=false; }
  g.save();
  g.globalCompositeOperation='multiply'; g.fillStyle='rgba(255,105,85,0.34)'; g.fillRect(0,0,W,H);
  g.globalCompositeOperation='source-over'; g.fillStyle='rgba(150,25,15,0.14)'; g.fillRect(0,0,W,H);

function drawIconFit(img, cx, cy, box){
  if(!img||!img.naturalWidth) return;
  const iw=img.naturalWidth, ih=img.naturalHeight; let w,h;
  if(iw>=ih){ w=box; h=box*ih/iw; } else { h=box; w=box*iw/ih; }
  ctx.drawImage(img, cx-w/2, cy-h/2, w, h);
}
function drawArrowIcon(cx,cy,s){
  ctx.save(); ctx.translate(cx,cy); ctx.fillStyle='#ffffff';
  ctx.fillRect(-s*0.55,-s*0.17, s*0.72, s*0.34);
  ctx.beginPath(); ctx.moveTo(s*0.08,-s*0.52); ctx.lineTo(s*0.62,0); ctx.lineTo(s*0.08,s*0.52); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function handleMenuKey(code){
  if(state===STATE.MAINMENU){
    if(mainMenuT<4){ mainMenuT=99; return; }
    if(mainView==='settings'){
      if(code==='Escape'||code==='Enter'||code==='Space'){ mainView='main'; }
      else if(code==='ArrowUp'||code==='KeyW') setSel=(setSel+1)%2;
      else if(code==='ArrowDown'||code==='KeyS') setSel=(setSel+1)%2;
      else if(code==='ArrowLeft'||code==='KeyA') adjustVol(setSel,-0.1);
      else if(code==='ArrowRight'||code==='KeyD') adjustVol(setSel,0.1);
      return;
    }
    if(code==='ArrowUp'||code==='KeyW') mainSel=(mainSel+3)%4;
    if(code==='ArrowDown'||code==='KeyS') mainSel=(mainSel+1)%4;
    if(code==='Enter'||code==='Space'){ if(mainSel===0){ NET.hosting=false; state=STATE.MODOS; modeSel=0; } else if(mainSel===1){ NET.hosting=true; state=STATE.MODOS; modeSel=0; } else if(mainSel===2){ state=STATE.HELP; } else { mainView='settings'; setSel=0; } }
  } else if(state===STATE.MODOS){
    if(code==='Escape'){ state=STATE.MAINMENU; mainSel=0; return; }
    // three modes: 0 HORDA · 1 MODO INFINITO · 2 PVP
    if(code==='ArrowLeft'||code==='KeyA') modeSel=(modeSel+2)%3;
    else if(code==='ArrowRight'||code==='KeyD'||code==='ArrowUp'||code==='KeyW'||code==='ArrowDown'||code==='KeyS') modeSel=(modeSel+1)%3;
    if(code==='Enter'||code==='Space'){
      if(modeSel===0){ lobbyMode='horda'; state=STATE.MAPAS; mapSel=0; }
      else if(modeSel===1){ // MODO INFINITO — survival on Las Palmas (co-op / online / solo, like Horda)
        lobbyMode='horda'; currentMap='laspalmas'; WORLD_W=W; camX=0;
        if(NET.hosting){ enterLobby(); }
        else {
          // Cinematic intro first (map music stays OFF under it), THEN pick your character.
          stopMenuMusic(); lpMusicStop();
          playLasPalmasIntro(()=>{ state=STATE.MENU; menuSel=0; resumeCumbia(); });
        }
      }
      else if(NET.hosting){ lobbyMode='pvp'; currentMap='pvp'; enterLobby(); }
      else { enterPvpSelect(); }
    }
  } else if(state===STATE.NETSELECT){
    // 1st Esc un-picks your character (choose again); 2nd Esc backs out to the SALA
    if(code==='Escape'){ if(!chooserDeselect(players[0])) enterLobby(); }
  } else if(state===STATE.MAPAS){
    if(code==='Escape'){ state=STATE.MODOS; modeSel=0; return; }
    if(code==='ArrowLeft'||code==='KeyA') mapSel=(mapSel+3)%4;
    if(code==='ArrowRight'||code==='KeyD') mapSel=(mapSel+1)%4;
    if(code==='Enter'||code==='Space'){ if(isMapUnlocked(mapSel)){ currentMap=(mapSel===1)?'stonebridge':(mapSel===2)?'templo':(mapSel===3)?'machu':'amazonas'; WORLD_W=W; camX=0; if(NET.hosting){ enterLobby(); } else { stopMenuMusic(); state=STATE.MENU; menuSel=0; resumeCumbia(); } } else { mapLockShake=0.45; } }
  } else if(state===STATE.HELP){
    if(code==='Escape'||code==='Enter'||code==='Space'){ state=STATE.MAINMENU; mainSel=0; }
  } else if(state===STATE.MENU){
    if(code==='Escape'){ if(currentMap==='laspalmas'){ state=STATE.MODOS; modeSel=1; } else { state=STATE.MAPAS; mapSel=0; } playMenuMusic(); return; }
    if(code==='ArrowUp'||code==='KeyW') menuSel=(menuSel+1)%2;
    if(code==='ArrowDown'||code==='KeyS') menuSel=(menuSel+1)%2;
    if(code==='Enter'||code==='Space'){ modTest=false; mode=(menuSel===1)?2:1; selMode=mode; enterSelect(); }
  } else if(state===STATE.LOBBY){
    if(code==='Enter'||code==='Space'){
      if(lobbyMode==='pvp'){ if(NET.conns.length) startPvpOnline(); else mapLockShake=0.45; }   // a duel needs at least 2 players
      else if(currentMap==='laspalmas'){
        // Modo Infinito online: the cinematic intro rolls for the whole room FIRST (the host frame
        // loop cues guests via netBroadcastIntro while introPlaying), THEN everyone lands on the
        // pick screen with the Las Palmas playlist underneath.
        stopMenuMusic(); netIntroAccum=0;
        playLasPalmasIntro(()=>{ enterNetSelect(); lpMusicStart(); });
      }
      else enterNetSelect();   // horda: everyone picks a character first (first come, first served)
    }
    else if(code==='Escape') exitLobby();
  } else if(state===STATE.PVP){ handlePvpKey(code);
  } else if(state===STATE.SELECT){ handleSelectKey(code);
  } else if(state===STATE.PAUSE){
    if(pauseView==='settings'){
      if(code==='ArrowUp'||code==='ArrowDown'||code==='KeyW'||code==='KeyS') setSel=(setSel+1)%2;
      else if(code==='ArrowLeft'||code==='KeyA') adjustVol(setSel,-0.1);
      else if(code==='ArrowRight'||code==='KeyD') adjustVol(setSel,0.1);
      else if(code==='Enter') pauseView='main';
      return;
    }
    if(code==='ArrowUp'||code==='KeyW') pauseSel=(pauseSel+2)%3;
    if(code==='ArrowDown'||code==='KeyS') pauseSel=(pauseSel+1)%3;
    if(code==='Enter'||code==='Space'){ if(pauseSel===0) togglePause(); else if(pauseSel===1){ pauseView='settings'; setSel=0; } else gotoMainMenu(); }
  } else if(state===STATE.VICTORY){
    if(code==='Enter'||code==='Space'){ gotoMainMenu(); }
  } else if(state===STATE.OVER){
    if(code==='ArrowUp'||code==='ArrowDown'||code==='KeyW'||code==='KeyS') menuSel=(menuSel+1)%2;
    if(code==='Enter'||code==='Space'){
      if(menuSel===0){ startGame(); } else { gotoMainMenu(); }
    }
  }
}

function updateCondor(dt){

// card art for a character: the drawn portrait when one exists, else a chest-up crop of a
// sprite frame (Teddington/Cóndor have no dedicated portrait yet). Returns {img,sx,sy,sw,sh}.
function selCard(k){
  const img=SEL_IMG[k];
  if(img && img.naturalWidth) return {img, sx:0, sy:0, sw:img.naturalWidth, sh:img.naturalHeight};
  const C=CHARS[k], S=C&&C.S;
  if(!S) return null;
  const im=(C.sIdle&&S[C.sIdle])||S.c1||S.sw2;
  if(!(im && im.naturalWidth)) return null;
  const c=C.selCrop||{sx:0,sy:0,sw:im.naturalWidth,sh:im.naturalHeight};
  return {img:im, sx:c.sx, sy:c.sy, sw:c.sw, sh:c.sh};
}
// cover-fit a selCard so it FILLS the whole card art area (crop overflow) — contain-fitting a
// chest-up portrait into these tall cards left a big dead gap above the name. Centered horizontally,
// top-anchored so the head is always kept and any crop happens at the bottom of the frame.
function drawCardArt(k, bx, by, bw, bh){
  const a=selCard(k); if(!a) return;
  const s=Math.max(bw/a.sw, bh/a.sh), dw=a.sw*s, dh=a.sh*s;
  ctx.save(); ctx.beginPath(); ctx.rect(bx,by,bw,bh); ctx.clip();
  ctx.drawImage(a.img, a.sx, a.sy, a.sw, a.sh, bx+(bw-dw)/2, by, dw, dh);
  ctx.restore();
}

// ================= VERSUS — grid bomb-duel PVP mode =================
// Free pixel movement, but everything else is grid-exact: bombs snap to tiles, blasts are
// per-tile flames in the 4 cardinal directions (stopped cold by unbreakable stone; the first
// breakable crate absorbs the flame unless the bomb pierces), and Apuchis are the POWER-UPS
// that drop from destroyed crates — the placed explosive is a plain bomb.
const PVP_TILE=52, PVP_COLS=15, PVP_ROWS=11;
const PVP_OX=Math.round((W-PVP_COLS*PVP_TILE)/2), PVP_OY=116;
const PVP_FUSE=2.8;          // seconds from placement to boom (Safiro bombs never auto-blow)
const PVP_FLAME=0.55;        // how long each flame tile is drawn (fire, then harmless smoke)
const PVP_FLAME_KILL=0.30;   // only the first part of the flame kills — the fading smoke does NOT
const PVP_KICK_SPD=360;      // px/s of a kicked bomb
const PVP_SUDDEN=90;         // seconds until the landslide starts closing the arena
const PVP_WINS=3;            // first to N rounds takes the duel
const PVP_BASE_SPD=172, PVP_SPD_CAP=2.0, PVP_SPD_STEP=1.12, PVP_RANGE_CAP=13;
const PVP_DROP_CHANCE=0.32;  // chance a destroyed crate reveals an Apuchi
const PVP_ITEM_W=[['piedra',30],['tierra',24],['cuarzo',24],['rio',12],['morganita',7],['safiro',3]];
const PVP_ITEM_FX={piedra:'+1 EXPLOSIÓN', tierra:'+VELOCIDAD', cuarzo:'+1 BOMBA', rio:'¡PATADA!', morganita:'¡ATRAVIESA!', safiro:'¡DETONADOR!'};
const PVP_APU_LIST=['piedra','tierra','cuarzo','rio','morganita','safiro'];
// grid values: 0 floor · 1 stone pillar (unbreakable) · 2 crate (breakable) · 3 fallen slab (sudden death)

  banner:'', bannerC:'#fff', sudden:0, suddenOn:false, spiral:[], spiralI:0, dropT:0, paused:false, pauseSel:0, pauseView:'main', winner:-1, warnCell:null, bgc:null };

                         // Each player toggles their own with Esc; while open, their character stands still

function pvpC2X(c){ return PVP_OX+c*PVP_TILE+PVP_TILE/2; }
function pvpR2Y(r){ return PVP_OY+r*PVP_TILE+PVP_TILE/2; }
function pvpTileRect(c,r){ return {x:PVP_OX+c*PVP_TILE, y:PVP_OY+r*PVP_TILE, w:PVP_TILE, h:PVP_TILE}; }
function pvpCellOf(x,y){ return {c:Math.floor((x-PVP_OX)/PVP_TILE), r:Math.floor((y-PVP_OY)/PVP_TILE)}; }
function pvpBombAt(c,r){ for(const b of pvp.bombs){ if(b.c===c&&b.r===r) return b; } return null; }
function pvpItemAt(c,r){ for(const it of pvp.items){ if(it.c===c&&it.r===r) return it; } return null; }
function pvpN(i){ const x=Math.sin(i*127.13+7.7)*43758.545; return x-Math.floor(x); }   // deterministic per-tile noise for the prerendered island
// solid for player movement; a bomb stays walkable for whoever is still standing on it (its walkers)
function pvpSolid(c,r,forP){
  if(c<0||r<0||c>=PVP_COLS||r>=PVP_ROWS) return true;
  if(pvp.grid[r][c]!==0) return true;
  const b=pvpBombAt(c,r); if(b && !(forP && b.walkers.has(forP))) return true;
  return false;
}

function startPvpRound(){
  const g=[];
  for(let r=0;r<PVP_ROWS;r++){ const row=[]; for(let c=0;c<PVP_COLS;c++){

  // cleared cross-pocket (2 tiles per open direction) so round 1 isn't a guaranteed self-kill
  const spots=pvpPickSpawns(Math.max(2,players.length));
  for(const s of spots){
    g[s[1]][s[0]]=0;
    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      for(let k=1;k<=2;k++){
        const cc=s[0]+d[0]*k, rr=s[1]+d[1]*k;
        if(cc<0||rr<0||cc>=PVP_COLS||rr>=PVP_ROWS) break;
        if(g[rr][cc]===1) break;          // pillar: this direction is a dead end, leave the rest
        if(g[rr][cc]===2) g[rr][cc]=0;
      }
    }
  }
  pvp.grid=g; pvp.bombs.length=0; pvp.flames.length=0; pvp.items.length=0;
  pvp.sudden=0; pvp.suddenOn=false; pvp.dropT=0; pvp.spiral=pvpBuildSpiral(); pvp.spiralI=0; pvp.winner=-1; pvp.warnCell=null;

    p.alive=!p.departed && !!p.selKind; p.fell=false; p.deathAnim=null; p.hp=p.alive?p.maxhp:0; p.pending=!p.departed && !p.selKind;

// pick n non-pillar tiles as far apart as possible: try a large min-distance first,
// relax it until a placement fits (corners as the never-fails fallback)
function pvpPickSpawns(n){
  const cand=[];
  for(let r=0;r<PVP_ROWS;r++)for(let c=0;c<PVP_COLS;c++){ if(!(c%2===1&&r%2===1)) cand.push([c,r]); }
  for(let D=7;D>=3;D-=0.5){
    for(let attempt=0;attempt<30;attempt++){
      const pool=cand.slice();
      for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
      const picks=[];
      for(const t of pool){
        let ok=true;
        for(const q of picks){ if(Math.hypot(t[0]-q[0],t[1]-q[1])<D){ ok=false; break; } }
        if(ok){ picks.push(t); if(picks.length===n) break; }
      }
      if(picks.length===n) return picks;
    }
  }
  return [[0,0],[PVP_COLS-1,PVP_ROWS-1],[PVP_COLS-1,0],[0,PVP_ROWS-1]].slice(0,n);
}
function pvpBuildSpiral(){
  const order=[]; let t=0,b=PVP_ROWS-1,l=0,r=PVP_COLS-1;
  while(t<=b && l<=r){
    for(let c=l;c<=r;c++) order.push([c,t]);
    for(let rr=t+1;rr<=b;rr++) order.push([r,rr]);
    if(b>t) for(let c=r-1;c>=l;c--) order.push([c,b]);
    if(r>l) for(let rr=b-1;rr>t;rr--) order.push([l,rr]);
    t++;b--;l++;r--;
  }
  return order;
}

function updatePvp(dt){
  if(pvp.paused) return;
  pvp.t+=dt;
  for(const p of players){
    if(!p.alive && p.deathAnim!=null && p.deathAnim<4.5) p.deathAnim=Math.min(4.5,p.deathAnim+dt);   // hold the final death pose (no co-op cross)
    if(p.punchAnim>0) p.punchAnim-=dt;
    if(p.hitFlash>0) p.hitFlash-=dt;
  }
  if(pvpOnline) updateChoosers(dt, PVP_CHAR_LIST);   // anyone without a character yet (pre-duel phase or mid-duel joiner) is picking
  if(pvp.sub==='chars'){
    const active=players.filter(pl=>!pl.departed);
    if(active.length && active.every(pl=>pl.selKind)){ pvp.selT+=dt; if(pvp.selT>1.1) startPvpRound(); }
    else pvp.selT=0;
    return;
  }
  if(pvp.sub==='count'){
    pvp.count-=dt;
    if(pvp.count<=0){ pvp.sub='play'; }   // silent start — WOW is Michi's voice, not a referee whistle
    return;
  }
  if(pvp.sub==='matchend') return;
  if(pvp.sub==='play'){ for(const p of players) pvpControl(p,dt); }
  else if(pvp.winner>=0 && players[pvp.winner].alive){ pvpControl(players[pvp.winner],dt); }   // the winner can strut during the banner
  pvpUpdateBombs(dt);
  for(let i=pvp.flames.length-1;i>=0;i--){ const f=pvp.flames[i]; f.t+=dt; if(f.t>=PVP_FLAME) pvp.flames.splice(i,1); }
  pvpUpdateItems(dt);
  if(pvp.sub==='play'){
    pvpSuddenDeath(dt);
    pvpCheckDeaths();
    const alive=players.filter(p=>p.alive);
    if(alive.length<=1){
      pvp.sub='roundend'; pvp.t=0;
      pvp.winner=alive.length?players.indexOf(alive[0]):-1;
      if(pvp.winner>=0){
        const wp=players[pvp.winner];
        pvp.wins[pvp.winner]++; pvp.banner='¡'+wp.name+' GANA LA RONDA!'; pvp.bannerC=wp.color;
        // no celebration here — a round KO plays only the loser's death cry; the winner's
        // intro voice is saved for taking the whole match (see the matchend transition)
      }
      else { pvp.banner='¡EMPATE!'; pvp.bannerC='#ffe9b0'; }
    }
  } else if(pvp.sub==='roundend' && pvp.t>2.8){
    if(pvp.winner>=0 && pvp.wins[pvp.winner]>=PVP_WINS){
      pvp.sub='matchend';
      const wp=players[pvp.winner];
      if(wp){ playCharSelect(wp.kind); netQSnd('sel', wp.kind); }   // match champion celebrates in their own voice
    }
    else { pvp.roundN++; startPvpRound(); }
  }
}

// ---- online character pick (host-authoritative; guests see it replicated and send normal input) ----
function pvpConfirmPick(pl,k){
  pl.selKind=k; reassignKind(pl,k);
  pl.wasPunch=true; pl.wasGear=true;   // the confirming key must not drop a bomb once they spawn
  playCharSelect(k); netQSnd('sel',k);
}
// Esc on the pick screen backs a player out of their locked-in character so they can choose again.
// Reset selWas so the same key press that triggered the Esc/confirm can't instantly re-pick.
function chooserDeselect(pl){
  if(!pl || !pl.selKind) return false;
  pl.selKind=null;
  pl.selWas={l:true,r:true,p:true,u:true,d:true};
  return true;
}
function updateChoosers(dt, roster){   // shared by the PVP 'chars' phase and the Horda NETSELECT screen
  const N=roster.length;
  for(const pl of players){
    if(pl.departed || pl.selKind) continue;
    const taken=new Set(players.filter(q=>q!==pl && !q.departed && q.selKind).map(q=>q.kind));
    const free=roster.filter(k=>!taken.has(k));
    if(free.length===1){ pvpConfirmPick(pl,free[0]); continue; }   // one character left → it's theirs (real in Horda: 4 players, 4 characters)
    // host player reads the real keyboard (either key set); guests' packets arrive as Arrow*/Comma
    const ks=pl.keysrc||keys, PR=charsPerRow(N);
    const L=!!(ks['ArrowLeft']||ks['KeyA']), R=!!(ks['ArrowRight']||ks['KeyD']), P=!!(ks['Space']||ks['Comma']||ks['Enter']);
    const U=!!(ks['ArrowUp']||ks['KeyW']), D=!!(ks['ArrowDown']||ks['KeyS']);
    const w=pl.selWas||(pl.selWas={l:true,r:true,p:true,u:true,d:true});
    if(L&&!w.l) pl.selCur=(pl.selCur+N-1)%N;
    if(R&&!w.r) pl.selCur=(pl.selCur+1)%N;
    if(U&&!w.u) pl.selCur=(pl.selCur+N-PR)%N;
    if(D&&!w.d) pl.selCur=(pl.selCur+PR)%N;
    if(P&&!w.p){ const k=roster[pl.selCur%N]; if(!taken.has(k)) pvpConfirmPick(pl,k); }
    w.l=L; w.r=R; w.p=P; w.u=U; w.d=D;
  }
}
function pvpControl(p,dt){
  if(!p.alive || p.departed) return;
  // local info-overlay open (online): the keyboard is driving the menu, not the duel — the host's own
  // character stands still, but remote guests (keysrc/pose from the net) keep playing untouched.
  const c=p.controls, ks=(pvpInfo && !p.netRemote) ? {} : (p.keysrc||keys);
  const rem=p.netRemote;
  if(rem && rem.grace>0) rem.grace-=dt;
  if(rem && rem.pose && !(rem.grace>0)){
    // online guest: client-authoritative movement — adopt the pose it simulated, wall/bomb-resolve it
    const ps=rem.pose;
    p.moving=!!ps.mv;
    if(ps.mv){ p.facing.x=ps.fx; p.facing.y=ps.fy; p.dir=ps.dir; p.animTime+=dt; }
    p.x=ps.x; p.y=ps.y; pvpResolve(p);
    // kick probe: pose streaming skips pvpMoveAxis, so detect "pushing against a bomb" directly
    if(p.pvpKick && p.moving){
      const px2=p.x+p.facing.x*(p.radius+8), py2=p.y+p.facing.y*(p.radius+8);
      const cl=pvpCellOf(px2,py2);
      const b=(cl.c>=0&&cl.r>=0&&cl.c<PVP_COLS&&cl.r<PVP_ROWS)?pvpBombAt(cl.c,cl.r):null;
      if(b && !b.slide && !b.walkers.has(p)){
        const d=Math.abs(p.facing.x)>Math.abs(p.facing.y)?[p.facing.x<0?-1:1,0]:[0,p.facing.y<0?-1:1];
        pvpKick(b,d);
      }
    }
  } else {
    let mx=0,my=0;
    if(ks[c.up])my-=1; if(ks[c.down])my+=1; if(ks[c.left])mx-=1; if(ks[c.right])mx+=1;
    p.moving=!!(mx||my);
    if(p.moving){
      p.animTime+=dt;
      const l=Math.hypot(mx,my), nx=mx/l, ny=my/l;
      p.facing.x=nx; p.facing.y=ny;
      p.dir=Math.abs(nx)>Math.abs(ny)?(nx<0?'w':'e'):(ny<0?'n':'s');
      const sp=PVP_BASE_SPD*p.pvpSpd;
      if(mx) pvpMoveAxis(p,'x',nx*sp*dt, my===0?sp*dt:0, mx);
      if(my) pvpMoveAxis(p,'y',ny*sp*dt, mx===0?sp*dt:0, my);
    }
  }
  const kd=!!ks[c.punch];
  if(kd&&!p.wasPunch) pvpPlaceBomb(p);
  p.wasPunch=kd;
  const gk=!!(c.gear&&ks[c.gear]);
  if(gk&&!p.wasGear) pvpDetonate(p);
  p.wasGear=gk;
}
// move along one axis, collide against solid tiles, then help the player around corners:
// when the shoulder clips the tile of an adjacent lane, slide toward the open lane's center.
function pvpMoveAxis(p,axis,delta,assist,dirSign){
  if(!delta) return;
  if(axis==='x') p.x+=delta; else p.y+=delta;
  const r=p.radius;
  let blocked=null;
  const c0=Math.floor((p.x-r-PVP_OX)/PVP_TILE), c1=Math.floor((p.x+r-PVP_OX)/PVP_TILE);
  const r0=Math.floor((p.y-r-PVP_OY)/PVP_TILE), r1=Math.floor((p.y+r-PVP_OY)/PVP_TILE);
  for(let rr=r0;rr<=r1;rr++)for(let cc=c0;cc<=c1;cc++){
    if(!pvpSolid(cc,rr,p)) continue;
    const rect=pvpTileRect(cc,rr);
    if(!circleRectCollide(p.x,p.y,r,rect)) continue;
    if(axis==='x') p.x = dirSign>0 ? rect.x-r : rect.x+rect.w+r;
    else p.y = dirSign>0 ? rect.y-r : rect.y+rect.h+r;
    blocked={c:cc,r:rr};
  }
  if(!blocked) return;
  const b=pvpBombAt(blocked.c,blocked.r);
  if(b && p.pvpKick && !b.walkers.has(p)){ pvpKick(b, axis==='x'?[dirSign,0]:[0,dirSign]); return; }
  if(assist>0){
    if(axis==='x'){
      const lr=clamp(Math.round((p.y-PVP_OY-PVP_TILE/2)/PVP_TILE),0,PVP_ROWS-1);
      if(lr!==blocked.r && !pvpSolid(blocked.c,lr,p)){ p.y+=clamp(pvpR2Y(lr)-p.y,-assist,assist); pvpResolve(p); }
    } else {
      const lc=clamp(Math.round((p.x-PVP_OX-PVP_TILE/2)/PVP_TILE),0,PVP_COLS-1);
      if(lc!==blocked.c && !pvpSolid(lc,blocked.r,p)){ p.x+=clamp(pvpC2X(lc)-p.x,-assist,assist); pvpResolve(p); }
    }
  }
}
function pvpResolve(p){
  const r=p.radius;
  const c0=Math.floor((p.x-r-PVP_OX)/PVP_TILE), c1=Math.floor((p.x+r-PVP_OX)/PVP_TILE);
  const r0=Math.floor((p.y-r-PVP_OY)/PVP_TILE), r1=Math.floor((p.y+r-PVP_OY)/PVP_TILE);
  for(let rr=r0;rr<=r1;rr++)for(let cc=c0;cc<=c1;cc++){
    if(!pvpSolid(cc,rr,p)) continue;
    const o=pvpTileRect(cc,rr);
    const nx=clamp(p.x,o.x,o.x+o.w), ny=clamp(p.y,o.y,o.y+o.h);
    const d=dist(p.x,p.y,nx,ny);
    if(d<r){ if(d===0){ p.x+=r; continue; } p.x=nx+(p.x-nx)/d*r; p.y=ny+(p.y-ny)/d*r; }
  }
  p.x=clamp(p.x,PVP_OX+r,PVP_OX+PVP_COLS*PVP_TILE-r);
  p.y=clamp(p.y,PVP_OY+r,PVP_OY+PVP_ROWS*PVP_TILE-r);
}

function pvpPlaceBomb(p){
  const {c,r}=pvpCellOf(p.x,p.y);
  if(c<0||r<0||c>=PVP_COLS||r>=PVP_ROWS) return;
  if(pvp.grid[r][c]!==0 || pvpBombAt(c,r)) return;
  let own=0; for(const b of pvp.bombs) if(b.owner===p) own++;
  if(own>=p.pvpMaxB) return;
  const walkers=new Set();
  for(const pl of players){ if(pl.alive && circleRectCollide(pl.x,pl.y,pl.radius+2,pvpTileRect(c,r))) walkers.add(pl); }
  pvp.bombs.push({id:_entId++, c,r, x:pvpC2X(c), y:pvpR2Y(r), owner:p,
    fuse:p.pvpRemote?-1:PVP_FUSE, range:p.pvpRange, pierce:p.pvpPierce, remote:p.pvpRemote,
    slide:null, walkers, gone:false});
  p.punchAnim=Math.min(CHARS[p.kind].pd,0.18);
  playPunchSound(p);   // each character keeps their own voice (Freddy PLIN, Michi WOW, …)
}
function pvpDetonate(p){
  if(!p.pvpRemote) return;
  for(const b of pvp.bombs){ if(b.owner===p && b.remote && !b.gone){ pvpDetonateBomb(b); return; } }   // oldest first — chains do the rest
}
function pvpKick(b,d){
  const nc=b.c+d[0], nr=b.r+d[1];
  if(pvpSlideBlocked(nc,nr)) return;
  b.slide={dx:d[0],dy:d[1],tc:nc,tr:nr};   // silent — a slide SFX here reads as audio lag
}
function pvpSlideBlocked(c,r){
  if(c<0||r<0||c>=PVP_COLS||r>=PVP_ROWS) return true;
  if(pvp.grid[r][c]!==0) return true;
  if(pvpBombAt(c,r)) return true;                       // bombs never pass through each other
  const rect=pvpTileRect(c,r);
  for(const p of players){ if(p.alive && circleRectCollide(p.x,p.y,p.radius+2,rect)) return true; }
  return false;
}
function pvpUpdateBombs(dt){
  const boom=[];
  for(const b of pvp.bombs){
    if(b.walkers.size){ const rect=pvpTileRect(b.c,b.r); for(const w of Array.from(b.walkers)){ if(!w.alive || !circleRectCollide(w.x,w.y,w.radius+2,rect)) b.walkers.delete(w); } }
    if(b.slide){
      b.x+=b.slide.dx*PVP_KICK_SPD*dt; b.y+=b.slide.dy*PVP_KICK_SPD*dt;
      // a player stepping into the path stops the bomb one tile short
      let hitP=false;
      for(const p of players){ if(p.alive && !b.walkers.has(p) && dist(p.x,p.y,b.x,b.y)<p.radius+18){ hitP=true; break; } }
      // two bombs meeting mid-slide (e.g. kicked head-on at each other) CLASH and stop — the
      // tile-based lookahead can't see this because both cross between tile centers at once
      let hitB=null;
      if(!hitP){ for(const ob of pvp.bombs){ if(ob!==b && !ob.gone && dist(ob.x,ob.y,b.x,b.y)<PVP_TILE-6){ hitB=ob; break; } } }
      if(hitP){ b.x=pvpC2X(b.c); b.y=pvpR2Y(b.r); b.slide=null; }
      else if(hitB){
        if(hitB.slide){   // the other bomb was sliding too: stop it on its own tile
          if(hitB.c===b.c && hitB.r===b.r){ hitB.c-=hitB.slide.dx; hitB.r-=hitB.slide.dy; }   // both claimed the same tile this frame → give it back its previous one
          hitB.x=pvpC2X(hitB.c); hitB.y=pvpR2Y(hitB.r); hitB.slide=null;
        }
        if(hitB.c===b.c && hitB.r===b.r){ b.c-=b.slide.dx; b.r-=b.slide.dy; }
        b.x=pvpC2X(b.c); b.y=pvpR2Y(b.r); b.slide=null;
      }
      else {
        const tx=pvpC2X(b.slide.tc), ty=pvpR2Y(b.slide.tr);
        if((b.slide.dx && (b.x-tx)*b.slide.dx>=0) || (b.slide.dy && (b.y-ty)*b.slide.dy>=0)){
          b.c=b.slide.tc; b.r=b.slide.tr; b.x=tx; b.y=ty;
          const nc=b.c+b.slide.dx, nr=b.r+b.slide.dy;
          if(pvpSlideBlocked(nc,nr)) b.slide=null;      // touched something → snap to the grid and stay
          else { b.slide.tc=nc; b.slide.tr=nr; }
        }
      }
    }
    if(b.fuse>0){ b.fuse-=dt; if(b.fuse<=0) boom.push(b); }
  }
  for(const b of boom){ if(!b.gone) pvpDetonateBomb(b); }
}
function pvpAddFlame(c,r){
  for(const f of pvp.flames){ if(f.c===c&&f.r===r){ f.t=0; return; } }
  pvp.flames.push({c,r,t:0});
}
function pvpDetonateBomb(b0){
  const q=[b0];
  while(q.length){
    const b=q.shift(); if(b.gone) continue; b.gone=true;
    const bi=pvp.bombs.indexOf(b); if(bi>=0) pvp.bombs.splice(bi,1);
    pvpAddFlame(b.c,b.r);
    spark(b.x,b.y,'#ff9a2a',16,230);
    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      for(let s=1;s<=b.range;s++){
        const cc=b.c+d[0]*s, rr=b.r+d[1]*s;
        if(cc<0||rr<0||cc>=PVP_COLS||rr>=PVP_ROWS) break;
        const g=pvp.grid[rr][cc];
        if(g===1||g===3) break;                          // unbreakable stone: the blast never passes
        if(g===2){                                       // crate: destroyed, and it absorbs the flame (unless Morganita pierces)
          pvp.grid[rr][cc]=0; pvpAddFlame(cc,rr);
          spark(pvpC2X(cc),pvpR2Y(rr),'#c98d4e',10,130);
          if(Math.random()<PVP_DROP_CHANCE) pvpSpawnItem(cc,rr);
          if(b.pierce) continue; else break;
        }
        pvpAddFlame(cc,rr);
        const ob=pvpBombAt(cc,rr);
        if(ob && !ob.gone){ q.push(ob); break; }         // chain reaction
        const it=pvpItemAt(cc,rr);
        if(it){ const ii=pvp.items.indexOf(it); if(ii>=0) pvp.items.splice(ii,1); spark(it.x,it.y,'#ffd24a',8,110); break; }   // items burn and stop the flame
      }
    }
    cameraShake=Math.max(cameraShake,8);
    playPvpBoom(); netQSnd('pboom');
  }
}
function pvpSpawnItem(c,r){
  let tot=0; for(const e of PVP_ITEM_W) tot+=e[1];
  let x=Math.random()*tot, type=PVP_ITEM_W[0][0];
  for(const e of PVP_ITEM_W){ x-=e[1]; if(x<=0){ type=e[0]; break; } }
  pvp.items.push({id:_entId++, c,r, x:pvpC2X(c), y:pvpR2Y(r), type, bob:Math.random()*TAU});
}
function pvpUpdateItems(dt){
  for(let i=pvp.items.length-1;i>=0;i--){
    const it=pvp.items[i]; it.bob+=dt*6;
    let taker=null;
    for(const p of players){ if(p.alive && dist(p.x,p.y,it.x,it.y)<p.radius+14){ taker=p; break; } }
    if(!taker) continue;
    pvp.items.splice(i,1);
    const p=taker; p.pvpCnt[it.type]++;
    if(it.type==='piedra') p.pvpRange=Math.min(PVP_RANGE_CAP,p.pvpRange+1);
    else if(it.type==='tierra') p.pvpSpd=Math.min(PVP_SPD_CAP,p.pvpSpd*PVP_SPD_STEP);
    else if(it.type==='cuarzo') p.pvpMaxB++;
    else if(it.type==='rio') p.pvpKick=true;
    else if(it.type==='morganita') p.pvpPierce=true;
    else if(it.type==='safiro') p.pvpRemote=true;
    floatText(p.x,p.y-30,PVP_ITEM_FX[it.type],APU_DEF[it.type].color);
    playPickup();
  }
}
function pvpCheckDeaths(){
  for(const p of players){
    if(!p.alive) continue;
    for(const f of pvp.flames){
      if(f.t>=PVP_FLAME_KILL) continue;   // past the blast window it's just smoke — walk through freely
      const rect=pvpTileRect(f.c,f.r);
      if(circleRectCollide(p.x,p.y,Math.max(4,p.radius-6),{x:rect.x+8,y:rect.y+8,w:rect.w-16,h:rect.h-16})){ pvpKill(p); break; }
    }
  }
}
function pvpKill(p){
  if(!p.alive) return;
  p.alive=false; p.fell=false; p.deathAnim=0;
  playCharDeath(p.kind);
  spark(p.x,p.y,'#ff9a2a',26,210);
  floatText(p.x,p.y-36,'¡KO!','#ff6a5a');
  cameraShake=11;
  for(const b of pvp.bombs){ if(b.owner===p && b.fuse<0) b.fuse=0.4+Math.random()*0.25; }   // a fallen detonator's bombs go off on their own
}
function pvpSuddenDeath(dt){
  pvp.sudden+=dt;
  if(pvp.sudden<PVP_SUDDEN) return;
  if(!pvp.suddenOn){ pvp.suddenOn=true; pvp.dropT=1.2; cameraShake=9; floatText(W/2,PVP_OY+40,'¡DERRUMBE!','#ff5a3a'); }
  pvp.dropT-=dt;
  if(pvp.dropT>0) return;
  pvp.dropT=0.42;
  while(pvp.spiralI<pvp.spiral.length){
    const [c,r]=pvp.spiral[pvp.spiralI++];
    if(pvp.grid[r][c]===1||pvp.grid[r][c]===3) continue;
    pvp.grid[r][c]=3;
    const b=pvpBombAt(c,r); if(b){ const bi=pvp.bombs.indexOf(b); if(bi>=0) pvp.bombs.splice(bi,1); }
    const it=pvpItemAt(c,r); if(it){ const ii=pvp.items.indexOf(it); if(ii>=0) pvp.items.splice(ii,1); }
    const rect=pvpTileRect(c,r);
    for(const p of players){ if(p.alive && circleRectCollide(p.x,p.y,Math.max(4,p.radius-4),{x:rect.x+6,y:rect.y+6,w:rect.w-12,h:rect.h-12})) pvpKill(p); }
    for(const p of players){ if(p.alive) pvpResolve(p); }   // clipped players get squeezed out instead of stuck
    spark(pvpC2X(c),pvpR2Y(r),'#8d8478',12,150);
    cameraShake=Math.max(cameraShake,5);
    break;
  }
}
function pvpPeekDrop(){
  if(NET.role==='guest') return pvp.warnCell;   // guests replicate the warn cell — they have no spiral
  for(let i=pvp.spiralI;i<pvp.spiral.length;i++){ const [c,r]=pvp.spiral[i]; const g=pvp.grid[r][c]; if(g!==1&&g!==3) return pvp.spiral[i]; }
  return null;
}

function handlePvpKey(code){
  if(NET.role==='guest') return;   // online guests: the host drives menus (same as Horda)
  if(pvp.sub==='matchend'){
    if(code==='Enter'||code==='Space'){
      if(pvpOnline) startPvpOnline();   // re-deal characters & slots — late joiners enter here too
      else { pvp.wins=players.map(()=>0); pvp.roundN=1; startPvpRound(); }
    }
    else if(code==='KeyC' && !pvpOnline){ enterPvpSelect(); }
    else if(code==='Escape'){ pvpExit(true); }
    return;
  }
  // Escape itself is handled by togglePause() (shared with the guests' {pt:1} request)
  if(!pvp.paused && !pvpInfo) return;   // pvpInfo: online local overlay — same menu, but the duel keeps running
  if(NET.role==='guest') return;   // the pause menu lives on the host; guests only get the Esc toggle
  if(pvp.pauseView==='settings'){
    if(code==='ArrowUp'||code==='ArrowDown'||code==='KeyW'||code==='KeyS') setSel=(setSel+1)%2;
    else if(code==='ArrowLeft'||code==='KeyA') adjustVol(setSel,-0.1);
    else if(code==='ArrowRight'||code==='KeyD') adjustVol(setSel,0.1);
    else if(code==='Enter') pvp.pauseView='main';
    return;
  }
  if(code==='ArrowLeft'||code==='KeyA') pvp.pauseSel=(pvp.pauseSel+2)%3;      // the three options sit side by side
  if(code==='ArrowRight'||code==='KeyD') pvp.pauseSel=(pvp.pauseSel+1)%3;
  if(code==='Enter'||code==='Space'){ if(pvp.pauseSel===0) pvpResume(); else if(pvp.pauseSel===1){ pvp.pauseView='settings'; setSel=0; } else pvpExit(true); }
}
function pvpResume(){
  pvp.paused=false; pvpInfo=false;
  for(const p of players){ if(!p.netRemote){ p.wasPunch=true; p.wasGear=true; } }   // the key that closed the menu must not drop a bomb (locals only — never eat a guest's press)
}
function pvpExit(toMenu){
  pvp.sub='off'; pvp.paused=false; pvpInfo=false;
  try{ if(pvpMusic) pvpMusic.pause(); }catch(e){}
  if(toMenu) gotoMainMenu(); else playMenuMusic();
}

// ---------- VERSUS rendering ----------
function rrectOn(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function pvpEnsureBG(){
  if(pvp.bgc) return;
  const c=document.createElement('canvas'); c.width=W; c.height=H; const g=c.getContext('2d');
  const gx=PVP_OX, gy=PVP_OY, gw=PVP_COLS*PVP_TILE, gh=PVP_ROWS*PVP_TILE, RIM=34;
  // cliff underside: the arena floats — jagged rock hangs below the slab
  g.fillStyle='#3c3128';
  g.beginPath();
  const bx0=gx-RIM+6, bx1=gx+gw+RIM-6, by=gy+gh+RIM-8;
  g.moveTo(bx0,by); g.lineTo(bx1,by);
  const segs=14;
  for(let i=segs;i>=0;i--){
    const x=bx0+(bx1-bx0)*i/segs;
    g.lineTo(x, by+24+pvpN(i*3+1)*34+Math.sin(i*1.7)*8);
  }
  g.closePath(); g.fill();
  g.strokeStyle='rgba(20,14,10,0.35)'; g.lineWidth=2;
  for(let i=0;i<3;i++){ g.beginPath(); g.moveTo(bx0+10,by+8+i*10); g.lineTo(bx1-10,by+6+i*10); g.stroke(); }
  for(let i=0;i<5;i++){  // little floating rock shards drifting under the island
    const rx=bx0+40+pvpN(i+40)*(bx1-bx0-80), ry=by+58+pvpN(i+90)*24, rr=4+pvpN(i+140)*7;
    g.fillStyle='#4a3b2e'; g.beginPath(); g.moveTo(rx-rr,ry); g.lineTo(rx,ry-rr); g.lineTo(rx+rr,ry); g.lineTo(rx,ry+rr); g.closePath(); g.fill();
  }
  // stone rim
  g.fillStyle='#8f8168'; rrectOn(g,gx-RIM,gy-RIM,gw+RIM*2,gh+RIM*2,16); g.fill();
  g.strokeStyle='#5f5442'; g.lineWidth=3; rrectOn(g,gx-RIM,gy-RIM,gw+RIM*2,gh+RIM*2,16); g.stroke();
  g.strokeStyle='rgba(70,58,44,0.5)'; g.lineWidth=2;
  for(let i=0;i<=PVP_COLS;i++){ const x=gx+i*PVP_TILE; g.beginPath(); g.moveTo(x,gy-RIM+4); g.lineTo(x,gy-4); g.stroke(); g.beginPath(); g.moveTo(x,gy+gh+4); g.lineTo(x,gy+gh+RIM-4); g.stroke(); }
  for(let i=0;i<=PVP_ROWS;i++){ const y=gy+i*PVP_TILE; g.beginPath(); g.moveTo(gx-RIM+4,y); g.lineTo(gx-4,y); g.stroke(); g.beginPath(); g.moveTo(gx+gw+4,y); g.lineTo(gx+gw+RIM-4,y); g.stroke(); }
  for(let i=0;i<40;i++){  // moss tufts on the rim
    g.fillStyle='rgba(106,138,74,'+(0.25+pvpN(i)*0.3).toFixed(2)+')';
    const t=pvpN(i+13); let mx,my;
    if(t<0.25){ mx=gx-RIM+pvpN(i+3)*(gw+2*RIM); my=gy-RIM+pvpN(i+5)*RIM; }
    else if(t<0.5){ mx=gx-RIM+pvpN(i+3)*(gw+2*RIM); my=gy+gh+pvpN(i+5)*RIM; }
    else if(t<0.75){ mx=gx-RIM+pvpN(i+5)*RIM; my=gy-RIM+pvpN(i+3)*(gh+2*RIM); }
    else { mx=gx+gw+pvpN(i+5)*RIM; my=gy-RIM+pvpN(i+3)*(gh+2*RIM); }
    g.beginPath(); g.ellipse(mx,my,3+pvpN(i+17)*5,2+pvpN(i+19)*3,pvpN(i+7)*4,0,TAU); g.fill();
  }
  // mossy stone floor, subtle checker so the grid reads at a glance
  for(let r=0;r<PVP_ROWS;r++)for(let cc=0;cc<PVP_COLS;cc++){
    const x=gx+cc*PVP_TILE, y=gy+r*PVP_TILE;
    g.fillStyle=((cc+r)%2===0)?'#66735a':'#5e6a52';
    g.fillRect(x,y,PVP_TILE,PVP_TILE);
    g.strokeStyle='rgba(0,0,0,0.10)'; g.lineWidth=1; g.strokeRect(x+0.5,y+0.5,PVP_TILE-1,PVP_TILE-1);
    const n=pvpN(cc*31+r*57);
    if(n>0.82){ g.fillStyle='rgba(0,0,0,0.08)'; g.fillRect(x+8+n*10,y+9,11,6); }
    if(n<0.08){ g.fillStyle='rgba(120,150,84,0.25)'; g.beginPath(); g.ellipse(x+14+n*120,y+PVP_TILE-10,6,3,0,0,TAU); g.fill(); }
  }
  g.strokeStyle='rgba(0,0,0,0.28)'; g.lineWidth=6; g.strokeRect(gx+3,gy+3,gw-6,gh-6);
  // unbreakable carved pillars (fixed layout: every odd,odd tile)
  for(let r=0;r<PVP_ROWS;r++)for(let cc=0;cc<PVP_COLS;cc++){ if(cc%2===1&&r%2===1) drawPvpPillarOn(g,cc,r); }
  pvp.bgc=c;
}
function drawPvpPillarOn(g,c,r){
  const x=PVP_OX+c*PVP_TILE, y=PVP_OY+r*PVP_TILE, T=PVP_TILE;
  g.fillStyle='#3b3833'; g.fillRect(x+2,y+2,T-4,T-4);
  g.fillStyle='#5c574e'; g.fillRect(x+4,y+4,T-8,T-14);

function drawPvpBomb(b){

  const urgent=(b.fuse>0&&b.fuse<0.9);
  const R=16*(1+0.07*Math.sin(time*(urgent?22:7)));
  const gr=ctx.createRadialGradient(x-5,y-9,2,x,y-2,R+4);
  gr.addColorStop(0,'#5b6470'); gr.addColorStop(0.6,'#2b2f36'); gr.addColorStop(1,'#191c21');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y-2,R,0,TAU); ctx.fill();
  ctx.strokeStyle='#0c0e11'; ctx.lineWidth=2; ctx.stroke();
  ctx.strokeStyle=b.owner.color; ctx.globalAlpha=0.9; ctx.lineWidth=3;   // owner-coloured ceramic band
  ctx.beginPath(); ctx.arc(x,y-2,R-5,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); ctx.globalAlpha=1;
  if(b.remote){
    drawIconFit(APU_IMG.safiro, x, y-R-9, 18);

    ctx.beginPath(); ctx.arc(x,y-2,R+5,0,TAU); ctx.stroke(); ctx.globalAlpha=1;
  } else {
    ctx.strokeStyle='#7a5a34'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x+3,y-R-1); ctx.quadraticCurveTo(x+9,y-R-8,x+13,y-R-5); ctx.stroke();
    const sp=Math.floor(time*20)%2===0;
    ctx.fillStyle=sp?'#ffe14a':'#ff9a2a'; ctx.beginPath(); ctx.arc(x+13,y-R-5,sp?4.5:3.5,0,TAU); ctx.fill();
  }

}
function drawPvpFlame(f){
  const rect=pvpTileRect(f.c,f.r);

    // lethal window: bright grid-square fire
    ctx.fillStyle='#ff7a2e'; rrect(rect.x+4,rect.y+4,rect.w-8,rect.h-8,8); ctx.fill();
    ctx.fillStyle='#ffb44a'; rrect(rect.x+9,rect.y+9,rect.w-18,rect.h-18,7); ctx.fill();
    ctx.fillStyle='#fff0a8'; rrect(rect.x+16,rect.y+16,rect.w-32,rect.h-32,6); ctx.fill();
  } else {
    // afterwards: harmless grey smoke fading out (clearly NOT fire → safe to walk through)
    const k=1-(f.t-PVP_FLAME_KILL)/(PVP_FLAME-PVP_FLAME_KILL);

  }
}

function pvpFmtT(s){ s=Math.max(0,Math.ceil(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
// online character pick — drawn on host and guests from the same (replicated) player fields:

const PVP_SEL_COLS=['#ffd24a','#5ad0ff','#7dff9a','#ff8ad0'];   // J1-J4
function drawCharsPick(roster, entries, mySlot, overlay, opts){
  opts=opts||{};
  if(overlay){ ctx.fillStyle='rgba(0,0,0,0.74)'; ctx.fillRect(0,0,W,H); }
  else if(opts.bg==='banner'){ drawBannerBG(); }
